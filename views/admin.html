<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounts — Test Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      background: linear-gradient(135deg, #ff90b0 0%, #f6f6f6 100%);
      padding: 1rem;
    }
    .site-header {
      font-family: "Sour Gummy", sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 480px;
      padding: 2rem;
    }
    table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.95rem; }
    th { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr + tr td { border-top: 1px solid #eee; }
    td { color: #333; }
    .count { color: #999; font-size: 0.85rem; margin-bottom: 1rem; }
    .delete {
      flex: none;
      padding: 0.3rem 0.75rem;
      background: #fff;
      color: #ff4860;
      border: 1px solid #ff4860;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .delete:hover { background: #ff4860; color: #fff; }
    .nav { display: flex; gap: 0.75rem; }
    button {
      flex: 1;
      padding: 0.6rem 1rem;
      background: #ff90b0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1 class="site-header">⊹₊ ˚‧︵‿₊୨ accounts ୧₊‿︵‧ ˚ ₊⊹</h1>
  <main class="card">
    <p class="count" id="count">Loading…</p>
    <table>
      <thead>
        <tr><th>Username</th><th>Registered</th><th></th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="nav">
      <button id="back" type="button">Dashboard</button>
      <button id="logout" type="button">Log out</button>
    </div>
  </main>
  <script>
    function loadAccounts() {
      fetch("/api/users")
        .then((r) => (r.ok ? r.json() : Promise.reject()))
        .then((d) => {
          document.getElementById("count").textContent =
            d.users.length + " registered account" + (d.users.length === 1 ? "" : "s");
          const rows = document.getElementById("rows");
          rows.replaceChildren();
          for (const u of d.users) {
            const tr = document.createElement("tr");
            const name = document.createElement("td");
            name.textContent = u.username;
            const date = document.createElement("td");
            date.textContent = new Date(u.createdAt).toLocaleDateString();
            const actions = document.createElement("td");
            if (u.username.toLowerCase() !== "hermione") {
              const del = document.createElement("button");
              del.type = "button";
              del.className = "delete";
              del.textContent = "Delete";
              del.addEventListener("click", () => deleteAccount(u.username));
              actions.append(del);
            }
            tr.append(name, date, actions);
            rows.append(tr);
          }
        })
        .catch(() => (window.location.href = "/"));
    }

    async function deleteAccount(username) {
      if (!confirm('Delete the account "' + username + '"? This cannot be undone.')) return;
      const res = await fetch("/api/users/" + encodeURIComponent(username), { method: "DELETE" });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.error || "Delete failed.");
      }
      loadAccounts();
    }

    loadAccounts();

    document.getElementById("back").addEventListener("click", () => {
      window.location.href = "/dashboard";
    });
    document.getElementById("logout").addEventListener("click", async () => {
      await fetch("/api/logout", { method: "POST" });
      window.location.href = "/";
    });
  </script>
</body>
</html>
