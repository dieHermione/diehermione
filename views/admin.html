<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg1: #FBC3D3;
      --bg2: #f6f6f6;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --header-color: #ffffff;
      --heading-color: #FBC3D3;
      --text-color: #333;
      --muted-color: #999;
      --table-border: #eee;
      --table-header-color: #888;
      --button-bg: #FBC3D3;
      --button-text: #ffffff;
      --button-hover-bg: #f7b8c8;
      --shadow: rgba(0, 0, 0, 0.2);
      --input-border: #ddd;
      --input-bg: #fff;
      --input-text: #333;
      --focus-color: #FBC3D3;
      --toggle-bg: rgba(255, 255, 255, 0.9);
      --toggle-text: #333;
    }
    body[data-theme="dark"] {
      --notif-item-bg: rgba(255, 255, 255, 0.07);
      color-scheme: dark;
      --bg1: #141414;
      --bg2: #242424;
      --panel-bg: rgba(32, 32, 32, 0.94);
      --header-color: #f2f2f2;
      --heading-color: #d6d6d6;
      --text-color: #ececec;
      --muted-color: #9e9e9e;
      --table-border: #3a3a3a;
      --table-header-color: #9e9e9e;
      --button-bg: #4a4a4a;
      --button-text: #f2f2f2;
      --button-hover-bg: #5f5f5f;
      --shadow: rgba(0, 0, 0, 0.5);
      --input-border: #4a4a4a;
      --input-bg: #2a2a2a;
      --input-text: #ececec;
      --focus-color: #d6d6d6;
      --toggle-bg: rgba(38, 38, 38, 0.95);
      --toggle-text: #ececec;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Cause", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      padding: 1rem;
      color: var(--text-color);
    }
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 20px 0;
    }
    .bow { display: inline-block; }
    .bow.flip { transform: scaleX(-1); }
    body.has-top-nav {
      justify-content: flex-start;
      padding-top: 1.75rem;
      gap: 1rem;
    }
    .top-nav {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 0.55rem;
      position: relative;
      width: min(100%, 720px);
      padding: 0.65rem 1rem;
      margin: 0 0 0.75rem;
      border-radius: 999px;
      background: var(--panel-bg);
      box-shadow: 0 8px 24px var(--shadow);
      backdrop-filter: blur(8px);
    }
    .top-nav .greeting {
      color: var(--heading-color);
      font-weight: 700;
      font-size: 0.95rem;
      margin-right: 0.25rem;
    }
    .top-nav .nav-links {
      grid-column: 2;
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.45rem;
    }
    .top-nav a,
    .top-nav button,
    .top-nav .dropdown-toggle {
      font-family: inherit;   /* buttons don't inherit the page font on their own */
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      border: none;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .top-nav a:hover,
    .top-nav button:hover,
    .top-nav .dropdown-toggle:hover {
      background: var(--button-hover-bg);
    }
    .top-nav a.active {
      background: var(--button-hover-bg);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
    }
    .top-nav .dropdown[hidden] { display: none; }
    .top-nav a[hidden] { display: none; }
    .top-nav .dropdown {
      position: relative;
      display: inline-flex;
    }
    /* invisible bridge across the gap so hover survives the trip to the menu */
    .top-nav .dropdown::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      height: 0.5rem;
    }
    .top-nav .dropdown-menu {
      position: absolute;
      top: calc(100% + 0.35rem);
      left: 0;
      display: none;
      flex-direction: column;
      gap: 0.35rem;
      padding: 0.45rem;
      background: var(--panel-bg);
      border-radius: 8px;
      box-shadow: 0 8px 24px var(--shadow);
      min-width: 8rem;
    }
    .top-nav .dropdown:hover .dropdown-menu,
    .top-nav .dropdown:focus-within .dropdown-menu {
      display: flex;
    }
    .top-nav .dropdown-menu a {
      width: 100%;
    }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 860px;
      padding: 2rem;
      color: var(--text-color);
    }
    table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.95rem; }
    th { color: var(--table-header-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr + tr td { border-top: 1px solid var(--table-border); }
    td { color: var(--text-color); }
    td a { color: inherit; text-decoration: underline; text-decoration-color: var(--button-hover-bg); text-underline-offset: 3px; }
    td a:hover { color: var(--button-hover-bg); }
    .count { color: var(--muted-color); font-size: 0.85rem; margin-bottom: 1rem; }
    .admin-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
    }
    h2 {
      font-family: "Cause", sans-serif;
      font-size: 1.1rem;
      color: var(--heading-color);
      margin-bottom: 1rem;
      text-align: center;
    }
    .doc-links { display: flex; gap: 0.6rem; justify-content: center; margin-bottom: 0.5rem; }
    .doc-links a {
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      background: var(--button-bg);
      color: var(--button-text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
    }
    .doc-links a:hover { background: var(--button-hover-bg); }
    .panel-empty {
      color: var(--muted-color);
      font-style: italic;
      font-size: 0.9rem;
      text-align: center;
      padding: 0.75rem 0;
    }
    .action-menu {
      padding: 0.3rem 0.4rem;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      font-size: 0.85rem;
      background: var(--input-bg);
      color: var(--input-text);
      cursor: pointer;
    }
    .action-menu:focus { outline: none; border-color: var(--focus-color); }
    .pts-input {
      width: 4rem;
      padding: 0.3rem 0.4rem;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      font-size: 0.85rem;
      margin-right: 0.35rem;
      background: var(--input-bg);
      color: var(--input-text);
    }
    .pts-input:focus { outline: none; border-color: var(--focus-color); }
    .action-row { display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center; }
    .pts-group { display: inline-flex; gap: 0.25rem; align-items: center; }
    .pts-select {
      padding: 0.3rem 0.4rem;
      border: 1px solid var(--input-border);
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.76rem;
      font-weight: 700;
      background: var(--input-bg);
      color: var(--input-text);
      cursor: pointer;
    }
    .pts-select:focus { outline: none; border-color: var(--focus-color); }
    .chip.quick { padding: 0.32rem 0.6rem; }
    .chip.sign { padding: 0.32rem 0.65rem; min-width: 2rem; font-size: 0.95rem; line-height: 1; }
    .pts-group .pts-input { width: 3.6rem; margin-right: 0; }
    /* delete runs on a timer you can call off */
    .pending {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-color);
    }
    .pending .countdown {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.9rem;
      padding: 0.15rem 0.4rem;
      border-radius: 999px;
      background: var(--table-border);
      color: var(--text-color);
      font-variant-numeric: tabular-nums;
    }
    .chip {
      flex: 0 0 auto;
      padding: 0.32rem 0.75rem;
      border: none;
      border-radius: 999px;
      background: var(--button-bg);
      color: var(--button-text);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease;
    }
    .chip:hover { background: var(--button-hover-bg); transform: translateY(-1px); }
    .chip:active { transform: translateY(0); }
    .chip.on {
      background: transparent;
      color: var(--heading-color);
      box-shadow: inset 0 0 0 1.5px var(--button-bg);
    }
    .chip.on:hover { background: var(--button-bg); color: var(--button-text); }
    .chip.danger {
      background: transparent;
      color: #d4607f;
      box-shadow: inset 0 0 0 1.5px #f0b6c6;
    }
    .chip.danger:hover { background: #e8748f; color: #ffffff; box-shadow: none; }
    .listed-pill {
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .listed-pill.yes { background: var(--button-bg); color: var(--button-text); }
    .listed-pill.no { background: var(--table-border); color: var(--muted-color); }
    .pts-input { width: 3.4rem; margin-right: 0.15rem; }
    .nav { display: flex; gap: 0.75rem; }
    button {
      flex: 1;
      padding: 0.6rem 1rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--button-hover-bg); }
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: 3rem;
      height: 1.6rem;
      padding: 0;
      border: 1px solid var(--input-border);
      border-radius: 999px;
      background: var(--toggle-bg);
      color: transparent;
      box-shadow: 0 6px 16px var(--shadow);
      cursor: pointer;
      overflow: hidden;
    }
    .theme-toggle .thumb {
      position: absolute;
      top: 0.15rem;
      left: 0.15rem;
      width: 1.15rem;
      height: 1.15rem;
      border-radius: 50%;
      background: var(--button-bg);
      display: block;
      transition: left 0.2s ease, background-color 0.2s ease;
    }
    .theme-toggle.is-dark .thumb {
      left: calc(100% - 1.15rem - 0.15rem);
      background: var(--button-hover-bg);
    }

    /* greyscale dark mode */
    body[data-theme="dark"] .chip.danger { color: #cfcfcf; box-shadow: inset 0 0 0 1.5px #6a6a6a; }
    body[data-theme="dark"] .chip.danger:hover { background: #6a6a6a; color: #f2f2f2; box-shadow: none; }
  </style>
</head>
<body class="has-top-nav">
    <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle dark mode"><span class="thumb"></span></button>
  <nav id="top-nav" class="top-nav" hidden>
    <div class="nav-links">
      <a id="nav-dashboard" href="/dashboard">Dashboard</a>
      <a id="nav-admin" href="/admin" hidden>Admin</a>
      <a id="nav-profile" href="/profile">Profile</a>
      <a id="nav-tasks" href="/tasks">Tasks</a>
      <div class="dropdown" id="games-dropdown">
        <button class="dropdown-toggle" type="button">Games ▾</button>
        <div class="dropdown-menu">
          <a id="nav-snake" href="/snake">Snake</a>
          <a id="nav-writing" href="/writing">Writing</a>
          <a id="nav-wheel" href="/wheel">Wheel</a>
          <a id="nav-deathroll" href="/deathroll">Deathroll</a>
        </div>
      </div>
    </div>
  </nav>
  <div class="admin-grid">
    <section class="card">
      <h2>Accounts</h2>
      <p class="count" id="count">Loading…</p>
      <table>
        <thead>
          <tr><th>Username</th><th>Registered</th><th>Points</th><th>Listed</th><th></th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
    <section class="card">
      <h2>Documentation</h2>
      <div class="doc-links">
        <a href="/guide">Guide</a>
        <a href="/tech">Technical notes</a>
      </div>
      <p class="panel-empty">The guide covers what people see; the technical notes cover how it's built.</p>
    </section>
    <section class="card">
      <h2>Tasks</h2>
      <p class="panel-empty">Assigning tasks to accounts will live here.</p>
    </section>
  </div>
  <script>
    const body = document.body;
    const toggle = document.getElementById("theme-toggle");
    const storedTheme = localStorage.getItem("site-theme");
    const systemDark = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
    // no explicit choice yet? follow whatever the browser/OS is set to
    const savedTheme = storedTheme || (systemDark && systemDark.matches ? "dark" : "light");
    const topNav = document.getElementById("top-nav");
    const navDashboard = document.getElementById("nav-dashboard");
    const navAdmin = document.getElementById("nav-admin");
    const navChess = document.getElementById("nav-chess");
    const navSnake = document.getElementById("nav-snake");
    const adminDropdown = document.getElementById("nav-admin");

    function applyTheme(theme, persist) {
      body.dataset.theme = theme;
      if (toggle) {
        toggle.classList.toggle("is-dark", theme === "dark");
        toggle.setAttribute("aria-pressed", String(theme === "dark"));
      }
      if (persist) localStorage.setItem("site-theme", theme);
    }

    applyTheme(savedTheme);
    systemDark?.addEventListener?.("change", (e) => {
      if (!localStorage.getItem("site-theme")) applyTheme(e.matches ? "dark" : "light");
    });
    toggle?.addEventListener("click", () => {
      const nextTheme = body.dataset.theme === "dark" ? "light" : "dark";
      applyTheme(nextTheme, true);
    });

    function setActiveNav(path) {
      const links = [navDashboard, navAdmin, navChess, navSnake];
      links.forEach((link) => link?.classList.toggle("active", link?.getAttribute("href") === path));
    }

    async function initTopNav() {
      if (!topNav) return;
      if (adminDropdown) {
        adminDropdown.hidden = true;
      }
      try {
        const res = await fetch("/api/me");
        if (!res.ok) {
          topNav.hidden = true;
          return;
        }
        const data = await res.json().catch(() => ({}));
        const username = data.username || "there";
        const isAdmin = Boolean(data.isAdmin ?? (username && username.toLowerCase() === "hermione"));
        topNav.hidden = false;
        if (adminDropdown) {
          adminDropdown.hidden = !isAdmin;
        }
        setActiveNav(window.location.pathname);
      } catch {
        topNav.hidden = true;
        if (adminDropdown) {
          adminDropdown.hidden = true;
        }
      }
    }

    initTopNav();

    function loadAccounts() {
      fetch("/api/users")
        .then((r) => (r.ok ? r.json() : Promise.reject()))
        .then((d) => {
          document.getElementById("count").textContent =
            d.users.length + " registered account" + (d.users.length === 1 ? "" : "s");
          const rows = document.getElementById("rows");
          rows.replaceChildren();
          for (const u of d.users) {
            const tr = document.createElement("tr");
            const name = document.createElement("td");
            const profileLink = document.createElement("a");
            profileLink.href = "/profile?user=" + encodeURIComponent(u.username);
            profileLink.textContent = u.username;
            name.append(profileLink);
            const date = document.createElement("td");
            date.textContent = new Date(u.createdAt).toLocaleDateString();
            const points = document.createElement("td");
            points.textContent = u.points;
            const listed = document.createElement("td");
            const pill = document.createElement("span");
            pill.className = "listed-pill " + (u.flagged ? "yes" : "no");
            pill.textContent = u.flagged ? "Listed" : "Hidden";
            listed.append(pill);

            const actions = document.createElement("td");
            const row = document.createElement("div");
            row.className = "action-row";

            if (u.username.toLowerCase() !== "hermione") {
              // pick an amount, or use a one-tap preset
              const group = document.createElement("div");
              group.className = "pts-group";
              // sign flips every button in the row, so the presets can take away too
              let negative = false;
              const sign = document.createElement("button");
              sign.type = "button";
              sign.className = "chip sign";
              sign.textContent = "+";
              sign.title = "Switch to taking points away";

              const amount = document.createElement("input");
              amount.type = "number";
              amount.step = "1";
              amount.min = "1";
              amount.className = "pts-input";
              amount.placeholder = "pts";

              const give = document.createElement("button");
              give.type = "button";
              give.className = "chip give";
              give.textContent = "Give";
              give.addEventListener("click", () => {
                const n = parseInt(amount.value, 10);
                if (!Number.isInteger(n) || n === 0) return;
                addPoints(u.username, negative ? -Math.abs(n) : Math.abs(n));
              });
              group.append(sign, amount, give);
              row.append(group);

              const quicks = [5, 10, 25, 100].map((n) => {
                const quick = document.createElement("button");
                quick.type = "button";
                quick.className = "chip quick";
                quick.textContent = "+" + n;
                quick.addEventListener("click", () => addPoints(u.username, negative ? -n : n));
                row.append(quick);
                return { el: quick, n };
              });

              sign.addEventListener("click", () => {
                negative = !negative;
                sign.textContent = negative ? "−" : "+";
                sign.classList.toggle("danger", negative);
                sign.title = negative ? "Switch to giving points" : "Switch to taking points away";
                quicks.forEach(({ el, n }) => { el.textContent = (negative ? "−" : "+") + n; });
                give.textContent = negative ? "Take" : "Give";
              });
            }

            const flag = document.createElement("button");
            flag.type = "button";
            flag.className = "chip" + (u.flagged ? " on" : "");
            flag.textContent = u.flagged ? "Hide" : "Show";
            flag.title = u.flagged ? "Hide from leaderboard" : "Show on leaderboard";
            flag.addEventListener("click", () => setFlag(u.username, !u.flagged));
            row.append(flag);

            if (u.username.toLowerCase() !== "hermione") {
              const del = document.createElement("button");
              del.type = "button";
              del.className = "chip danger";
              del.textContent = "Delete";
              del.title = "Delete account";
              del.addEventListener("click", () => armDelete(u.username, row));
              row.append(del);
            }
            actions.append(row);
            tr.append(name, date, points, listed, actions);
            rows.append(tr);
          }
        })
        .catch(() => (window.location.href = "/"));
    }

    async function addPoints(username, value) {
      const amount = parseInt(value, 10);
      if (!Number.isInteger(amount) || amount === 0) return;
      const res = await fetch("/api/users/" + encodeURIComponent(username) + "/points", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.error || "Adding points failed.");
      }
      loadAccounts();
    }

    async function setFlag(username, flagged) {
      const res = await fetch("/api/users/" + encodeURIComponent(username) + "/flag", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ flagged }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.error || "Updating the leaderboard flag failed.");
      }
      loadAccounts();
    }

    // Deleting is armed rather than confirmed: the row turns into a countdown
    // you can call off, and only fires if you let it run out.
    const DELETE_DELAY = 15;

    function armDelete(username, row) {
      const original = [...row.childNodes];
      let left = DELETE_DELAY;

      const pending = document.createElement("div");
      pending.className = "pending";
      const label = document.createElement("span");
      label.textContent = "Deleting " + username + " in";
      const clock = document.createElement("span");
      clock.className = "countdown";
      clock.textContent = left + "s";
      const cancel = document.createElement("button");
      cancel.type = "button";
      cancel.className = "chip";
      cancel.textContent = "Cancel";
      const now = document.createElement("button");
      now.type = "button";
      now.className = "chip danger";
      now.textContent = "Delete now";
      pending.append(label, clock, cancel, now);
      row.replaceChildren(pending);

      const stop = () => {
        clearInterval(timer);
        row.replaceChildren(...original);
      };
      cancel.addEventListener("click", stop);
      now.addEventListener("click", () => { clearInterval(timer); deleteAccount(username); });

      const timer = setInterval(() => {
        left--;
        clock.textContent = left + "s";
        if (left <= 0) {
          clearInterval(timer);
          deleteAccount(username);
        }
      }, 1000);
    }

    async function deleteAccount(username) {
      const res = await fetch("/api/users/" + encodeURIComponent(username), { method: "DELETE" });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        const count = document.getElementById("count");
        count.textContent = data.error || "Delete failed.";
      }
      loadAccounts();
    }

    loadAccounts();
  </script>
  <script src="/notifications.js" defer></script>
</body>
</html>
