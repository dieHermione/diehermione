<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounts — Test Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg1: #ff90b0;
      --bg2: #f6f6f6;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --header-color: #ffffff;
      --text-color: #333;
      --muted-color: #999;
      --table-border: #eee;
      --table-header-color: #888;
      --button-bg: #FBC3D3;
      --button-text: #ffffff;
      --button-hover-bg: #f7b8c8;
      --shadow: rgba(0, 0, 0, 0.2);
      --input-border: #ddd;
      --input-bg: #fff;
      --input-text: #333;
      --focus-color: #ff90b0;
      --toggle-bg: rgba(255, 255, 255, 0.9);
      --toggle-text: #333;
    }
    body[data-theme="dark"] {
      color-scheme: dark;
      --bg1: #140d16;
      --bg2: #231628;
      --panel-bg: rgba(37, 34, 42, 0.92);
      --header-color: #ffffff;
      --text-color: #ffffff;
      --muted-color: #ffffff;
      --table-border: #5a4257;
      --table-header-color: #ffffff;
      --button-bg: #d99baf;
      --button-text: #ffffff;
      --button-hover-bg: #edb6ca;
      --shadow: rgba(0, 0, 0, 0.45);
      --input-border: #6e5a72;
      --input-bg: #2b2234;
      --input-text: #f8ebf4;
      --focus-color: #ffffff;
      --toggle-bg: rgba(41, 34, 49, 0.95);
      --toggle-text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Cause", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      padding: 1rem;
      color: var(--text-color);
    }
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 600px;
      padding: 2rem;
      color: var(--text-color);
    }
    table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.95rem; }
    th { color: var(--table-header-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr + tr td { border-top: 1px solid var(--table-border); }
    td { color: var(--text-color); }
    .count { color: var(--muted-color); font-size: 0.85rem; margin-bottom: 1rem; }
    .action-menu {
      padding: 0.3rem 0.4rem;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      font-size: 0.85rem;
      background: var(--input-bg);
      color: var(--input-text);
      cursor: pointer;
    }
    .action-menu:focus { outline: none; border-color: var(--focus-color); }
    .pts-input {
      width: 4rem;
      padding: 0.3rem 0.4rem;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      font-size: 0.85rem;
      margin-right: 0.35rem;
      background: var(--input-bg);
      color: var(--input-text);
    }
    .pts-input:focus { outline: none; border-color: var(--focus-color); }
    .nav { display: flex; gap: 0.75rem; }
    button {
      flex: 1;
      padding: 0.6rem 1rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--button-hover-bg); }
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: 3rem;
      height: 1.7rem;
      padding: 0.2rem;
      border: 1px solid var(--input-border);
      border-radius: 999px;
      background: var(--toggle-bg);
      color: transparent;
      box-shadow: 0 6px 16px var(--shadow);
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      cursor: pointer;
    }
    .theme-toggle .thumb {
      width: 1.1rem;
      height: 1.1rem;
      border-radius: 50%;
      background: var(--button-bg);
      display: block;
      transition: transform 0.2s ease;
      transform: translateX(0);
    }
    .theme-toggle.is-dark {
      justify-content: flex-end;
    }
    .theme-toggle.is-dark .thumb {
      transform: translateX(1.15rem);
      background: var(--button-hover-bg);
    }
  </style>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle dark mode"><span class="thumb"></span></button>
  <h1 class="site-header">˚₊‧꒰ა Accounts ໒꒱ ‧₊˚</h1>
  <main class="card">
    <p class="count" id="count">Loading…</p>
    <table>
      <thead>
        <tr><th>Username</th><th>Registered</th><th>Points</th><th>Listed</th><th></th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="nav">
      <button id="back" type="button">Dashboard</button>
      <button id="logout" type="button">Log out</button>
    </div>
  </main>
  <script>
    const body = document.body;
    const toggle = document.getElementById("theme-toggle");
    const savedTheme = localStorage.getItem("site-theme") || "light";

    function applyTheme(theme) {
      body.dataset.theme = theme;
      if (toggle) {
        toggle.classList.toggle("is-dark", theme === "dark");
        toggle.setAttribute("aria-pressed", String(theme === "dark"));
      }
      localStorage.setItem("site-theme", theme);
    }

    applyTheme(savedTheme);
    toggle?.addEventListener("click", () => {
      const nextTheme = body.dataset.theme === "dark" ? "light" : "dark";
      applyTheme(nextTheme);
    });

    function loadAccounts() {
      fetch("/api/users")
        .then((r) => (r.ok ? r.json() : Promise.reject()))
        .then((d) => {
          document.getElementById("count").textContent =
            d.users.length + " registered account" + (d.users.length === 1 ? "" : "s");
          const rows = document.getElementById("rows");
          rows.replaceChildren();
          for (const u of d.users) {
            const tr = document.createElement("tr");
            const name = document.createElement("td");
            name.textContent = u.username;
            const date = document.createElement("td");
            date.textContent = new Date(u.createdAt).toLocaleDateString();
            const points = document.createElement("td");
            points.textContent = u.points;
            const listed = document.createElement("td");
            listed.textContent = u.flagged ? "✓" : "—";
            const actions = document.createElement("td");
            const amount = document.createElement("input");
            amount.type = "number";
            amount.step = "1";
            amount.className = "pts-input";
            amount.placeholder = "pts";
            const menu = document.createElement("select");
            menu.className = "action-menu";
            const options = [
              ["", "Actions…"],
              ["add", "Add points"],
              ["flag", u.flagged ? "Hide from leaderboard" : "Show on leaderboard"],
            ];
            if (u.username.toLowerCase() !== "hermione") {
              options.push(["delete", "Delete account…"]);
            }
            for (const [value, label] of options) {
              const opt = document.createElement("option");
              opt.value = value;
              opt.textContent = label;
              menu.append(opt);
            }
            menu.addEventListener("change", async () => {
              const action = menu.value;
              menu.value = "";
              if (action === "add") await addPoints(u.username, amount.value);
              else if (action === "flag") await setFlag(u.username, !u.flagged);
              else if (action === "delete") await deleteAccount(u.username);
            });
            actions.append(amount, menu);
            tr.append(name, date, points, listed, actions);
            rows.append(tr);
          }
        })
        .catch(() => (window.location.href = "/"));
    }

    async function addPoints(username, value) {
      const amount = parseInt(value, 10);
      if (!Number.isInteger(amount) || amount === 0) {
        alert("Enter a whole number of points first.");
        return;
      }
      const res = await fetch("/api/users/" + encodeURIComponent(username) + "/points", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.error || "Adding points failed.");
      }
      loadAccounts();
    }

    async function setFlag(username, flagged) {
      const res = await fetch("/api/users/" + encodeURIComponent(username) + "/flag", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ flagged }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.error || "Updating the leaderboard flag failed.");
      }
      loadAccounts();
    }

    async function deleteAccount(username) {
      if (!confirm('Delete the account "' + username + '"? This cannot be undone.')) return;
      const res = await fetch("/api/users/" + encodeURIComponent(username), { method: "DELETE" });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.error || "Delete failed.");
      }
      loadAccounts();
    }

    loadAccounts();

    document.getElementById("back").addEventListener("click", () => {
      window.location.href = "/dashboard";
    });
    document.getElementById("logout").addEventListener("click", async () => {
      await fetch("/api/logout", { method: "POST" });
      window.location.href = "/";
    });
  </script>
</body>
</html>
