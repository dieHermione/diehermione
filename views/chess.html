<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess — Test Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg1: #ff90b0;
      --bg2: #f6f6f6;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --header-color: #ffffff;
      --heading-color: #FBC3D3;
      --text-color: #333;
      --muted-color: #999;
      --button-bg: #FBC3D3;
      --button-text: #ffffff;
      --button-hover-bg: #f7b8c8;
      --shadow: rgba(0, 0, 0, 0.2);
      --picker-bg: #fff;
      --picker-text: #333;
      --border-color: #444444;
      --board-light: #ffffff;
      --board-dark: #b0b0b0;
      --board-selected: #f5c542;
      --board-last: #fce9b8;
      --toggle-bg: rgba(255, 255, 255, 0.9);
      --toggle-text: #333;
    }
    body[data-theme="dark"] {
      color-scheme: dark;
      --bg1: #14141a;
      --bg2: #22222b;
      --panel-bg: rgba(37, 34, 42, 0.92);
      --header-color: #ffffff;
      --heading-color: #ffffff;
      --text-color: #ffffff;
      --muted-color: #ffffff;
      --button-bg: #d99baf;
      --button-text: #ffffff;
      --button-hover-bg: #edb6ca;
      --shadow: rgba(0, 0, 0, 0.45);
      --picker-bg: #2b2234;
      --picker-text: #ffffff;
      --border-color: #1f1f1f;
      --board-light: #e6e6e6;
      --board-dark: #6e6e6e;
      --board-selected: #f5c542;
      --board-last: #d9c27a;
      --toggle-bg: rgba(41, 34, 49, 0.95);
      --toggle-text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Cause", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      padding: 1rem;
      color: var(--text-color);
    }
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
    }
    body.has-top-nav {
      justify-content: flex-start;
      padding-top: 1.75rem;
      gap: 1rem;
    }
    .top-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.55rem;
      width: min(100%, 720px);
      padding: 0.65rem 1rem;
      margin: 0 0 0.75rem;
      border-radius: 999px;
      background: var(--panel-bg);
      box-shadow: 0 8px 24px var(--shadow);
      backdrop-filter: blur(8px);
    }
    .top-nav .greeting {
      color: var(--heading-color);
      font-weight: 700;
      font-size: 0.95rem;
      margin-right: 0.25rem;
    }
    .top-nav .nav-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      align-items: center;
      gap: 0.45rem;
      flex: 1;
    }
    .top-nav a,
    .top-nav button,
    .top-nav .dropdown-toggle {
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      border: none;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .top-nav a:hover,
    .top-nav button:hover,
    .top-nav .dropdown-toggle:hover {
      background: var(--button-hover-bg);
    }
    .top-nav a.active {
      background: var(--button-hover-bg);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
    }
    .top-nav .dropdown {
      position: relative;
      display: inline-flex;
    }
    .top-nav .dropdown-menu {
      position: absolute;
      top: calc(100% + 0.35rem);
      left: 0;
      display: none;
      flex-direction: column;
      gap: 0.35rem;
      padding: 0.45rem;
      background: var(--panel-bg);
      border-radius: 8px;
      box-shadow: 0 8px 24px var(--shadow);
      min-width: 8rem;
    }
    .top-nav .dropdown:hover .dropdown-menu,
    .top-nav .dropdown:focus-within .dropdown-menu {
      display: flex;
    }
    .top-nav .dropdown-menu a {
      width: 100%;
    }
    .top-nav .theme-toggle {
      position: relative;
      top: auto;
      right: auto;
      width: 2.8rem;
      height: 1.45rem;
      margin-left: auto;
      margin-right: 0.2rem;
      flex-shrink: 0;
      box-shadow: 0 4px 10px var(--shadow);
    }
    .top-nav .theme-toggle .thumb {
      top: 0.12rem;
      left: 0.12rem;
      width: 1rem;
      height: 1rem;
    }
    .top-nav .theme-toggle.is-dark .thumb {
      left: calc(100% - 1rem - 0.12rem);
    }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 520px;
      padding: 2rem;
      text-align: center;
      color: var(--text-color);
    }
    .status { color: var(--text-color); font-weight: 600; margin-bottom: 1rem; min-height: 1.4em; }
    .picker { margin-bottom: 1rem; }
    .picker select {
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--picker-bg);
      border-radius: 8px;
      font-size: 0.95rem;
      background: var(--picker-bg);
      color: var(--picker-text);
    }
    #board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: 100%;
      max-width: 440px;
      aspect-ratio: 1;
      margin: 0 auto 1.25rem;
      border: 3px solid var(--border-color);
      border-radius: 8px;
      overflow: hidden;
      user-select: none;
    }
    .square { position: relative; cursor: pointer; }
    .square.light { background: var(--board-light); }
    .square.dark { background: var(--board-dark); }
    .square.selected::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 3px var(--board-selected);
    }
    .square.last::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 3px var(--board-last);
    }
    .square img { width: 100%; height: 100%; display: block; pointer-events: none; }
    .nav { display: flex; gap: 0.75rem; justify-content: center; }
    button {
      padding: 0.6rem 1.25rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--button-hover-bg); }
    .note { color: var(--muted-color); font-size: 0.85rem; margin-top: 1rem; }
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: 3rem;
      height: 1.6rem;
      padding: 0;
      border: 1px solid var(--input-border);
      border-radius: 999px;
      background: var(--toggle-bg);
      color: transparent;
      box-shadow: 0 6px 16px var(--shadow);
      cursor: pointer;
      overflow: hidden;
    }
    .theme-toggle .thumb {
      position: absolute;
      top: 0.15rem;
      left: 0.15rem;
      width: 1.15rem;
      height: 1.15rem;
      border-radius: 50%;
      background: var(--button-bg);
      display: block;
      transition: left 0.2s ease, background-color 0.2s ease;
    }
    .theme-toggle.is-dark .thumb {
      left: calc(100% - 1.15rem - 0.15rem);
      background: var(--button-hover-bg);
    }
  </style>
</head>
<body class="has-top-nav">
  <nav id="top-nav" class="top-nav" hidden>
    <div class="nav-links">
      <a id="nav-dashboard" href="/dashboard">Dashboard</a>
      <div class="dropdown" id="admin-dropdown" hidden>
        <button class="dropdown-toggle" type="button">Admin ▾</button>
        <div class="dropdown-menu">
          <a id="nav-admin" href="/admin">Accounts</a>
        </div>
      </div>
      <a id="nav-chess" href="/chess">Chess</a>
      <a id="nav-snake" href="/snake">Snake</a>
      <button id="nav-logout" type="button">Log out</button>
    </div>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle dark mode"><span class="thumb"></span></button>
  </nav>
  <h1 class="site-header">˚₊‧꒰ა Chess ໒꒱ ‧₊˚</h1>
  <main class="card">
    <div class="picker" id="picker" hidden>
      <label for="opponent">Game vs </label>
      <select id="opponent"></select>
    </div>
    <p class="status" id="status">Loading…</p>
    <div id="board"></div>
    <div class="nav">
      <button id="removebtn" type="button" hidden>Remove piece</button>
      <button id="newgame" type="button">New game</button>
      <button id="back" type="button">Dashboard</button>
    </div>
    <p class="note" id="note" hidden>You play white; Hermione plays black. Click a piece, then its destination. Pawns promote to queens.</p>
  </main>
  <script>
    const body = document.body;
    const toggle = document.getElementById("theme-toggle");
    const savedTheme = localStorage.getItem("site-theme") || "light";
    const topNav = document.getElementById("top-nav");
    const navDashboard = document.getElementById("nav-dashboard");
    const navAdmin = document.getElementById("nav-admin");
    const navChess = document.getElementById("nav-chess");
    const navSnake = document.getElementById("nav-snake");
    const navLogout = document.getElementById("nav-logout");
    const adminDropdown = document.getElementById("admin-dropdown");

    function applyTheme(theme) {
      body.dataset.theme = theme;
      if (toggle) {
        toggle.classList.toggle("is-dark", theme === "dark");
        toggle.setAttribute("aria-pressed", String(theme === "dark"));
      }
      localStorage.setItem("site-theme", theme);
    }

    applyTheme(savedTheme);
    toggle?.addEventListener("click", () => {
      const nextTheme = body.dataset.theme === "dark" ? "light" : "dark";
      applyTheme(nextTheme);
    });

    function setActiveNav(path) {
      const links = [navDashboard, navAdmin, navChess, navSnake];
      links.forEach((link) => link?.classList.toggle("active", link?.getAttribute("href") === path));
    }

    async function initTopNav() {
      if (!topNav) return;
      try {
        const res = await fetch("/api/me");
        if (!res.ok) {
          topNav.hidden = true;
          return;
        }
        const data = await res.json().catch(() => ({}));
        const username = data.username || "there";
        topNav.hidden = false;
        if (adminDropdown) {
          adminDropdown.hidden = username.toLowerCase() !== "hermione";
        }
        setActiveNav(window.location.pathname);
      } catch {
        topNav.hidden = true;
      }
    }

    navLogout?.addEventListener("click", async () => {
      await fetch("/api/logout", { method: "POST" });
      window.location.href = "/";
    });

    initTopNav();

    let mySide = "w";      // players are white; hermione is black ("b")
    let isAdmin = false;
    let opponent = null;   // admin only: which player's game is shown
    let game = null;
    let selected = null;
    let busy = false;
    let removeMode = false;

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");

    const PIECE_SRC = (ch) =>
      "/pieces/" + (ch === ch.toUpperCase() ? "w" : "p") + ch.toUpperCase() + ".svg";

    function squares() {
      // board squares in render order, honoring orientation (own side at bottom)
      const files = "abcdefgh".split("");
      const ranks = [8, 7, 6, 5, 4, 3, 2, 1];
      const list = [];
      for (const r of ranks) for (const f of files) list.push(f + r);
      return mySide === "b" ? list.reverse() : list;
    }

    function fenBoard(fen) {
      // expand the FEN placement field into a { square: pieceChar } map
      const map = {};
      const rows = fen.split(" ")[0].split("/");
      rows.forEach((row, i) => {
        let file = 0;
        for (const ch of row) {
          if (/\d/.test(ch)) file += Number(ch);
          else {
            map["abcdefgh"[file] + (8 - i)] = ch;
            file++;
          }
        }
      });
      return map;
    }

    function render() {
      boardEl.replaceChildren();
      if (!game) return;
      const pieces = fenBoard(game.fen);
      let dark = false;
      squares().forEach((sq, i) => {
        if (i % 8 !== 0) dark = !dark;
        const div = document.createElement("div");
        div.className = "square " + (dark ? "dark" : "light");
        div.dataset.square = sq;
        div.setAttribute("role", "button");
        div.setAttribute("aria-label", sq + (pieces[sq] ? " " + pieces[sq] : ""));
        if (sq === selected) div.classList.add("selected");
        const piece = pieces[sq];
        if (piece) {
          const img = document.createElement("img");
          img.src = PIECE_SRC(piece);
          img.alt = piece;
          div.append(img);
        }
        div.addEventListener("click", () => onSquareClick(sq, piece));
        boardEl.append(div);
      });
      statusEl.textContent = statusText();
    }

    function statusText() {
      if (!game) return "";
      if (removeMode) return "Click one of " + game.opponent + "'s pieces to remove it.";
      if (game.checkmate) {
        const winner = game.winner === "w" ? "White" : "Black";
        return "Checkmate — " + winner + " wins!";
      }
      if (game.draw || game.gameOver) return "Draw.";
      const mine = game.turn === mySide;
      let text = mine ? "Your move" : "Waiting for " + (isAdmin ? game.opponent : "Hermione") + "…";
      if (game.check) text += " — check!";
      return text;
    }

    function pieceSide(ch) {
      return ch === ch.toUpperCase() ? "w" : "b";
    }

    async function onSquareClick(sq, piece) {
      if (!game || game.gameOver || busy) return;
      if (removeMode) {
        if (piece && pieceSide(piece) === "w") await sendRemove(sq);
        return;
      }
      if (game.turn !== mySide) return;
      if (selected && sq !== selected) {
        if (piece && pieceSide(piece) === mySide) {
          selected = sq;
          render();
          return;
        }
        await sendMove(selected, sq);
        return;
      }
      if (piece && pieceSide(piece) === mySide) {
        selected = selected === sq ? null : sq;
        render();
      }
    }

    async function sendMove(from, to) {
      busy = true;
      const body = { from, to };
      if (isAdmin) body.opponent = opponent;
      const res = await fetch("/api/chess/move", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      busy = false;
      if (res.ok) {
        game = data.game;
        selected = null;
        render();
      } else if (data.error && data.error !== "Illegal move.") {
        statusEl.textContent = data.error;
      } else {
        selected = null;
        render();
      }
    }

    function setRemoveMode(on) {
      removeMode = on;
      document.getElementById("removebtn").textContent = on ? "Cancel remove" : "Remove piece";
      selected = null;
      render();
    }

    async function sendRemove(square) {
      busy = true;
      const res = await fetch("/api/chess/remove", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ opponent, square }),
      });
      const data = await res.json().catch(() => ({}));
      busy = false;
      setRemoveMode(false);
      if (res.ok) {
        game = data.game;
        render();
      } else if (data.error) {
        statusEl.textContent = data.error;
      }
    }

    async function loadGame() {
      if (busy) return;
      const url = isAdmin
        ? "/api/chess/game?opponent=" + encodeURIComponent(opponent || "")
        : "/api/chess/game";
      const res = await fetch(url);
      if (!res.ok) {
        if (res.status === 401) window.location.href = "/";
        return;
      }
      const data = await res.json();
      if (!game || data.game.fen !== game.fen || data.game.opponent !== game.opponent) {
        game = data.game;
        selected = null;
        render();
      }
    }

    async function loadAdminGames() {
      const res = await fetch("/api/chess/games");
      if (!res.ok) return;
      const data = await res.json();
      const select = document.getElementById("opponent");
      const current = opponent;
      select.replaceChildren();
      for (const g of data.games) {
        const opt = document.createElement("option");
        opt.value = g.key;
        opt.textContent = g.opponent + (g.gameOver ? " (finished)" : g.turn === "b" ? " (your move)" : "");
        select.append(opt);
      }
      if (data.games.length === 0) {
        statusEl.textContent = "No games yet — players start games from their dashboards.";
        boardEl.replaceChildren();
        game = null;
        return;
      }
      opponent = data.games.some((g) => g.key === current) ? current : data.games[0].key;
      select.value = opponent;
      await loadGame();
    }

    document.getElementById("opponent").addEventListener("change", (e) => {
      opponent = e.target.value;
      game = null;
      selected = null;
      removeMode = false;
      document.getElementById("removebtn").textContent = "Remove piece";
      loadGame();
    });

    document.getElementById("removebtn").addEventListener("click", () => {
      if (!game || game.gameOver) return;
      setRemoveMode(!removeMode);
    });

    document.getElementById("newgame").addEventListener("click", async () => {
      if (isAdmin && !opponent) return;
      if (!confirm("Start a fresh game? The current board will be cleared.")) return;
      const body = isAdmin ? { opponent } : {};
      const res = await fetch("/api/chess/reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        game = data.game;
        selected = null;
        render();
      }
    });

    document.getElementById("back").addEventListener("click", () => {
      window.location.href = "/dashboard";
    });

    fetch("/api/me")
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then(async (d) => {
        isAdmin = d.username.toLowerCase() === "hermione";
        mySide = isAdmin ? "b" : "w";
        document.getElementById("note").hidden = isAdmin;
        if (isAdmin) {
          document.getElementById("picker").hidden = false;
          document.getElementById("removebtn").hidden = false;
          await loadAdminGames();
          setInterval(loadAdminGames, 4000);
        } else {
          await loadGame();
          setInterval(loadGame, 3000);
        }
      })
      .catch(() => (window.location.href = "/"));
  </script>
</body>
</html>
