<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel - angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/site.css" />
  <script src="/me.js"></script>
  <style>    :root {
      --wedge-a: #ffffff;
      --wedge-b: #FBC3D3;
      --wedge-line: #f7b8c8;
      --wedge-text: #d4718f;
    }    body[data-theme="dark"] {
      --wedge-a: #dcdcdc;
      --wedge-b: #6a6a6a;
      --wedge-line: #8a8a8a;
      --wedge-text: #1f1f1f;
    }
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 20px 0;
    }
    .bow { display: inline-block; }
    .bow.flip { transform: scaleX(-1); }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 572px;
      padding: 2.2rem;
      text-align: center;
      color: var(--text-color);
    }
    .status { font-weight: 600; min-height: 1.4em; margin-bottom: 1.25rem; }
    .status.win { color: var(--heading-color); font-size: 1.1rem; }
    .wheel-wrap {
      position: relative;
      width: min(340px, 82vw);
      margin: 0 auto 1.5rem;
    }
    /* the marker the winning wedge stops under */
    .pointer {
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-top: 22px solid var(--button-bg);
      filter: drop-shadow(0 2px 3px var(--shadow));
      z-index: 2;
    }
    #wheel {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 50%;
      box-shadow: 0 8px 30px var(--shadow);
      transform: rotate(0deg);
    }
    #wheel.spinning { transition: transform 4.2s cubic-bezier(0.15, 0.85, 0.2, 1); }
    .hub {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3.2rem;
      height: 3.2rem;
      border-radius: 50%;
      background: var(--button-bg);
      box-shadow: 0 3px 10px var(--shadow);
      z-index: 1;
    }
    button.pill {
      padding: 0.7rem 1.75rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button.pill:hover:not(:disabled) { background: var(--button-hover-bg); }
    button.pill:disabled { opacity: 0.5; cursor: not-allowed; }
    .note { color: var(--muted-color); font-size: 0.85rem; margin-top: 1rem; }
  </style>
</head>
<body class="has-top-nav">
  <main class="card">
    <p class="status" id="status">Loading…</p>
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <svg id="wheel" viewBox="0 0 200 200" aria-label="Prize wheel"></svg>
      <div class="hub"></div>
    </div>
    <button class="pill" id="spin" type="button" disabled>Spin</button>
    <p class="note" id="note"></p>
  </main>

  <script>


    const SVG_NS = "http://www.w3.org/2000/svg";
    const wheelEl = document.getElementById("wheel");
    const statusEl = document.getElementById("status");
    const noteEl = document.getElementById("note");
    const spinBtn = document.getElementById("spin");

    let segments = [];
    let segAngle = 0;
    let rotation = 0;       // keeps climbing so the wheel always turns forwards
    let spinning = false;

    // angles run clockwise from 12 o'clock, which is where the pointer sits
    function pointOnCircle(cx, cy, r, angleDeg) {
      const a = (angleDeg * Math.PI) / 180;
      return [cx + r * Math.sin(a), cy - r * Math.cos(a)];
    }

    function drawWheel() {
      wheelEl.replaceChildren();
      segAngle = 360 / segments.length;
      segments.forEach((seg, i) => {
        const start = i * segAngle;
        const end = start + segAngle;
        const [x1, y1] = pointOnCircle(100, 100, 100, start);
        const [x2, y2] = pointOnCircle(100, 100, 100, end);
        const path = document.createElementNS(SVG_NS, "path");
        path.setAttribute("d",
          "M 100 100 L " + x1 + " " + y1 +
          " A 100 100 0 " + (segAngle > 180 ? 1 : 0) + " 1 " + x2 + " " + y2 + " Z");
        path.setAttribute("fill", i % 2 === 0 ? "var(--wedge-a)" : "var(--wedge-b)");
        path.setAttribute("stroke", "var(--wedge-line)");
        path.setAttribute("stroke-width", "0.8");
        wheelEl.append(path);

        const mid = start + segAngle / 2;
        const [tx, ty] = pointOnCircle(100, 100, 66, mid);
        const label = document.createElementNS(SVG_NS, "text");
        label.setAttribute("x", tx);
        label.setAttribute("y", ty);
        label.setAttribute("text-anchor", "middle");
        label.setAttribute("dominant-baseline", "central");
        label.setAttribute("font-size", "15");
        label.setAttribute("font-weight", "700");
        label.setAttribute("font-family", "Cause, sans-serif");
        label.setAttribute("fill", "var(--wedge-text)");
        // flip labels past the halfway mark so they never read upside-down
        const spin = mid > 90 && mid < 270 ? mid + 180 : mid;
        label.setAttribute("transform", "rotate(" + spin + " " + tx + " " + ty + ")");
        label.textContent = seg.label;
        wheelEl.append(label);
      });
    }

    function setLocked(state) {
      spinBtn.disabled = !state.canSpin || spinning;
      noteEl.textContent = "";
    }

    async function spin() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      statusEl.textContent = "Spinning…";
      statusEl.classList.remove("win");

      const res = await fetch("/api/wheel/spin", { method: "POST" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        spinning = false;
        statusEl.textContent = data.error || "That didn't work.";
        return;
      }

      // land the winning wedge's centre under the pointer, after a few turns
      const target = 360 - (data.index * segAngle + segAngle / 2);
      const current = ((rotation % 360) + 360) % 360;
      rotation += (5 * 360) + (((target - current) % 360) + 360) % 360;
      wheelEl.classList.add("spinning");
      wheelEl.style.transform = "rotate(" + rotation + "deg)";

      wheelEl.addEventListener("transitionend", () => {
        spinning = false;
        statusEl.textContent = "You won " + data.label + "! You now have " + data.points + " points.";
        statusEl.classList.add("win");
        setLocked({ canSpin: data.canSpin, unlimited: data.canSpin, spunToday: !data.canSpin });
      }, { once: true });
    }

    spinBtn.addEventListener("click", spin);

    window.siteMe()
      .then((d) => {
        return fetch("/api/wheel");
      })
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((state) => {
        segments = state.segments;
        drawWheel();
        setLocked(state);
        statusEl.textContent = state.canSpin ? "" : "Come back tomorrow.";
      })
      .catch(() => (window.location.href = "/"));
  </script>
  <script src="/nav.js" defer></script>
  <script src="/notifications.js" defer></script>
</body>
</html>
