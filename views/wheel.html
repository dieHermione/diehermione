<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel — angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg1: #FBC3D3;
      --bg2: #f6f6f6;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --header-color: #ffffff;
      --heading-color: #FBC3D3;
      --text-color: #333;
      --muted-color: #777;
      --table-border: #eee;
      --table-header-color: #888;
      --button-bg: #FBC3D3;
      --button-text: #ffffff;
      --button-hover-bg: #f7b8c8;
      --shadow: rgba(0, 0, 0, 0.2);
      --input-border: #ddd;
      --input-bg: #fff;
      --input-text: #333;
      --toggle-bg: rgba(255, 255, 255, 0.9);
      --toggle-text: #333;
      --wedge-a: #ffffff;
      --wedge-b: #FBC3D3;
      --wedge-line: #f7b8c8;
      --wedge-text: #d4718f;
    }
    body[data-theme="dark"] {
      --notif-item-bg: rgba(255, 255, 255, 0.07);
      color-scheme: dark;
      --bg1: #141414;
      --bg2: #242424;
      --panel-bg: rgba(32, 32, 32, 0.94);
      --header-color: #f2f2f2;
      --heading-color: #d6d6d6;
      --text-color: #ececec;
      --muted-color: #9e9e9e;
      --table-border: #3a3a3a;
      --table-header-color: #9e9e9e;
      --button-bg: #4a4a4a;
      --button-text: #f2f2f2;
      --button-hover-bg: #5f5f5f;
      --shadow: rgba(0, 0, 0, 0.5);
      --input-border: #4a4a4a;
      --input-bg: #2a2a2a;
      --input-text: #ececec;
      --toggle-bg: rgba(38, 38, 38, 0.95);
      --toggle-text: #ececec;
      --wedge-a: #dcdcdc;
      --wedge-b: #6a6a6a;
      --wedge-line: #8a8a8a;
      --wedge-text: #1f1f1f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Cause", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      padding: 1rem;
      color: var(--text-color);
    }
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 20px 0;
    }
    .bow { display: inline-block; }
    .bow.flip { transform: scaleX(-1); }
    body.has-top-nav {
      justify-content: flex-start;
      padding-top: 1.75rem;
      gap: 1rem;
    }
    .top-nav {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 0.55rem;
      position: relative;
      width: min(100%, 720px);
      padding: 0.65rem 1rem;
      margin: 0 0 0.75rem;
      border-radius: 999px;
      background: var(--panel-bg);
      box-shadow: 0 8px 24px var(--shadow);
      backdrop-filter: blur(8px);
    }
    .top-nav .nav-links {
      grid-column: 2;
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.45rem;
    }
    .top-nav a,
    .top-nav button,
    .top-nav .dropdown-toggle {
      font-family: inherit;   /* buttons don't inherit the page font on their own */
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      border: none;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .top-nav a:hover,
    .top-nav button:hover,
    .top-nav .dropdown-toggle:hover { background: var(--button-hover-bg); }
    .top-nav a.active {
      background: var(--button-hover-bg);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
    }
    .top-nav .dropdown[hidden] { display: none; }
    .top-nav a[hidden] { display: none; }
    .top-nav .dropdown { position: relative; display: inline-flex; }
    /* invisible bridge across the gap so hover survives the trip to the menu */
    .top-nav .dropdown::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      height: 0.5rem;
    }
    .top-nav .dropdown-menu {
      position: absolute;
      top: calc(100% + 0.35rem);
      left: 0;
      display: none;
      flex-direction: column;
      gap: 0.35rem;
      padding: 0.45rem;
      background: var(--panel-bg);
      border-radius: 8px;
      box-shadow: 0 8px 24px var(--shadow);
      min-width: 8rem;
    }
    .top-nav .dropdown:hover .dropdown-menu,
    .top-nav .dropdown:focus-within .dropdown-menu { display: flex; }
    .top-nav .dropdown-menu a { width: 100%; }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 520px;
      padding: 2rem;
      text-align: center;
      color: var(--text-color);
    }
    .status { font-weight: 600; min-height: 1.4em; margin-bottom: 1.25rem; }
    .status.win { color: var(--heading-color); font-size: 1.1rem; }
    .wheel-wrap {
      position: relative;
      width: min(340px, 82vw);
      margin: 0 auto 1.5rem;
    }
    /* the marker the winning wedge stops under */
    .pointer {
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-top: 22px solid var(--button-bg);
      filter: drop-shadow(0 2px 3px var(--shadow));
      z-index: 2;
    }
    #wheel {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 50%;
      box-shadow: 0 8px 30px var(--shadow);
      transform: rotate(0deg);
    }
    #wheel.spinning { transition: transform 4.2s cubic-bezier(0.15, 0.85, 0.2, 1); }
    .hub {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3.2rem;
      height: 3.2rem;
      border-radius: 50%;
      background: var(--button-bg);
      box-shadow: 0 3px 10px var(--shadow);
      z-index: 1;
    }
    button.pill {
      padding: 0.7rem 1.75rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button.pill:hover:not(:disabled) { background: var(--button-hover-bg); }
    button.pill:disabled { opacity: 0.5; cursor: not-allowed; }
    .note { color: var(--muted-color); font-size: 0.85rem; margin-top: 1rem; }
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: 3rem;
      height: 1.6rem;
      padding: 0;
      border: 1px solid var(--input-border);
      border-radius: 999px;
      background: var(--toggle-bg);
      color: transparent;
      box-shadow: 0 6px 16px var(--shadow);
      cursor: pointer;
      overflow: hidden;
    }
    .theme-toggle .thumb {
      position: absolute;
      top: 0.15rem;
      left: 0.15rem;
      width: 1.15rem;
      height: 1.15rem;
      border-radius: 50%;
      background: var(--button-bg);
      display: block;
      transition: left 0.2s ease, background-color 0.2s ease;
    }
    .theme-toggle.is-dark .thumb {
      left: calc(100% - 1.15rem - 0.15rem);
      background: var(--button-hover-bg);
    }
  </style>
</head>
<body class="has-top-nav">
  <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle dark mode"><span class="thumb"></span></button>
  <nav id="top-nav" class="top-nav" hidden>
    <div class="nav-links">
      <a id="nav-dashboard" href="/dashboard">Dashboard</a>
      <a id="nav-admin" href="/admin" hidden>Admin</a>
      <a id="nav-profile" href="/profile">Profile</a>
      <a id="nav-tasks" href="/tasks">Tasks</a>
      <div class="dropdown" id="games-dropdown">
        <button class="dropdown-toggle" type="button">Games ▾</button>
        <div class="dropdown-menu">
          <a id="nav-snake" href="/snake">Snake</a>
          <a id="nav-writing" href="/writing">Writing</a>
          <a id="nav-wheel" href="/wheel">Wheel</a>
          <a id="nav-deathroll" href="/deathroll">Deathroll</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="card">
    <p class="status" id="status">Loading…</p>
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <svg id="wheel" viewBox="0 0 200 200" aria-label="Prize wheel"></svg>
      <div class="hub"></div>
    </div>
    <button class="pill" id="spin" type="button" disabled>Spin</button>
    <p class="note" id="note"></p>
  </main>

  <script>
    const body = document.body;
    const toggle = document.getElementById("theme-toggle");
    const storedTheme = localStorage.getItem("site-theme");
    const systemDark = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
    // no explicit choice yet? follow whatever the browser/OS is set to
    const savedTheme = storedTheme || (systemDark && systemDark.matches ? "dark" : "light");
    const topNav = document.getElementById("top-nav");
    const adminDropdown = document.getElementById("nav-admin");

    function applyTheme(theme, persist) {
      body.dataset.theme = theme;
      if (toggle) {
        toggle.classList.toggle("is-dark", theme === "dark");
        toggle.setAttribute("aria-pressed", String(theme === "dark"));
      }
      if (persist) localStorage.setItem("site-theme", theme);
    }

    applyTheme(savedTheme);
    systemDark?.addEventListener?.("change", (e) => {
      if (!localStorage.getItem("site-theme")) applyTheme(e.matches ? "dark" : "light");
    });
    toggle?.addEventListener("click", () => {
      applyTheme(body.dataset.theme === "dark" ? "light" : "dark", true);
    });

    document.getElementById("nav-wheel").classList.add("active");

    const SVG_NS = "http://www.w3.org/2000/svg";
    const wheelEl = document.getElementById("wheel");
    const statusEl = document.getElementById("status");
    const noteEl = document.getElementById("note");
    const spinBtn = document.getElementById("spin");

    let segments = [];
    let segAngle = 0;
    let rotation = 0;       // keeps climbing so the wheel always turns forwards
    let spinning = false;

    // angles run clockwise from 12 o'clock, which is where the pointer sits
    function pointOnCircle(cx, cy, r, angleDeg) {
      const a = (angleDeg * Math.PI) / 180;
      return [cx + r * Math.sin(a), cy - r * Math.cos(a)];
    }

    function drawWheel() {
      wheelEl.replaceChildren();
      segAngle = 360 / segments.length;
      segments.forEach((seg, i) => {
        const start = i * segAngle;
        const end = start + segAngle;
        const [x1, y1] = pointOnCircle(100, 100, 100, start);
        const [x2, y2] = pointOnCircle(100, 100, 100, end);
        const path = document.createElementNS(SVG_NS, "path");
        path.setAttribute("d",
          "M 100 100 L " + x1 + " " + y1 +
          " A 100 100 0 " + (segAngle > 180 ? 1 : 0) + " 1 " + x2 + " " + y2 + " Z");
        path.setAttribute("fill", i % 2 === 0 ? "var(--wedge-a)" : "var(--wedge-b)");
        path.setAttribute("stroke", "var(--wedge-line)");
        path.setAttribute("stroke-width", "0.8");
        wheelEl.append(path);

        const mid = start + segAngle / 2;
        const [tx, ty] = pointOnCircle(100, 100, 66, mid);
        const label = document.createElementNS(SVG_NS, "text");
        label.setAttribute("x", tx);
        label.setAttribute("y", ty);
        label.setAttribute("text-anchor", "middle");
        label.setAttribute("dominant-baseline", "central");
        label.setAttribute("font-size", "15");
        label.setAttribute("font-weight", "700");
        label.setAttribute("font-family", "Cause, sans-serif");
        label.setAttribute("fill", "var(--wedge-text)");
        // flip labels past the halfway mark so they never read upside-down
        const spin = mid > 90 && mid < 270 ? mid + 180 : mid;
        label.setAttribute("transform", "rotate(" + spin + " " + tx + " " + ty + ")");
        label.textContent = seg.label;
        wheelEl.append(label);
      });
    }

    function setLocked(state) {
      spinBtn.disabled = !state.canSpin || spinning;
      if (state.unlimited) {
        noteEl.textContent = "Spin as often as you like.";
      } else if (state.spunToday) {
        noteEl.textContent = "You've had your spin — the wheel resets at noon Eastern.";
      } else {
        noteEl.textContent = "One spin a day. Resets at noon Eastern.";
      }
    }

    async function spin() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      statusEl.textContent = "Spinning…";
      statusEl.classList.remove("win");

      const res = await fetch("/api/wheel/spin", { method: "POST" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        spinning = false;
        statusEl.textContent = data.error || "That didn't work.";
        return;
      }

      // land the winning wedge's centre under the pointer, after a few turns
      const target = 360 - (data.index * segAngle + segAngle / 2);
      const current = ((rotation % 360) + 360) % 360;
      rotation += (5 * 360) + (((target - current) % 360) + 360) % 360;
      wheelEl.classList.add("spinning");
      wheelEl.style.transform = "rotate(" + rotation + "deg)";

      wheelEl.addEventListener("transitionend", () => {
        spinning = false;
        statusEl.textContent = "You won " + data.label + "! You now have $" + data.dollars + ".";
        statusEl.classList.add("win");
        setLocked({ canSpin: data.canSpin, unlimited: data.canSpin, spunToday: !data.canSpin });
      }, { once: true });
    }

    spinBtn.addEventListener("click", spin);

    fetch("/api/me")
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((d) => {
        topNav.hidden = false;
        adminDropdown.hidden = !d.isAdmin;
        return fetch("/api/wheel");
      })
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((state) => {
        segments = state.segments;
        drawWheel();
        setLocked(state);
        statusEl.textContent = state.canSpin ? "Give it a spin." : "Come back tomorrow.";
      })
      .catch(() => (window.location.href = "/"));
  </script>
  <script src="/notifications.js" defer></script>
</body>
</html>
