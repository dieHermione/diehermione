<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deathroll — angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg1: #FBC3D3;
      --bg2: #f6f6f6;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --header-color: #ffffff;
      --heading-color: #FBC3D3;
      --text-color: #333;
      --muted-color: #777;
      --table-border: #eee;
      --table-header-color: #888;
      --button-bg: #FBC3D3;
      --button-text: #ffffff;
      --button-hover-bg: #f7b8c8;
      --shadow: rgba(0, 0, 0, 0.2);
      --input-border: #ddd;
      --input-bg: #fff;
      --input-text: #333;
      --toggle-bg: rgba(255, 255, 255, 0.9);
      --toggle-text: #333;
    }
    body[data-theme="dark"] {
      --notif-item-bg: rgba(255, 255, 255, 0.07);
      color-scheme: dark;
      --bg1: #141414;
      --bg2: #242424;
      --panel-bg: rgba(32, 32, 32, 0.94);
      --header-color: #f2f2f2;
      --heading-color: #d6d6d6;
      --text-color: #ececec;
      --muted-color: #9e9e9e;
      --table-border: #3a3a3a;
      --table-header-color: #9e9e9e;
      --button-bg: #4a4a4a;
      --button-text: #f2f2f2;
      --button-hover-bg: #5f5f5f;
      --shadow: rgba(0, 0, 0, 0.5);
      --input-border: #4a4a4a;
      --input-bg: #2a2a2a;
      --input-text: #ececec;
      --toggle-bg: rgba(38, 38, 38, 0.95);
      --toggle-text: #ececec;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Cause", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      padding: 1rem;
      color: var(--text-color);
    }
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 20px 0;
    }
    .bow { display: inline-block; }
    .bow.flip { transform: scaleX(-1); }
    body.has-top-nav {
      justify-content: flex-start;
      padding-top: 1.75rem;
      gap: 1rem;
    }
    .top-nav {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 0.55rem;
      position: relative;
      width: min(100%, 720px);
      padding: 0.65rem 1rem;
      margin: 0 0 0.75rem;
      border-radius: 999px;
      background: var(--panel-bg);
      box-shadow: 0 8px 24px var(--shadow);
      backdrop-filter: blur(8px);
    }
    .top-nav .nav-links {
      grid-column: 2;
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.45rem;
    }
    .top-nav a,
    .top-nav button,
    .top-nav .dropdown-toggle {
      font-family: inherit;   /* buttons don't inherit the page font on their own */
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      border: none;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .top-nav a:hover,
    .top-nav button:hover,
    .top-nav .dropdown-toggle:hover { background: var(--button-hover-bg); }
    .top-nav a.active {
      background: var(--button-hover-bg);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
    }
    .top-nav .dropdown[hidden] { display: none; }
    .top-nav a[hidden] { display: none; }
    .top-nav .dropdown { position: relative; display: inline-flex; }
    /* invisible bridge across the gap so hover survives the trip to the menu */
    .top-nav .dropdown::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      height: 0.5rem;
    }
    .top-nav .dropdown-menu {
      position: absolute;
      top: calc(100% + 0.35rem);
      left: 0;
      display: none;
      flex-direction: column;
      gap: 0.35rem;
      padding: 0.45rem;
      background: var(--panel-bg);
      border-radius: 8px;
      box-shadow: 0 8px 24px var(--shadow);
      min-width: 8rem;
    }
    .top-nav .dropdown:hover .dropdown-menu,
    .top-nav .dropdown:focus-within .dropdown-menu { display: flex; }
    .top-nav .dropdown-menu a { width: 100%; }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 520px;
      padding: 2rem;
      text-align: center;
      color: var(--text-color);
    }
    .dr-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;   /* equal spacers keep the board centred */
      align-items: start;
      gap: 1.5rem;
      width: 100%;
    }
    .dr-grid > .card:not(.player-card) { grid-column: 2; width: min(520px, 92vw); }
    .dr-grid > .player-card { width: 260px; padding: 1.75rem 1.35rem; }
    .dr-grid > .player-card.me { grid-column: 1; justify-self: end; }
    .dr-grid > .player-card.them { grid-column: 3; justify-self: start; }
    @media (max-width: 1150px) {
      .dr-grid { display: flex; flex-direction: column; align-items: center; }
      .dr-grid > .player-card { width: 100%; max-width: 520px; }
    }
    .player-card .role {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--table-header-color);
      margin-bottom: 0.6rem;
    }
    .player-card .avatar, .player-card .avatar-fallback {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      margin: 0 auto 0.75rem;
      box-shadow: 0 6px 20px var(--shadow);
      border: 4px solid var(--button-bg);
      background: linear-gradient(135deg, #FBC3D3, #f7b8c8);
    }
    .player-card .avatar { object-fit: cover; display: block; }
    .player-card .avatar-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Cause", sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: #ffffff;
    }
    .player-card .name {
      font-family: "Cause", sans-serif;
      font-weight: 700;
      color: var(--heading-color);
      margin-bottom: 0.3rem;
    }
    .player-card .badge {
      display: inline-block;
      padding: 0.18rem 0.7rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      background: var(--table-border);
      color: var(--muted-color);
      margin-bottom: 0.9rem;
    }
    .player-card .badge.princess { background: var(--button-bg); color: var(--button-text); }
    .player-card .stat {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      padding: 0.25rem 0;
    }
    .player-card .stat .k { color: var(--table-header-color); text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.05em; align-self: center; }
    .player-card .stat .v { font-weight: 700; }
    .status { font-weight: 600; min-height: 1.4em; margin-bottom: 1.25rem; }
    .status.lost { color: #d4607f; }
    .status.won { color: var(--heading-color); font-size: 1.1rem; }
    .picker { margin-bottom: 1.25rem; display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
    .picker[hidden] { display: none; }   /* display:flex would otherwise beat the hidden attribute */
    select, input[type="number"] {
      padding: 0.5rem 0.7rem;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      background: var(--input-bg);
      color: var(--input-text);
    }
    input[type="number"] { width: 8rem; }
    select:focus, input:focus { outline: none; border-color: var(--button-hover-bg); }
    /* the big number you're about to roll against */
    .die {
      width: min(220px, 60vw);
      aspect-ratio: 1;
      margin: 0 auto 1.25rem;
      border-radius: 24px;
      background: linear-gradient(135deg, #FBC3D3, #f7b8c8);
      box-shadow: 0 10px 30px var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ffffff;
    }
    .die .cap {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.9;
    }
    .die .value {
      font-family: "Cause", sans-serif;
      font-size: clamp(2.4rem, 12vw, 3.6rem);
      font-weight: 700;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }
    .die.rolling .value { animation: flicker 0.09s steps(2) infinite; }
    @keyframes flicker { 0% { opacity: 1; } 100% { opacity: 0.45; } }
    .die.dead { background: linear-gradient(135deg, #c96b86, #e8748f); }
    .log {
      max-height: 11rem;
      overflow-y: auto;
      text-align: left;
      border: 1px solid var(--table-border);
      border-radius: 10px;
      padding: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .log-row {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      font-size: 0.85rem;
    }
    .log-row + .log-row { margin-top: 0.2rem; }
    .log-row.hermione { background: rgba(251, 195, 211, 0.12); }
    .log-row .who { font-weight: 700; }
    .log-row .roll { font-weight: 700; color: var(--heading-color); }
    .log-row.fatal .roll { color: #d4607f; }
    .log-empty { color: var(--muted-color); font-style: italic; font-size: 0.85rem; padding: 0.75rem; text-align: center; }
    .actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    button.pill {
      padding: 0.7rem 1.6rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button.pill:hover:not(:disabled) { background: var(--button-hover-bg); }
    button.pill:disabled { opacity: 0.5; cursor: not-allowed; }
    .note { color: var(--muted-color); font-size: 0.85rem; margin-top: 1rem; }
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: 3rem;
      height: 1.6rem;
      padding: 0;
      border: 1px solid var(--input-border);
      border-radius: 999px;
      background: var(--toggle-bg);
      color: transparent;
      box-shadow: 0 6px 16px var(--shadow);
      cursor: pointer;
      overflow: hidden;
    }
    .theme-toggle .thumb {
      position: absolute;
      top: 0.15rem;
      left: 0.15rem;
      width: 1.15rem;
      height: 1.15rem;
      border-radius: 50%;
      background: var(--button-bg);
      display: block;
      transition: left 0.2s ease, background-color 0.2s ease;
    }
    .theme-toggle.is-dark .thumb {
      left: calc(100% - 1.15rem - 0.15rem);
      background: var(--button-hover-bg);
    }

    /* greyscale dark mode */
    body[data-theme="dark"] .die { background: linear-gradient(135deg, #5a5a5a, #7a7a7a); }
    body[data-theme="dark"] .die.dead { background: linear-gradient(135deg, #3a3a3a, #565656); }
    body[data-theme="dark"] .log-row.hermione { background: rgba(255, 255, 255, 0.07); }
    body[data-theme="dark"] .status.lost { color: #bdbdbd; }
    body[data-theme="dark"] .player-card .avatar,
    body[data-theme="dark"] .player-card .avatar-fallback { background: linear-gradient(135deg, #5a5a5a, #7a7a7a); }
  </style>
</head>
<body class="has-top-nav">
  <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle dark mode"><span class="thumb"></span></button>
  <nav id="top-nav" class="top-nav" hidden>
    <div class="nav-links">
      <a id="nav-dashboard" href="/dashboard">Dashboard</a>
      <a id="nav-admin" href="/admin" hidden>Admin</a>
      <a id="nav-profile" href="/profile">Profile</a>
      <a id="nav-tasks" href="/tasks">Tasks</a>
      <div class="dropdown" id="games-dropdown">
        <button class="dropdown-toggle" type="button">Games ▾</button>
        <div class="dropdown-menu">
          <a id="nav-snake" href="/snake">Snake</a>
          <a id="nav-writing" href="/writing">Writing</a>
          <a id="nav-wheel" href="/wheel">Wheel</a>
          <a id="nav-deathroll" href="/deathroll">Deathroll</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="dr-grid">
    <aside class="card player-card me" id="card-me" hidden></aside>
    <main class="card">
    <div class="picker" id="admin-picker" hidden>
      <select id="opponent"></select>
      <input type="number" id="sides" min="2" max="1000000" placeholder="e.g. 500" />
      <button class="pill" id="start" type="button">New roll</button>
    </div>

    <p class="status" id="status">Loading…</p>

    <div class="die" id="die">
      <span class="cap" id="die-cap">rolling</span>
      <span class="value" id="die-value">—</span>
    </div>

    <div class="log" id="log"></div>

    <div class="actions">
      <button class="pill" id="roll" type="button" disabled>Roll</button>
    </div>
    <p class="note" id="note">Whoever rolls a 1 loses.</p>
    </main>
    <aside class="card player-card them" id="card-them" hidden></aside>
  </div>

  <script>
    const body = document.body;
    const toggle = document.getElementById("theme-toggle");
    const storedTheme = localStorage.getItem("site-theme");
    const systemDark = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
    // no explicit choice yet? follow whatever the browser/OS is set to
    const savedTheme = storedTheme || (systemDark && systemDark.matches ? "dark" : "light");
    const topNav = document.getElementById("top-nav");
    const adminDropdown = document.getElementById("nav-admin");

    function applyTheme(theme, persist) {
      body.dataset.theme = theme;
      if (toggle) {
        toggle.classList.toggle("is-dark", theme === "dark");
        toggle.setAttribute("aria-pressed", String(theme === "dark"));
      }
      if (persist) localStorage.setItem("site-theme", theme);
    }

    applyTheme(savedTheme);
    systemDark?.addEventListener?.("change", (e) => {
      if (!localStorage.getItem("site-theme")) applyTheme(e.matches ? "dark" : "light");
    });
    toggle?.addEventListener("click", () => {
      applyTheme(body.dataset.theme === "dark" ? "light" : "dark", true);
    });

    document.getElementById("nav-deathroll").classList.add("active");

    let isAdmin = false;
    let opponent = null;   // admin only: whose game is on screen
    let game = null;
    let rolling = false;

    const statusEl = document.getElementById("status");
    const dieEl = document.getElementById("die");
    const dieCap = document.getElementById("die-cap");
    const dieValue = document.getElementById("die-value");
    const rollBtn = document.getElementById("roll");
    const logEl = document.getElementById("log");

    function renderLog() {
      logEl.replaceChildren();
      if (!game || !game.history.length) {
        const empty = document.createElement("p");
        empty.className = "log-empty";
        empty.textContent = "No rolls yet.";
        logEl.append(empty);
        return;
      }
      // newest at the top
      [...game.history].reverse().forEach((h) => {
        const row = document.createElement("div");
        row.className = "log-row " + h.by + (h.result === 1 ? " fatal" : "");
        const who = document.createElement("span");
        who.className = "who";
        who.textContent = h.by === "hermione" ? "Hermione" : (game.opponent || "You");
        const roll = document.createElement("span");
        roll.className = "roll";
        roll.textContent = "d" + h.sides + " → " + h.result ;
        row.append(who, roll);
        logEl.append(row);
      });
      logEl.scrollTop = 0;
    }

    function render() {
      if (!game) {
        statusEl.textContent = isAdmin
          ? "Pick someone and a number to start."
          : "Hermione hasn't started a roll with you yet.";
        statusEl.className = "status";
        dieCap.textContent = "waiting";
        dieValue.textContent = "—";
        dieEl.classList.remove("dead");
        rollBtn.disabled = true;
        renderLog();
        return;
      }

      dieCap.textContent = game.over ? "final roll" : "roll 1d";
      dieValue.textContent = game.over
        ? (game.history.length ? game.history[game.history.length - 1].result : game.sides)
        : game.sides;
      dieEl.classList.toggle("dead", game.over);

      if (game.over) {
        const iLost = (isAdmin && game.loser === "hermione") || (!isAdmin && game.loser === "player");
        const loserName = game.loser === "hermione" ? "Hermione" : game.opponent;
        statusEl.textContent = iLost
          ? "You rolled a 1. You lose."
          : loserName + " rolled a 1 — you win!";
        statusEl.className = "status " + (iLost ? "lost" : "won");
        rollBtn.disabled = true;
      } else if (game.yourTurn) {
        statusEl.textContent = "Your roll — 1d" + game.sides + ".";
        statusEl.className = "status";
        rollBtn.disabled = rolling;
      } else {
        statusEl.textContent = game.turn === "hermione"
          ? "Waiting on Hermione…"
          : "Waiting on " + game.opponent + "…";
        statusEl.className = "status";
        rollBtn.disabled = true;
      }
      renderLog();
    }

    async function loadGame() {
      if (isAdmin && !opponent) { game = null; render(); return; }
      const url = "/api/deathroll/game" + (isAdmin ? "?opponent=" + encodeURIComponent(opponent) : "");
      const res = await fetch(url);
      if (!res.ok) return;
      const data = await res.json();
      game = data.game;
      render();
    }

    async function roll() {
      if (rolling || !game || !game.yourTurn) return;
      rolling = true;
      rollBtn.disabled = true;
      dieEl.classList.add("rolling");

      const res = await fetch("/api/deathroll/roll", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(isAdmin ? { opponent } : {}),
      });
      const data = await res.json().catch(() => ({}));

      // let the flicker run briefly so the result lands rather than blinks
      await new Promise((r) => setTimeout(r, 550));
      dieEl.classList.remove("rolling");
      rolling = false;

      if (!res.ok) {
        statusEl.textContent = data.error || "That didn't work.";
        await loadGame();
        return;
      }
      game = data.game;
      render();
    }

    // --- the two player cards flanking the board ---
    let myName = null;

    async function renderPlayerCard(el, username, role) {
      if (!username) { el.hidden = true; return; }
      const res = await fetch("/api/profile/" + encodeURIComponent(username));
      if (!res.ok) { el.hidden = true; return; }
      const p = (await res.json()).profile;

      const parts = [];
      const roleEl = document.createElement("div");
      roleEl.className = "role";
      roleEl.textContent = role;
      parts.push(roleEl);

      if (p.icon) {
        const img = document.createElement("img");
        img.className = "avatar";
        img.src = p.icon;
        img.alt = p.username;
        parts.push(img);
      } else {
        const fb = document.createElement("div");
        fb.className = "avatar-fallback";
        fb.textContent = (p.username[0] || "?").toUpperCase();
        parts.push(fb);
      }

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = p.username;
      parts.push(name);

      if (p.rank) {
        const badge = document.createElement("span");
        badge.className = "badge" + (p.rank === "Princess" ? " princess" : "");
        badge.textContent = p.rank;
        parts.push(badge);
      }

      const stats = [["Pronouns", p.pronouns || "—"]];
      if (p.points !== null) stats.push(["Points", p.points]);   // hermione has none
      stats.push(["Dollars", "$" + p.dollars]);
      stats.forEach(([k, v]) => {
          const row = document.createElement("div");
          row.className = "stat";
          const ke = document.createElement("span"); ke.className = "k"; ke.textContent = k;
          const ve = document.createElement("span"); ve.className = "v"; ve.textContent = v;
          row.append(ke, ve);
          parts.push(row);
        });

      el.replaceChildren(...parts);
      el.hidden = false;
    }

    function refreshCards() {
      renderPlayerCard(document.getElementById("card-me"), myName, "You");
      const them = isAdmin ? opponent : "hermione";
      renderPlayerCard(document.getElementById("card-them"), them, "Opponent");
    }

    rollBtn.addEventListener("click", roll);

    document.getElementById("start").addEventListener("click", async () => {
      const sides = parseInt(document.getElementById("sides").value, 10);
      const res = await fetch("/api/deathroll/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ opponent, sides }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        statusEl.textContent = data.error || "Couldn't start that.";
        return;
      }
      game = data.game;
      render();
    });

    document.getElementById("opponent").addEventListener("change", (e) => {
      opponent = e.target.value;
      loadGame();
      refreshCards();
    });

    async function initAdminPicker() {
      const res = await fetch("/api/deathroll/games");
      if (!res.ok) return;
      const data = await res.json();
      const select = document.getElementById("opponent");
      select.replaceChildren(...data.players.map((p) => {
        const opt = document.createElement("option");
        opt.value = p.username;
        opt.textContent = p.username + (p.yourTurn ? " (your roll)" : "");
        return opt;
      }));
      if (data.players.length) {
        opponent = data.players[0].username;
        select.value = opponent;
      }
      document.getElementById("admin-picker").hidden = false;
    }

    fetch("/api/me")
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then(async (d) => {
        topNav.hidden = false;
        isAdmin = Boolean(d.isAdmin);
        myName = d.username;
        adminDropdown.hidden = !isAdmin;
        if (isAdmin) await initAdminPicker();
        await loadGame();
        refreshCards();
        // the other player's roll arrives while you're sitting here
        setInterval(() => { if (!rolling) loadGame(); }, 4000);
      })
      .catch(() => (window.location.href = "/"));
  </script>
  <script src="/notifications.js" defer></script>
</body>
</html>
