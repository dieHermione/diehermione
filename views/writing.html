<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing - angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/site.css" />
  <script src="/me.js"></script>
  <style>
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 20px 0;
    }
    .bow { display: inline-block; }
    .bow.flip { transform: scaleX(-1); }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 720px;
      padding: 2rem;
      color: var(--text-color);
    }
    h2 {
      font-family: "Cause", sans-serif;
      font-size: 1.1rem;
      color: var(--heading-color);
      margin-bottom: 1rem;
      text-align: center;
    }
    /* --- the shelf of passages --- */
    .shelf {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      max-height: 26rem;
      overflow-y: auto;
      padding: 0.35rem 0.25rem;
      scroll-snap-type: y proximity;
    }
    .shelf::-webkit-scrollbar { width: 8px; }
    .shelf::-webkit-scrollbar-track { background: transparent; }
    .shelf::-webkit-scrollbar-thumb {
      background: var(--button-bg);
      border-radius: 999px;
    }
    .passage-card {
      flex: 0 0 auto;
      width: 100%;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 1rem 1.1rem;
      border: 1px solid var(--table-border);
      border-radius: 12px;
      background: rgba(251, 195, 211, 0.08);
      color: var(--text-color);
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease;
    }
    .passage-card:hover {
      transform: translateY(-2px);
      border-color: var(--button-bg);
    }
    .passage-card { position: relative; }
    .edit-pencil {
      position: absolute;
      top: 50%;
      right: 0.6rem;
      transform: translateY(-50%);
      width: 1.5rem;
      height: 1.5rem;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 0.78rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.85;
      transition: opacity 0.12s ease, transform 0.12s ease;
    }
    .edit-pencil:hover { opacity: 1; }
    .passage-card { padding-right: 2.9rem; }   /* room for the pencil */
    .editor label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--table-header-color);
      margin-bottom: 0.3rem;
    }
    .editor input, .editor textarea {
      width: 100%;
      padding: 0.55rem 0.7rem;
      margin-bottom: 1rem;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      background: var(--input-bg);
      color: var(--input-text);
    }
    .editor textarea { min-height: 8rem; resize: vertical; line-height: 1.5; }
    .editor input:focus, .editor textarea:focus { outline: none; border-color: var(--button-hover-bg); }
    .editor .error {
      display: none;
      color: #d4607f;
      background: rgba(251, 195, 211, 0.15);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .passage-card .name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--heading-color);
    }
    .passage-card .count {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted-color);
      white-space: nowrap;
    }
    .mistakes {
      display: inline-block;
      margin-left: 0.5rem;
      font-weight: 700;
      color: #d4607f;
    }
    .progress-note { color: var(--muted-color); font-size: 0.8rem; margin-bottom: 0.75rem; }
    /* hover hint describing what a category holds, like the signup rank tips */
    .passage-card[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 0.4rem);
      left: 1rem;
      right: 1rem;
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      background: var(--panel-solid, #ffffff);
      color: var(--text-color);
      box-shadow: 0 8px 24px var(--shadow);
      border: 1px solid var(--table-border);
      font-size: 0.78rem;
      font-weight: 500;
      line-height: 1.35;
      text-align: left;
      white-space: normal;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 30;
    }
    .passage-card[data-tip]:hover::after,
    .passage-card[data-tip]:focus-visible::after { opacity: 1; visibility: visible; }
    /* --- the typing game --- */
    #game[hidden] { display: none; }
    .target {
      font-size: 1.05rem;
      line-height: 1.7;
      letter-spacing: 0.01em;
      padding: 1.25rem;
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--muted-color);
      border: 2px solid var(--table-border);
      user-select: none;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin-bottom: 1rem;
      transition: border-color 0.15s ease;
    }
    .target.armed { border-color: var(--button-bg); }
    .target.wrong { border-color: #e8748f; animation: shake 0.25s; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .target .done { color: var(--heading-color); font-weight: 600; }
    .target .cursor {
      background: var(--button-bg);
      color: var(--button-text);
      border-radius: 2px;
    }
    .status {
      text-align: center;
      font-weight: 600;
      min-height: 1.4em;
      margin-bottom: 1rem;
    }
    .status.win { color: var(--heading-color); }
    .bar {
      height: 6px;
      border-radius: 999px;
      background: var(--table-border);
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--button-bg);
      transition: width 0.1s linear;
    }
    .actions { display: flex; gap: 0.75rem; justify-content: center; }
    button.pill {
      padding: 0.6rem 1.25rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button.pill:hover { background: var(--button-hover-bg); }
    .note { color: var(--muted-color); font-size: 0.85rem; margin-top: 1rem; text-align: center; }
    .results { text-align: center; }
    .results[hidden] { display: none; }
    .results-line {
      font-weight: 700;
      font-size: 1rem;
      color: var(--heading-color);
      margin-bottom: 1rem;
    }
    #target[hidden], #play-actions[hidden] { display: none; }

    /* greyscale dark mode */
    body[data-theme="dark"] .mistakes { color: #bdbdbd; }
    body[data-theme="dark"] .editor .error { color: #d0d0d0; background: rgba(255, 255, 255, 0.07); }
    body[data-theme="dark"] .passage-card { background: rgba(255, 255, 255, 0.05); }
  </style>
</head>
<body class="has-top-nav">
  <section class="card" id="picker">
    <h2>Choose a category</h2>
    <div class="shelf" id="shelf"></div>
    <p class="note">Type for Princess.</p>
  </section>

  <section class="card editor" id="editor" hidden>
    <h2>Edit category</h2>
    <div class="error" id="edit-error"></div>
    <label for="edit-title">Title</label>
    <input type="text" id="edit-title" maxlength="120" />
    <label for="edit-desc">Description (shown on hover)</label>
    <input type="text" id="edit-desc" maxlength="200" />
    <label for="edit-text">Passages, leave a blank line between each</label>
    <textarea id="edit-text" maxlength="2000"></textarea>
    <div class="actions">
      <button class="pill" id="edit-save" type="button">Save</button>
      <button class="pill" id="edit-cancel" type="button">Cancel</button>
    </div>
  </section>

  <section class="card" id="game" hidden>
    <h2 id="game-title">…</h2>
    <p class="progress-note" id="progress"></p>
    <p class="status" id="status">Start typing.</p>
    <div class="bar"><span id="bar-fill"></span></div>
    <div class="target" id="target"></div>
    <div class="actions" id="play-actions">
      <button class="pill" id="restart" type="button">Restart</button>
      <button class="pill" id="exit-early" type="button" hidden>Exit early</button>
    </div>
    <div class="results" id="results" hidden>
      <p class="results-line" id="results-summary"></p>
      <button class="pill" id="results-done" type="button">Back to categories</button>
    </div>
  </section>

  <script>


    // --- game state ---
    let categories = [];
    let isAdmin = false;
    let queue = [];        // this run's passages, already shuffled by the server
    let index = 0;         // which passage of the category we're on
    let current = null;    // the passage being typed
    let typed = 0;         // characters correct so far in this passage
    let mistakes = 0;      // wrong keys across the whole category
    let finished = false;
    let categoryTitle = "";
    let startedAt = 0;     // when this series began, for the results screen
    let passagesDone = 0;  // successful passages this series
    let lettersThisSeries = 0;
    const REQUIRED_PASSAGES = 50;   // a series is 50 passages, looping the category
    function shuffleInPlace(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
    }

    const targetEl = document.getElementById("target");
    const statusEl = document.getElementById("status");
    const fillEl = document.getElementById("bar-fill");

    function renderShelf() {
      const shelf = document.getElementById("shelf");
      shelf.replaceChildren(...categories.map((c) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "passage-card";
        const name = document.createElement("span");
        name.className = "name";
        name.textContent = c.title;
        const count = document.createElement("span");
        count.className = "count";
        count.textContent = c.count + (c.count === 1 ? " passage" : " passages");
        card.append(name, count);
        if (c.description) card.setAttribute("data-tip", c.description);
        card.addEventListener("click", () => openCategory(c));
        if (isAdmin) {
          const pencil = document.createElement("button");
          pencil.type = "button";
          pencil.className = "edit-pencil";
          pencil.textContent = "✎";
          pencil.title = "Edit this category";
          pencil.setAttribute("aria-label", "Edit " + c.title);
          pencil.addEventListener("click", (e) => {
            e.stopPropagation();          // don't start the game
            openEditor(c);
          });
          card.append(pencil);
        }
        return card;
      }));
    }

    function renderTarget() {
      const done = current.text.slice(0, typed);
      const next = current.text.slice(typed, typed + 1);
      const rest = current.text.slice(typed + 1);
      targetEl.replaceChildren();
      const doneEl = document.createElement("span");
      doneEl.className = "done";
      doneEl.textContent = done;
      const cursorEl = document.createElement("span");
      cursorEl.className = "cursor";
      cursorEl.textContent = next;
      targetEl.append(doneEl, cursorEl, document.createTextNode(rest));
      const pct = (typed / current.text.length) * 100;
      fillEl.style.width = pct + "%";
    }

    async function openCategory(c) {
      const res = await fetch("/api/writing/" + encodeURIComponent(c.id));
      if (!res.ok) return;
      const data = await res.json();
      queue = data.passages || [];
      if (!queue.length) return;
      categoryTitle = data.category.title;
      index = 0;
      mistakes = 0;
      passagesDone = 0;
      lettersThisSeries = 0;
      startedAt = Date.now();
      document.getElementById("results").hidden = true;
      document.getElementById("target").hidden = false;
      document.getElementById("play-actions").hidden = false;
      startPassage();
      document.getElementById("picker").hidden = true;
      document.getElementById("game").hidden = false;
    }

    function startPassage() {
      current = queue[index];
      typed = 0;
      finished = false;
      document.getElementById("game-title").textContent = categoryTitle;
      statusEl.textContent = "Start typing.";
      statusEl.classList.remove("win");
      targetEl.classList.add("armed");
      renderProgress();
      renderTarget();
    }

    function renderProgress() {
      const el = document.getElementById("progress");
      el.textContent = "Passage " + (passagesDone + 1) + " of " + REQUIRED_PASSAGES;
      if (mistakes) {
        const m = document.createElement("span");
        m.className = "mistakes";
        m.textContent = "· " + mistakes + (mistakes === 1 ? " mistake" : " mistakes");
        el.append(m);
      }
    }

    function restart() {
      typed = 0;
      finished = false;
      statusEl.textContent = "Start typing.";
      statusEl.classList.remove("win");
      targetEl.classList.remove("wrong");
      renderTarget();
    }

    function noteMistake() {
      mistakes++;
      renderProgress();
      targetEl.classList.remove("wrong");
      void targetEl.offsetWidth;   // reflow so the shake can replay
      targetEl.classList.add("wrong");
    }

    function finish() {
      lettersThisSeries += [...current.text].length;
      passagesDone++;
      if (passagesDone < REQUIRED_PASSAGES) {
        index++;
        if (index >= queue.length) { shuffleInPlace(queue); index = 0; }  // loop the category
        startPassage();
        statusEl.textContent = "Next one.";
        return;
      }
      finished = true;
      targetEl.classList.remove("armed");
      statusEl.textContent = mistakes
        ? "Complete with " + mistakes + (mistakes === 1 ? " mistake." : " mistakes.")
        : "Complete, flawlessly.";
      statusEl.classList.add("win");
      showResults(passagesDone, mistakes, Date.now() - startedAt);
    }

    function fmtDuration(ms) {
      const total = Math.round(ms / 1000);
      const m = Math.floor(total / 60);
      const sec = total % 60;
      return m ? m + "m " + sec + "s" : sec + "s";
    }

    function showResults(passages, misses, elapsedMs) {
      document.getElementById("play-actions").hidden = true;
      document.getElementById("target").hidden = true;
      document.getElementById("results-summary").textContent =
        passages + (passages === 1 ? " passage" : " passages") + " · " +
        misses + (misses === 1 ? " mistake" : " mistakes") + " · " + fmtDuration(elapsedMs);
      document.getElementById("results").hidden = false;
      // report the finished series so Hermione can see it
      fetch("/api/writing/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ category: categoryTitle, passages, mistakes: misses, elapsedMs, letters: lettersThisSeries }),
      }).catch(() => {});
    }

    document.addEventListener("keydown", (e) => {
      if (!current || finished) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;   // leave shortcuts alone

      if (e.key === "Backspace") {
        e.preventDefault();                              // no going back
        return;
      }

      let key = e.key;
      if (key === "Enter") key = "\n";
      if (key.length !== 1 && key !== "\n") return;      // ignore Shift, arrows, F-keys…
      e.preventDefault();

      if (key === current.text[typed]) {
        typed++;
        targetEl.classList.remove("wrong");
        if (typed === current.text.length) {
          renderTarget();
          finish();
          return;
        }
        renderTarget();
      } else {
        noteMistake();
      }
    });

    // pasting would defeat the whole exercise
    ["paste", "drop"].forEach((evt) =>
      document.addEventListener(evt, (e) => e.preventDefault())
    );

    let editing = null;

    function openEditor(c) {
      editing = c;
      document.getElementById("picker").hidden = true;
      document.getElementById("editor").hidden = false;
      document.getElementById("edit-error").style.display = "none";
      document.getElementById("edit-title").value = c.title;
      document.getElementById("edit-desc").value = c.description || "";
      // fetch the passages only when actually editing them
      fetch("/api/writing/" + encodeURIComponent(c.id))
        .then((r) => (r.ok ? r.json() : Promise.reject()))
        .then((d) => {
          document.getElementById("edit-text").value =
            (d.passages || []).map((x) => x.text).join("\n\n");
        })
        .catch(() => {});
    }

    function closeEditor() {
      editing = null;
      document.getElementById("editor").hidden = true;
      document.getElementById("picker").hidden = false;
    }

    document.getElementById("edit-cancel").addEventListener("click", closeEditor);

    document.getElementById("edit-save").addEventListener("click", async () => {
      if (!editing) return;
      const passages = document.getElementById("edit-text").value
        .split(/\n\s*\n/)                      // a blank line separates passages
        .map((t) => t.trim())
        .filter(Boolean);
      const res = await fetch("/api/writing/" + encodeURIComponent(editing.id), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title: document.getElementById("edit-title").value,
          description: document.getElementById("edit-desc").value,
          passages,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = document.getElementById("edit-error");
        err.textContent = data.error || "Saving failed.";
        err.style.display = "block";
        return;
      }
      Object.assign(editing, data.category);
      renderShelf();
      closeEditor();
    });

    document.getElementById("restart").addEventListener("click", () => restart());
    // control only returns once the series is finished (or Hermione exits early)
    function leaveGame() {
      current = null;
      finished = true;
      document.getElementById("game").hidden = true;
      document.getElementById("results").hidden = true;
      document.getElementById("target").hidden = false;
      document.getElementById("play-actions").hidden = false;
      document.getElementById("picker").hidden = false;
    }
    document.getElementById("results-done").addEventListener("click", leaveGame);
    // shown only for Hermione (set up on load); lets her bail out of a series
    document.getElementById("exit-early").addEventListener("click", leaveGame);

    window.siteMe()
      .then((d) => {
        isAdmin = Boolean(d.isAdmin);
        document.getElementById("exit-early").hidden = !isAdmin;   // only she may bail out
        return fetch("/api/writing");
      })
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((d) => {
        categories = d.categories || [];
        renderShelf();
      })
      .catch(() => (window.location.href = "/"));
  </script>
  <script src="/nav.js" defer></script>
  <script src="/notifications.js" defer></script>
</body>
</html>
