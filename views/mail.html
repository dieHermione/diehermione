<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mail — angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/site.css" />
  <script src="/me.js"></script>
  <style>
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: min(100%, 960px);
      color: var(--text-color);
      overflow: hidden;
    }
    /* Two panes, like a desktop mail client: mailbox list on the left, the
       conversation on the right. */
    .mailbox {
      display: grid;
      grid-template-columns: 15rem minmax(0, 1fr);
      min-height: 30rem;
      max-height: calc(100vh - 8rem);
    }
    .pane-list {
      border-right: 1px solid var(--table-border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .pane-read {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }
    .pane-head {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--table-border);
      flex-shrink: 0;
    }
    .pane-head h1, .pane-head h2 {
      font-family: "Cause", sans-serif;
      font-size: 1.05rem;
      color: var(--heading-color);
      margin: 0;
    }
    .pane-head .sub {
      color: var(--muted-color);
      font-size: 0.76rem;
      margin-top: 0.15rem;
    }

    /* --- mailbox list --- */
    .threads { overflow-y: auto; flex: 1; min-height: 0; }
    .thread-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.7rem 1rem;
      border: none;
      border-bottom: 1px solid var(--table-border);
      background: none;
      color: var(--text-color);
      font-family: inherit;
      cursor: pointer;
    }
    .thread-item:hover { background: var(--notif-item-bg, rgba(251, 195, 211, 0.12)); }
    .thread-item.active { background: var(--notif-item-bg, rgba(251, 195, 211, 0.2)); }
    .thread-item .top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .thread-item .who { font-weight: 700; font-size: 0.88rem; }
    .thread-item.unread .who::before {
      content: "";
      display: inline-block;
      width: 0.45rem;
      height: 0.45rem;
      border-radius: 50%;
      background: var(--button-bg);
      margin-right: 0.4rem;
      vertical-align: middle;
    }
    .thread-item .when { color: var(--muted-color); font-size: 0.7rem; flex-shrink: 0; }
    .thread-item .preview {
      color: var(--muted-color);
      font-size: 0.78rem;
      margin-top: 0.15rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .thread-item.unread .preview { color: var(--text-color); font-weight: 600; }

    /* --- conversation --- */
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .msg { max-width: 78%; }
    .msg.mine { align-self: flex-end; }
    .msg.theirs { align-self: flex-start; }
    .msg .bubble {
      padding: 0.55rem 0.8rem;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.5;
      white-space: pre-wrap;      /* keep the paragraphing they typed */
      overflow-wrap: anywhere;    /* and don't let one long word overflow */
    }
    .msg.mine .bubble { background: var(--button-bg); color: var(--button-text); }
    .msg.theirs .bubble {
      background: var(--notif-item-bg, rgba(251, 195, 211, 0.14));
      color: var(--text-color);
    }
    .msg .stamp {
      font-size: 0.68rem;
      color: var(--muted-color);
      margin-top: 0.2rem;
      padding: 0 0.2rem;
    }
    .msg.mine .stamp { text-align: right; }

    .empty {
      margin: auto;
      padding: 2rem 1rem;
      text-align: center;
      color: var(--muted-color);
      font-size: 0.86rem;
      font-style: italic;
    }

    /* --- compose --- */
    .compose {
      border-top: 1px solid var(--table-border);
      padding: 0.75rem;
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .compose[hidden] { display: none; }
    .compose textarea {
      flex: 1;
      min-height: 2.6rem;
      max-height: 8rem;
      padding: 0.55rem 0.7rem;
      border: 1px solid var(--input-border);
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--input-text);
      font-family: inherit;   /* textareas default to a monospace UI font */
      font-size: 0.88rem;
      resize: vertical;
    }
    .compose textarea:focus { outline: none; border-color: var(--button-hover-bg); }
    .compose button {
      padding: 0.55rem 1rem;
      border: none;
      border-radius: 10px;
      background: var(--button-bg);
      color: var(--button-text);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }
    .compose button:hover:not(:disabled) { background: var(--button-hover-bg); }
    .compose button:disabled { opacity: 0.55; cursor: default; }
    .send-error {
      color: var(--error-color);
      font-size: 0.78rem;
      padding: 0 0.75rem 0.6rem;
      flex-shrink: 0;
    }
    .send-error[hidden] { display: none; }

    /* On narrow screens the list becomes a strip above the conversation. */
    @media (max-width: 720px) {
      .mailbox { grid-template-columns: 1fr; max-height: none; }
      .pane-list { border-right: none; border-bottom: 1px solid var(--table-border); max-height: 13rem; }
      .msg { max-width: 90%; }
    }
  </style>
</head>
<body class="has-top-nav">
  <main class="card">
    <div class="mailbox">
      <div class="pane-list">
        <div class="pane-head">
          <h1>Mail</h1>
          <p class="sub" id="list-sub">Loading…</p>
        </div>
        <div class="threads" id="threads"></div>
      </div>
      <div class="pane-read">
        <div class="pane-head">
          <h2 id="read-title">—</h2>
          <p class="sub" id="read-sub"></p>
        </div>
        <div class="messages" id="messages"></div>
        <p class="send-error" id="send-error" hidden></p>
        <form class="compose" id="compose" hidden>
          <textarea id="text" rows="1" maxlength="2000" placeholder="Write a message…" aria-label="Message"></textarea>
          <button type="submit" id="send">Send</button>
        </form>
      </div>
    </div>
  </main>

  <script>
    let isAdmin = false;
    let openWith = null;    // hermione only: whose thread is open
    let threads = [];

    const fmtTime = (iso) => {
      if (!iso) return "";
      const d = new Date(iso);
      const today = new Date();
      const sameDay = d.toDateString() === today.toDateString();
      return sameDay
        ? d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })
        : d.toLocaleDateString();
    };

    function renderThreads() {
      const list = document.getElementById("threads");
      list.replaceChildren();

      if (!threads.length) {
        const p = document.createElement("p");
        p.className = "empty";
        p.textContent = "No one to write to yet.";
        list.append(p);
        return;
      }

      for (const t of threads) {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "thread-item";
        if (t.unread > 0) item.classList.add("unread");
        const active = isAdmin
          ? openWith && t.username.toLowerCase() === openWith.toLowerCase()
          : true;
        if (active) item.classList.add("active");

        const top = document.createElement("div");
        top.className = "top";
        const who = document.createElement("span");
        who.className = "who";
        who.textContent = t.username;
        const when = document.createElement("span");
        when.className = "when";
        when.textContent = fmtTime(t.lastAt);
        top.append(who, when);

        const preview = document.createElement("div");
        preview.className = "preview";
        // textContent throughout: every message is user-written
        preview.textContent = t.lastText
          ? (t.lastFromMe ? "You: " : "") + t.lastText
          : "No messages yet.";

        item.append(top, preview);
        item.addEventListener("click", () => {
          if (!isAdmin) return;
          openWith = t.username;
          load();
        });
        list.append(item);
      }
    }

    function renderMessages(data) {
      const box = document.getElementById("messages");
      box.replaceChildren();

      document.getElementById("read-title").textContent = data.with || "Pick a conversation";
      document.getElementById("read-sub").textContent = data.messages
        ? data.messages.length + (data.messages.length === 1 ? " message" : " messages")
        : (isAdmin ? "Choose someone on the left." : "");
      document.getElementById("compose").hidden = !data.messages;

      if (!data.messages) return;

      if (!data.messages.length) {
        const p = document.createElement("p");
        p.className = "empty";
        p.textContent = "Nothing here yet. Say hello.";
        box.append(p);
        return;
      }

      for (const m of data.messages) {
        const mine = isAdmin ? m.from === "hermione" : m.from === "player";
        const row = document.createElement("div");
        row.className = "msg " + (mine ? "mine" : "theirs");
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = m.text;
        const stamp = document.createElement("div");
        stamp.className = "stamp";
        stamp.textContent = fmtTime(m.at);
        row.append(bubble, stamp);
        box.append(row);
      }
      box.scrollTop = box.scrollHeight;
    }

    async function load() {
      const url = isAdmin && openWith
        ? "/api/mail?with=" + encodeURIComponent(openWith)
        : "/api/mail";
      const res = await fetch(url);
      if (!res.ok) return;
      const data = await res.json();
      threads = data.threads || [];

      const waiting = threads.reduce((n, t) => n + t.unread, 0);
      document.getElementById("list-sub").textContent = waiting
        ? waiting + " unread"
        : (isAdmin ? threads.length + " conversation" + (threads.length === 1 ? "" : "s") : "Your conversation with Hermione");

      renderThreads();
      renderMessages(data);
    }

    document.getElementById("compose").addEventListener("submit", async (e) => {
      e.preventDefault();
      const box = document.getElementById("text");
      const send = document.getElementById("send");
      const err = document.getElementById("send-error");
      const text = box.value.trim();
      if (!text) return;

      send.disabled = true;
      err.hidden = true;
      const body = { text };
      if (isAdmin) body.with = openWith;
      const res = await fetch("/api/mail", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      send.disabled = false;

      if (res.ok) {
        box.value = "";
        load();
      } else {
        const data = await res.json().catch(() => ({}));
        err.textContent = data.error || "Couldn't send that.";
        err.hidden = false;
      }
    });

    // Enter sends, Shift+Enter makes a new line — the usual mail-client bargain.
    document.getElementById("text").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        document.getElementById("compose").requestSubmit();
      }
    });

    window.siteMe()
      .then((d) => {
        isAdmin = Boolean(d.isAdmin);
        return load();
      })
      .catch(() => (window.location.href = "/"));

    // keep up with the other side without a refresh
    setInterval(load, 15000);
  </script>
  <script src="/nav.js" defer></script>
  <script src="/notifications.js" defer></script>
</body>
</html>
