<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake — angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg1: #ff90b0;
      --bg2: #f6f6f6;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --header-color: #ffffff;
      --heading-color: #FBC3D3;
      --text-color: #333;
      --muted-color: #999;
      --button-bg: #FBC3D3;
      --button-text: #ffffff;
      --button-hover-bg: #f7b8c8;
      --shadow: rgba(0, 0, 0, 0.2);
      --input-border: #ddd;
      --toggle-bg: rgba(255, 255, 255, 0.9);
      --toggle-text: #333;
    }
    body[data-theme="dark"] {
      color-scheme: dark;
      --bg1: #edb6ca;
      --bg2: #edb6ca;
      --panel-bg: rgba(37, 34, 42, 0.92);
      --header-color: #ffffff;
      --heading-color: #ffffff;
      --text-color: #ffffff;
      --muted-color: #ffffff;
      --button-bg: #edb6ca;
      --button-text: #ffffff;
      --button-hover-bg: #edb6ca;
      --shadow: rgba(0, 0, 0, 0.45);
      --input-border: #FBC3D3;
      --toggle-bg: rgba(41, 34, 49, 0.95);
      --toggle-text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Cause", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      padding: 1rem;
      color: var(--text-color);
    }
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 20px 0;
    }
    .bow { display: inline-block; }
    .bow.flip { transform: scaleX(-1); }
    body.has-top-nav {
      justify-content: flex-start;
      padding-top: 1.75rem;
      gap: 1rem;
    }
    .top-nav {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 0.55rem;
      position: relative;
      width: min(100%, 720px);
      padding: 0.65rem 1rem;
      margin: 0 0 0.75rem;
      border-radius: 999px;
      background: var(--panel-bg);
      box-shadow: 0 8px 24px var(--shadow);
      backdrop-filter: blur(8px);
    }
    .top-nav .greeting {
      color: var(--heading-color);
      font-weight: 700;
      font-size: 0.95rem;
      margin-right: 0.25rem;
    }
    .top-nav .nav-links {
      grid-column: 2;
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.45rem;
    }
    .top-nav a,
    .top-nav button,
    .top-nav .dropdown-toggle {
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      border: none;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .top-nav a:hover,
    .top-nav button:hover,
    .top-nav .dropdown-toggle:hover {
      background: var(--button-hover-bg);
    }
    .top-nav a.active {
      background: var(--button-hover-bg);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
    }
    .top-nav .dropdown[hidden] { display: none; }
    .top-nav a[hidden] { display: none; }
    .top-nav .dropdown {
      position: relative;
      display: inline-flex;
    }
    /* invisible bridge across the gap so hover survives the trip to the menu */
    .top-nav .dropdown::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      height: 0.5rem;
    }
    .top-nav .dropdown-menu {
      position: absolute;
      top: calc(100% + 0.35rem);
      left: 0;
      display: none;
      flex-direction: column;
      gap: 0.35rem;
      padding: 0.45rem;
      background: var(--panel-bg);
      border-radius: 8px;
      box-shadow: 0 8px 24px var(--shadow);
      min-width: 8rem;
    }
    .top-nav .dropdown:hover .dropdown-menu,
    .top-nav .dropdown:focus-within .dropdown-menu {
      display: flex;
    }
    .top-nav .dropdown-menu a {
      width: 100%;
    }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 520px;
      padding: 2rem;
      text-align: center;
      color: var(--text-color);
    }
    .status { color: var(--text-color); font-weight: 600; margin-bottom: 1rem; min-height: 1.4em; }
    canvas {
      width: 100%;
      max-width: 440px;
      aspect-ratio: 1;
      border: 3px solid var(--button-bg);
      border-radius: 8px;
      display: block;
      margin: 0 auto 1.25rem;
      background: transparent;
      touch-action: none;
    }
    .nav { display: flex; gap: 0.75rem; justify-content: center; }
    button {
      padding: 0.6rem 1.25rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--button-hover-bg); }
    .note { color: var(--muted-color); font-size: 0.85rem; margin-top: 1rem; }
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: 3rem;
      height: 1.6rem;
      padding: 0;
      border: 1px solid var(--input-border);
      border-radius: 999px;
      background: var(--toggle-bg);
      color: transparent;
      box-shadow: 0 6px 16px var(--shadow);
      cursor: pointer;
      overflow: hidden;
    }
    .theme-toggle .thumb {
      position: absolute;
      top: 0.15rem;
      left: 0.15rem;
      width: 1.15rem;
      height: 1.15rem;
      border-radius: 50%;
      background: var(--button-bg);
      display: block;
      transition: left 0.2s ease, background-color 0.2s ease;
    }
    .theme-toggle.is-dark .thumb {
      left: calc(100% - 1.15rem - 0.15rem);
      background: var(--button-hover-bg);
    }
  </style>
</head>
<body class="has-top-nav">
    <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle dark mode"><span class="thumb"></span></button>
  <nav id="top-nav" class="top-nav" hidden>
    <div class="nav-links">
      <a id="nav-dashboard" href="/dashboard">Dashboard</a>
      <a id="nav-admin" href="/admin" hidden>Admin</a>
      <a id="nav-profile" href="/profile">Profile</a>
      <a id="nav-tasks" href="/tasks">Tasks</a>
      <div class="dropdown" id="games-dropdown">
        <button class="dropdown-toggle" type="button">Games ▾</button>
        <div class="dropdown-menu">
          <a id="nav-chess" href="/chess">Chess</a>
          <a id="nav-snake" href="/snake">Snake</a>
        </div>
      </div>
    </div>
  </nav>
  <h1 class="site-header"><span class="bow flip">꣑ৎ</span> Snake <span class="bow">꣑ৎ</span></h1>
  <main class="card">
    <p class="status" id="status">Press Start to play!</p>
    <canvas id="game" width="440" height="440"></canvas>
    <div class="nav">
      <button id="start" type="button">Start</button>
      <button id="back" type="button">Dashboard</button>
    </div>
    <p class="note">Arrow keys or WASD to steer. </p>
  </main>
  <script>
    const body = document.body;
    const toggle = document.getElementById("theme-toggle");
    const storedTheme = localStorage.getItem("site-theme");
    const systemDark = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
    // no explicit choice yet? follow whatever the browser/OS is set to
    const savedTheme = storedTheme || (systemDark && systemDark.matches ? "dark" : "light");
    const topNav = document.getElementById("top-nav");
    const navDashboard = document.getElementById("nav-dashboard");
    const navAdmin = document.getElementById("nav-admin");
    const navChess = document.getElementById("nav-chess");
    const navSnake = document.getElementById("nav-snake");
    const adminDropdown = document.getElementById("nav-admin");

    function applyTheme(theme, persist) {
      body.dataset.theme = theme;
      if (toggle) {
        toggle.classList.toggle("is-dark", theme === "dark");
        toggle.setAttribute("aria-pressed", String(theme === "dark"));
      }
      if (persist) localStorage.setItem("site-theme", theme);
    }

    applyTheme(savedTheme);
    systemDark?.addEventListener?.("change", (e) => {
      if (!localStorage.getItem("site-theme")) applyTheme(e.matches ? "dark" : "light");
    });
    toggle?.addEventListener("click", () => {
      const nextTheme = body.dataset.theme === "dark" ? "light" : "dark";
      applyTheme(nextTheme, true);
    });

    function setActiveNav(path) {
      const links = [navDashboard, navAdmin, navChess, navSnake];
      links.forEach((link) => link?.classList.toggle("active", link?.getAttribute("href") === path));
    }

    async function initTopNav() {
      if (!topNav) return;
      if (adminDropdown) {
        adminDropdown.hidden = true;
      }
      try {
        const res = await fetch("/api/me");
        if (!res.ok) {
          topNav.hidden = true;
          return;
        }
        const data = await res.json().catch(() => ({}));
        const username = data.username || "there";
        const isAdmin = Boolean(data.isAdmin ?? (username && username.toLowerCase() === "hermione"));
        topNav.hidden = false;
        if (adminDropdown) {
          adminDropdown.hidden = !isAdmin;
        }
        setActiveNav(window.location.pathname);
      } catch {
        topNav.hidden = true;
        if (adminDropdown) {
          adminDropdown.hidden = true;
        }
      }
    }

    initTopNav();

    const GRID = 20;
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const CELL = canvas.width / GRID;
    const statusEl = document.getElementById("status");

    const HEART_COLOR = "#ff90b0";
    const TELEPORT_CHANCE = 0.9;   // odds the food bolts when you get adjacent
    const TELEPORT_MIN_DISTANCE = 8;  // where fleeing food lands
    const SPAWN_MIN_DISTANCE = 4;     // where fresh food lands after being eaten

    // the head matches the site buttons; each segment behind it fades toward white
    function headColor() {
      return getComputedStyle(document.body).getPropertyValue("--button-bg").trim() || "#FBC3D3";
    }

    function hexToRgb(hex) {
      const h = hex.replace("#", "");
      const full = h.length === 3 ? h.split("").map((c) => c + c).join("") : h;
      return [0, 2, 4].map((i) => parseInt(full.slice(i, i + 2), 16));
    }

    function segmentColor(base, index) {
      const [r, g, b] = hexToRgb(base);
      const fade = Math.min(0.72, index * 0.07); // toward white, capped so it stays visible
      const mix = (c) => Math.round(c + (255 - c) * fade);
      return "rgb(" + mix(r) + ", " + mix(g) + ", " + mix(b) + ")";
    }

    let snake, dir, nextDir, food, score, timer = null, alive = false;
    let earned = 0;     // dollars earned this run
    let cappedAt = 0;   // set once the server says the daily limit is spent

    function reset() {
      snake = [{ x: 9, y: 10 }, { x: 8, y: 10 }, { x: 7, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = dir;
      score = 0;
      alive = true;
      placeFood();
    }

    function freeSquares() {
      const taken = new Set(snake.map((s) => s.x + "," + s.y));
      const open = [];
      for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {
          if (!taken.has(x + "," + y)) open.push({ x, y });
        }
      }
      return open;
    }

    // never drop food in the player's lap: prefer squares at least minDist away,
    // relaxing only if a long snake has left nowhere better
    function pickSquare(head, minDist) {
      const open = freeSquares();
      if (!open.length) return food;
      let pool = open.filter((sq) => distance(sq, head) >= minDist);
      if (!pool.length) pool = open.filter((sq) => distance(sq, head) > 1);
      if (!pool.length) pool = open;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function placeFood() {
      food = pickSquare(snake[0], SPAWN_MIN_DISTANCE);
    }

    // how far apart two squares are, counting wrap-around as a shortcut
    function distance(a, b) {
      const dx = Math.min(Math.abs(a.x - b.x), GRID - Math.abs(a.x - b.x));
      const dy = Math.min(Math.abs(a.y - b.y), GRID - Math.abs(a.y - b.y));
      return Math.max(dx, dy);
    }

    // the food is shy: once the head is adjacent it usually bolts somewhere far
    function fleeFrom(head) {
      food = pickSquare(head, TELEPORT_MIN_DISTANCE);
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function drawHeart(cx, cy, size) {
      ctx.fillStyle = HEART_COLOR;
      ctx.beginPath();
      const s = size / 2;
      ctx.moveTo(cx, cy + s * 0.6);
      ctx.bezierCurveTo(cx + s, cy - s * 0.4, cx + s * 0.5, cy - s, cx, cy - s * 0.3);
      ctx.bezierCurveTo(cx - s * 0.5, cy - s, cx - s, cy - s * 0.4, cx, cy + s * 0.6);
      ctx.fill();
    }

    function draw() {
      drawBoard();
      drawHeart(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL * 0.9);
      const base = headColor();
      snake.forEach((seg, i) => {
        ctx.fillStyle = segmentColor(base, i);
        const pad = 1.5;
        const r = 5;
        const x = seg.x * CELL + pad, y = seg.y * CELL + pad, w = CELL - pad * 2;
        ctx.beginPath();
        ctx.roundRect(x, y, w, w, r);
        ctx.fill();
      });
    }

    function tick() {
      dir = nextDir;
      // walls wrap: leaving one edge brings you back on the opposite side
      const head = {
        x: (snake[0].x + dir.x + GRID) % GRID,
        y: (snake[0].y + dir.y + GRID) % GRID,
      };
      if (snake.some((s) => s.x === head.x && s.y === head.y)) {
        gameOver();
        return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        awardFood();
        showScore();
        placeFood();
      } else {
        snake.pop();
        if (distance(head, food) <= 1 && Math.random() < TELEPORT_CHANCE) {
          fleeFrom(head);
        }
      }
      draw();
    }

    // each pickup is worth $1; the server is the one that actually credits it
    async function awardFood() {
      try {
        const res = await fetch("/api/snake/food", { method: "POST" });
        if (!res.ok) return;
        const data = await res.json();
        if (data.capped) {
          cappedAt = data.cap;
        } else {
          earned += data.earned;
        }
        showScore();
      } catch {}
    }

    function showScore() {
      let text = "Score: " + score + (earned ? " · earned $" + earned : "");
      if (cappedAt) text += " · daily $" + cappedAt + " limit reached";
      statusEl.textContent = text;
    }

    function gameOver() {
      alive = false;
      clearInterval(timer);
      timer = null;
      statusEl.textContent =
        "Game over — final score " + score +
        (earned ? ", earned $" + earned : "") + ". Press Start to try again!";
      document.getElementById("start").textContent = "Start";
    }

    function start() {
      if (timer) clearInterval(timer);
      reset();
      earned = 0;
      showScore();
      document.getElementById("start").textContent = "Restart";
      draw();
      timer = setInterval(tick, 120);
    }

    const UP = { x: 0, y: -1 }, DOWN = { x: 0, y: 1 }, LEFT = { x: -1, y: 0 }, RIGHT = { x: 1, y: 0 };
    const KEYS = {
      ArrowUp: UP, ArrowDown: DOWN, ArrowLeft: LEFT, ArrowRight: RIGHT,
      Up: UP, Down: DOWN, Left: LEFT, Right: RIGHT,
      KeyW: UP, KeyS: DOWN, KeyA: LEFT, KeyD: RIGHT,
      w: UP, s: DOWN, a: LEFT, d: RIGHT,
    };
    document.addEventListener("keydown", (e) => {
      const key = e.key && e.key.length === 1 ? e.key.toLowerCase() : e.key;
      const d = KEYS[key] || KEYS[e.code];
      if (!d) return;
      e.preventDefault();
      if (!alive) return;
      if (d.x === -dir.x && d.y === -dir.y) return; // no instant reversal
      nextDir = d;
    });

    document.getElementById("start").addEventListener("click", start);
    document.getElementById("back").addEventListener("click", () => {
      window.location.href = "/dashboard";
    });

    // require a login like the rest of the site
    fetch("/api/me").then((r) => {
      if (!r.ok) window.location.href = "/";
    });

    drawBoard();
  </script>
  <script src="/notifications.js" defer></script>
</body>
</html>
