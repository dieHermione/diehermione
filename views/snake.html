<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake - angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/site.css" />
  <script src="/me.js"></script>
  <style>    :root {
      --heart-color: #FBC3D3;
    }    body[data-theme="dark"] {
      --heart-color: #c9c9c9;
    }
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 20px 0;
    }
    .bow { display: inline-block; }
    .bow.flip { transform: scaleX(-1); }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 572px;
      padding: 2.2rem;
      text-align: center;
      color: var(--text-color);
    }
    .status { color: var(--text-color); font-weight: 600; margin-bottom: 1rem; min-height: 1.4em; }
    canvas {
      width: 100%;
      max-width: 440px;
      aspect-ratio: 1;
      border: 3px solid var(--button-bg);
      border-radius: 8px;
      display: block;
      margin: 0 auto 1.25rem;
      background: transparent;
      touch-action: none;
    }
    .nav { display: flex; gap: 0.75rem; justify-content: center; }
    button {
      padding: 0.6rem 1.25rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--button-hover-bg); }
    .note { color: var(--muted-color); font-size: 0.85rem; margin-top: 1rem; }
  </style>
</head>
<body class="has-top-nav">
    <main class="card">
    <p class="status" id="status"></p>
    <canvas id="game" width="440" height="440"></canvas>
    <div class="nav">
      <button id="start" type="button">Start</button>
      <button id="back" type="button">Dashboard</button>
    </div>
  </main>
  <script>

    const GRID = 20;
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const CELL = canvas.width / GRID;
    const statusEl = document.getElementById("status");

    const heartColor = () => getComputedStyle(document.body).getPropertyValue("--heart-color").trim() || "#FBC3D3";
    let teleportChance = 0.9;      // odds the food bolts when you get adjacent
    const TELEPORT_MIN_DISTANCE = 8;  // where fleeing food lands
    const SPAWN_MIN_DISTANCE = 4;     // where fresh food lands after being eaten

    // the head matches the site buttons; each segment behind it fades toward white
    function headColor() {
      return getComputedStyle(document.body).getPropertyValue("--button-bg").trim() || "#FBC3D3";
    }

    function hexToRgb(hex) {
      const h = hex.replace("#", "");
      const full = h.length === 3 ? h.split("").map((c) => c + c).join("") : h;
      return [0, 2, 4].map((i) => parseInt(full.slice(i, i + 2), 16));
    }

    function segmentColor(base, index) {
      const [r, g, b] = hexToRgb(base);
      const fade = Math.min(0.72, index * 0.07); // toward white, capped so it stays visible
      const mix = (c) => Math.round(c + (255 - c) * fade);
      return "rgb(" + mix(r) + ", " + mix(g) + ", " + mix(b) + ")";
    }

    let snake, dir, nextDir, food, score, timer = null, alive = false;
    let earned = 0;     // points earned this run

    function reset() {
      snake = [{ x: 9, y: 10 }, { x: 8, y: 10 }, { x: 7, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = dir;
      score = 0;
      alive = true;
      placeFood();
    }

    function freeSquares() {
      const taken = new Set(snake.map((s) => s.x + "," + s.y));
      const open = [];
      for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {
          if (!taken.has(x + "," + y)) open.push({ x, y });
        }
      }
      return open;
    }

    // never drop food in the player's lap: prefer squares at least minDist away,
    // relaxing only if a long snake has left nowhere better
    function pickSquare(head, minDist) {
      const open = freeSquares();
      if (!open.length) return food;
      let pool = open.filter((sq) => distance(sq, head) >= minDist);
      if (!pool.length) pool = open.filter((sq) => distance(sq, head) > 1);
      if (!pool.length) pool = open;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function placeFood() {
      food = pickSquare(snake[0], SPAWN_MIN_DISTANCE);
    }

    // how far apart two squares are, counting wrap-around as a shortcut
    function distance(a, b) {
      const dx = Math.min(Math.abs(a.x - b.x), GRID - Math.abs(a.x - b.x));
      const dy = Math.min(Math.abs(a.y - b.y), GRID - Math.abs(a.y - b.y));
      return Math.max(dx, dy);
    }

    // the food is shy: once the head is adjacent it usually bolts somewhere far
    function fleeFrom(head) {
      food = pickSquare(head, TELEPORT_MIN_DISTANCE);
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function drawHeart(cx, cy, size) {
      ctx.fillStyle = heartColor();
      ctx.beginPath();
      const s = size / 2;
      ctx.moveTo(cx, cy + s * 0.6);
      ctx.bezierCurveTo(cx + s, cy - s * 0.4, cx + s * 0.5, cy - s, cx, cy - s * 0.3);
      ctx.bezierCurveTo(cx - s * 0.5, cy - s, cx - s, cy - s * 0.4, cx, cy + s * 0.6);
      ctx.fill();
    }

    function draw() {
      drawBoard();
      drawHeart(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL * 0.9);
      const base = headColor();
      snake.forEach((seg, i) => {
        ctx.fillStyle = segmentColor(base, i);
        const pad = 1.5;
        const r = 5;
        const x = seg.x * CELL + pad, y = seg.y * CELL + pad, w = CELL - pad * 2;
        ctx.beginPath();
        ctx.roundRect(x, y, w, w, r);
        ctx.fill();
      });
    }

    function tick() {
      dir = nextDir;
      // walls wrap: leaving one edge brings you back on the opposite side
      const head = {
        x: (snake[0].x + dir.x + GRID) % GRID,
        y: (snake[0].y + dir.y + GRID) % GRID,
      };
      if (snake.some((s) => s.x === head.x && s.y === head.y)) {
        gameOver();
        return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        awardFood();
        showScore();
        placeFood();
      } else {
        snake.pop();
        if (distance(head, food) <= 1 && Math.random() < teleportChance) {
          fleeFrom(head);
        }
      }
      draw();
    }

    // each pickup is worth a point; the server is the one that actually credits it
    async function awardFood() {
      try {
        const res = await fetch("/api/snake/food", { method: "POST" });
        if (!res.ok) return;
        const data = await res.json();
        earned += data.earned;
        if (data.bonus) earned += data.bonus;   // daily-completion bonus
        showScore();
      } catch {}
    }

    function showScore() {
      statusEl.textContent = "Score: " + score + (earned ? " · earned " + earned + " points" : "");
    }

    function gameOver() {
      alive = false;
      clearInterval(timer);
      timer = null;
      statusEl.textContent =
        "Game over. Final score " + score +
        (earned ? ", earned " + earned + " points" : "") + ". Press Start to try again!";
      document.getElementById("start").textContent = "Start";
    }

    function start() {
      if (timer) clearInterval(timer);
      reset();
      earned = 0;
      showScore();
      document.getElementById("start").textContent = "Restart";
      draw();
      timer = setInterval(tick, 120);
    }

    const UP = { x: 0, y: -1 }, DOWN = { x: 0, y: 1 }, LEFT = { x: -1, y: 0 }, RIGHT = { x: 1, y: 0 };
    const KEYS = {
      ArrowUp: UP, ArrowDown: DOWN, ArrowLeft: LEFT, ArrowRight: RIGHT,
      Up: UP, Down: DOWN, Left: LEFT, Right: RIGHT,
      KeyW: UP, KeyS: DOWN, KeyA: LEFT, KeyD: RIGHT,
      w: UP, s: DOWN, a: LEFT, d: RIGHT,
    };
    document.addEventListener("keydown", (e) => {
      const key = e.key && e.key.length === 1 ? e.key.toLowerCase() : e.key;
      const d = KEYS[key] || KEYS[e.code];
      if (!d) return;
      e.preventDefault();
      if (!alive) return;
      if (d.x === -dir.x && d.y === -dir.y) return; // no instant reversal
      nextDir = d;
    });

    document.getElementById("start").addEventListener("click", start);
    document.getElementById("back").addEventListener("click", () => {
      window.location.href = "/dashboard";
    });

    // require a login like the rest of the site; hermione's food is less skittish
    window.siteMe()
      .then((d) => {
        if (d.isAdmin) teleportChance = 0.5;
      })
      .catch(() => (window.location.href = "/"));

    drawBoard();
  </script>
  <script src="/nav.js" defer></script>
  <script src="/notifications.js" defer></script>
</body>
</html>
