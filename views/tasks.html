<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks — angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg1: #FBC3D3;
      --bg2: #f6f6f6;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --header-color: #ffffff;
      --heading-color: #FBC3D3;
      --text-color: #333;
      --muted-color: #777;
      --table-border: #eee;
      --table-header-color: #888;
      --button-bg: #FBC3D3;
      --button-text: #ffffff;
      --button-hover-bg: #f7b8c8;
      --shadow: rgba(0, 0, 0, 0.2);
      --input-border: #ddd;
      --input-bg: #fff;
      --input-text: #333;
      --toggle-bg: rgba(255, 255, 255, 0.9);
      --toggle-text: #333;
    }
    body[data-theme="dark"] {
      --notif-item-bg: rgba(255, 255, 255, 0.07);
      color-scheme: dark;
      --bg1: #141414;
      --bg2: #242424;
      --panel-bg: rgba(32, 32, 32, 0.94);
      --header-color: #f2f2f2;
      --heading-color: #d6d6d6;
      --text-color: #ececec;
      --muted-color: #9e9e9e;
      --table-border: #3a3a3a;
      --table-header-color: #9e9e9e;
      --button-bg: #4a4a4a;
      --button-text: #f2f2f2;
      --button-hover-bg: #5f5f5f;
      --shadow: rgba(0, 0, 0, 0.5);
      --input-border: #4a4a4a;
      --input-bg: #2a2a2a;
      --input-text: #ececec;
      --toggle-bg: rgba(38, 38, 38, 0.95);
      --toggle-text: #ececec;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Cause", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      padding: 1rem;
      color: var(--text-color);
    }
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 20px 0;
    }
    .bow { display: inline-block; }
    .bow.flip { transform: scaleX(-1); }
    body.has-top-nav {
      justify-content: flex-start;
      padding-top: 1.75rem;
      gap: 1rem;
    }
    .top-nav {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 0.55rem;
      position: relative;
      width: min(100%, 720px);
      padding: 0.65rem 1rem;
      margin: 0 0 0.75rem;
      border-radius: 999px;
      background: var(--panel-bg);
      box-shadow: 0 8px 24px var(--shadow);
      backdrop-filter: blur(8px);
    }
    .top-nav .nav-links {
      grid-column: 2;
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.45rem;
    }
    .top-nav a,
    .top-nav button,
    .top-nav .dropdown-toggle {
      font-family: inherit;   /* buttons don't inherit the page font on their own */
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      border: none;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .top-nav a:hover,
    .top-nav button:hover,
    .top-nav .dropdown-toggle:hover {
      background: var(--button-hover-bg);
    }
    .top-nav a.active {
      background: var(--button-hover-bg);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
    }
    .top-nav .dropdown[hidden] { display: none; }
    .top-nav a[hidden] { display: none; }
    .top-nav .dropdown {
      position: relative;
      display: inline-flex;
    }
    /* invisible bridge across the gap so hover survives the trip to the menu */
    .top-nav .dropdown::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      height: 0.5rem;
    }
    .top-nav .dropdown-menu {
      position: absolute;
      top: calc(100% + 0.35rem);
      left: 0;
      display: none;
      flex-direction: column;
      gap: 0.35rem;
      padding: 0.45rem;
      background: var(--panel-bg);
      border-radius: 8px;
      box-shadow: 0 8px 24px var(--shadow);
      min-width: 8rem;
    }
    .top-nav .dropdown:hover .dropdown-menu,
    .top-nav .dropdown:focus-within .dropdown-menu {
      display: flex;
    }
    .top-nav .dropdown-menu a { width: 100%; }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 560px;
      padding: 2rem;
      color: var(--text-color);
    }
    h2 {
      font-family: "Cause", sans-serif;
      font-size: 1.1rem;
      color: var(--heading-color);
      margin-bottom: 1rem;
      text-align: center;
    }
    .task-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .task {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      border: 1px solid var(--table-border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
    }
    .task.done { opacity: 0.6; }
    .task .check {
      flex-shrink: 0;
      width: 1.3rem;
      height: 1.3rem;
      border-radius: 50%;
      border: 2px solid var(--button-bg);
      margin-top: 0.15rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: var(--button-text);
    }
    .task.done .check { background: var(--button-bg); }
    .task .body { flex: 1; min-width: 0; }
    .task .title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.2rem;
      overflow-wrap: anywhere;
    }
    .task.done .title { text-decoration: line-through; }
    .task .detail {
      color: var(--muted-color);
      font-size: 0.88rem;
      margin-bottom: 0.45rem;
      overflow-wrap: anywhere;
    }
    .task .meta { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
    .tag {
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .tag.assigned { background: var(--button-bg); color: var(--button-text); }
    .tag.auto { background: var(--table-border); color: var(--muted-color); }
    .tag.reward {
      background: transparent;
      border: 1px solid var(--button-bg);
      color: var(--heading-color);
    }
    .empty {
      text-align: center;
      color: var(--muted-color);
      font-style: italic;
      padding: 1.5rem 0;
    }
    .section-note {
      color: var(--muted-color);
      font-size: 0.8rem;
      text-align: center;
      margin-top: 1.25rem;
    }
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: 3rem;
      height: 1.6rem;
      padding: 0;
      border: 1px solid var(--input-border);
      border-radius: 999px;
      background: var(--toggle-bg);
      color: transparent;
      box-shadow: 0 6px 16px var(--shadow);
      cursor: pointer;
      overflow: hidden;
    }
    .theme-toggle .thumb {
      position: absolute;
      top: 0.15rem;
      left: 0.15rem;
      width: 1.15rem;
      height: 1.15rem;
      border-radius: 50%;
      background: var(--button-bg);
      display: block;
      transition: left 0.2s ease, background-color 0.2s ease;
    }
    .theme-toggle.is-dark .thumb {
      left: calc(100% - 1.15rem - 0.15rem);
      background: var(--button-hover-bg);
    }

    /* greyscale dark mode */
    body[data-theme="dark"] .task { background: rgba(255, 255, 255, 0.04); }
  </style>
</head>
<body class="has-top-nav">
    <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle dark mode"><span class="thumb"></span></button>
  <nav id="top-nav" class="top-nav" hidden>
    <div class="nav-links">
      <a id="nav-dashboard" href="/dashboard">Dashboard</a>
      <a id="nav-admin" href="/admin" hidden>Admin</a>
      <a id="nav-profile" href="/profile">Profile</a>
      <a id="nav-tasks" href="/tasks">Tasks</a>
      <div class="dropdown" id="games-dropdown">
        <button class="dropdown-toggle" type="button">Games ▾</button>
        <div class="dropdown-menu">
          <a id="nav-snake" href="/snake">Snake</a>
          <a id="nav-writing" href="/writing">Writing</a>
          <a id="nav-wheel" href="/wheel">Wheel</a>
          <a id="nav-deathroll" href="/deathroll">Deathroll</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="card">
    <h2>Active</h2>
    <div class="task-list" id="active-list"></div>
    <p class="empty" id="active-empty" hidden>Nothing to do right now.</p>
  </main>

  <section class="card" id="done-card" hidden>
    <h2>Completed</h2>
    <div class="task-list" id="done-list"></div>
  </section>

  <script>
    const body = document.body;
    const toggle = document.getElementById("theme-toggle");
    const storedTheme = localStorage.getItem("site-theme");
    const systemDark = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
    // no explicit choice yet? follow whatever the browser/OS is set to
    const savedTheme = storedTheme || (systemDark && systemDark.matches ? "dark" : "light");
    const topNav = document.getElementById("top-nav");
    const adminDropdown = document.getElementById("nav-admin");

    function applyTheme(theme, persist) {
      body.dataset.theme = theme;
      if (toggle) {
        toggle.classList.toggle("is-dark", theme === "dark");
        toggle.setAttribute("aria-pressed", String(theme === "dark"));
      }
      if (persist) localStorage.setItem("site-theme", theme);
    }

    applyTheme(savedTheme);
    systemDark?.addEventListener?.("change", (e) => {
      if (!localStorage.getItem("site-theme")) applyTheme(e.matches ? "dark" : "light");
    });
    toggle?.addEventListener("click", () => {
      applyTheme(body.dataset.theme === "dark" ? "light" : "dark", true);
    });

    document.getElementById("nav-tasks").classList.add("active");

    function tag(text, className) {
      const el = document.createElement("span");
      el.className = "tag " + className;
      el.textContent = text;
      return el;
    }

    // task shape: { id, title, detail, source: "hermione" | "auto",
    //               status: "active" | "done", points, dollars }
    function renderTask(task) {
      const row = document.createElement("div");
      row.className = "task" + (task.status === "done" ? " done" : "");

      const check = document.createElement("div");
      check.className = "check";
      check.textContent = task.status === "done" ? "✓" : "";
      row.append(check);

      const bodyEl = document.createElement("div");
      bodyEl.className = "body";

      const title = document.createElement("div");
      title.className = "title";
      title.textContent = task.title || "Untitled task";
      bodyEl.append(title);

      if (task.detail) {
        const detail = document.createElement("div");
        detail.className = "detail";
        detail.textContent = task.detail;
        bodyEl.append(detail);
      }

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.append(
        task.source === "auto"
          ? tag("Automatic", "auto")
          : tag("Set by Hermione", "assigned")
      );
      if (task.points) meta.append(tag(task.points + " pts", "reward"));
      if (task.dollars) meta.append(tag("$" + task.dollars, "reward"));
      bodyEl.append(meta);

      row.append(bodyEl);
      return row;
    }

    function renderTasks(tasks) {
      const active = tasks.filter((t) => t.status !== "done");
      const done = tasks.filter((t) => t.status === "done");

      const activeList = document.getElementById("active-list");
      activeList.replaceChildren(...active.map(renderTask));
      document.getElementById("active-empty").hidden = active.length > 0;

      const doneList = document.getElementById("done-list");
      doneList.replaceChildren(...done.map(renderTask));
      document.getElementById("done-card").hidden = done.length === 0;
    }

    fetch("/api/me")
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((d) => {
        topNav.hidden = false;
        adminDropdown.hidden = !d.isAdmin;
        return fetch("/api/tasks");
      })
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((d) => renderTasks(d.tasks || []))
      .catch(() => (window.location.href = "/"));
  </script>
  <script src="/notifications.js" defer></script>
</body>
</html>
