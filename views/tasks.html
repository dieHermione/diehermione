<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks - angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/site.css" />
  <script src="/me.js"></script>
  <style>
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 20px 0;
    }
    .bow { display: inline-block; }
    .bow.flip { transform: scaleX(-1); }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 616px;
      padding: 2.2rem;
      color: var(--text-color);
    }
    h2 {
      font-family: "Cause", sans-serif;
      font-size: 1.1rem;
      color: var(--heading-color);
      margin-bottom: 1rem;
      text-align: center;
    }
    .task-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .task {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      border: 1px solid var(--table-border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
    }
    .task.done { opacity: 0.6; }
    .task .check {
      flex-shrink: 0;
      width: 1.3rem;
      height: 1.3rem;
      border-radius: 50%;
      border: 2px solid var(--button-bg);
      margin-top: 0.15rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: var(--button-text);
    }
    .task.done .check { background: var(--button-bg); }
    .task .body { flex: 1; min-width: 0; }
    .task .title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.2rem;
      overflow-wrap: anywhere;
    }
    .task.done .title { text-decoration: line-through; }
    .task .detail {
      color: var(--muted-color);
      font-size: 0.88rem;
      margin-bottom: 0.45rem;
      overflow-wrap: anywhere;
    }
    .task .meta { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
    .tag {
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .tag.assigned { background: var(--button-bg); color: var(--button-text); }
    .tag.auto { background: var(--table-border); color: var(--muted-color); }
    .tag.waiting {
      background: transparent;
      border: 1px solid var(--muted-color);
      color: var(--muted-color);
    }
    .tag.sentback { background: var(--error-bg); color: var(--error-color); }
    .tag.kind {
      background: var(--notif-item-bg, rgba(251, 195, 211, 0.15));
      color: var(--text-color);
    }
    .task .open {
      flex-shrink: 0;
      align-self: center;
      padding: 0.42rem 1rem;
      border-radius: 999px;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 0.8rem;
      font-weight: 700;
      text-decoration: none;
    }
    .task .open:hover { background: var(--button-hover-bg); }
    .tag.reward {
      background: transparent;
      border: 1px solid var(--button-bg);
      color: var(--heading-color);
    }
    .empty {
      text-align: center;
      color: var(--muted-color);
      font-style: italic;
      padding: 1.5rem 0;
    }
    .section-note {
      color: var(--muted-color);
      font-size: 0.8rem;
      text-align: center;
      margin-top: 1.25rem;
    }

    /* greyscale dark mode */
    body[data-theme="dark"] .task { background: rgba(255, 255, 255, 0.04); }
  </style>
</head>
<body class="has-top-nav">
    <main class="card">
    <h2>Active</h2>
    <div class="task-list" id="active-list"></div>
    <p class="empty" id="active-empty" hidden>Nothing to do right now.</p>
  </main>

  <section class="card" id="done-card" hidden>
    <h2>Completed</h2>
    <div class="task-list" id="done-list"></div>
  </section>

  <script>
    function tag(text, className) {
      const el = document.createElement("span");
      el.className = "tag " + className;
      el.textContent = text;
      return el;
    }

    // task shape: { id, type, title, detail, source: "hermione" | "auto",
    //               status: "active" | "submitted" | "done", points, ... }
    // "submitted" is an essay sitting with Hermione; an active task carrying a
    // reviewNote is one she sent back.
    function renderTask(task) {
      const row = document.createElement("div");
      row.className = "task" + (task.status === "done" ? " done" : "");

      const check = document.createElement("div");
      check.className = "check";
      check.textContent = task.status === "done" ? "✓" : "";
      row.append(check);

      const bodyEl = document.createElement("div");
      bodyEl.className = "body";

      const title = document.createElement("div");
      title.className = "title";
      title.textContent = task.title || "Untitled task";
      bodyEl.append(title);

      if (task.detail) {
        const detail = document.createElement("div");
        detail.className = "detail";
        detail.textContent = task.detail;
        bodyEl.append(detail);
      }

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.append(
        task.source === "auto"
          ? tag("Automatic", "auto")
          : tag("Set by Hermione", "assigned")
      );
      if (task.status === "submitted") meta.append(tag("With Hermione", "waiting"));
      if (task.status === "active" && task.reviewNote) meta.append(tag("Sent back", "sentback"));
      if (task.type === "essay") meta.append(tag(task.minWords + " words", "kind"));
      if (task.type === "repetition") {
        meta.append(tag(task.repsDone + " of " + task.reps, "kind"));
      }
      if (task.points) meta.append(tag(task.points + " pts", "reward"));
      bodyEl.append(meta);

      row.append(bodyEl);

      // anything with a doing-surface gets a way in
      if (task.type === "essay" || task.type === "repetition") {
        const go = document.createElement("a");
        go.className = "open";
        go.href = "/task?id=" + encodeURIComponent(task.id);
        go.textContent = task.status === "done"
          ? "Review"
          : task.status === "submitted" ? "View" : "Open";
        row.append(go);
      }

      return row;
    }

    function renderTasks(tasks) {
      const active = tasks.filter((t) => t.status !== "done");
      const done = tasks.filter((t) => t.status === "done");

      const activeList = document.getElementById("active-list");
      activeList.replaceChildren(...active.map(renderTask));
      document.getElementById("active-empty").hidden = active.length > 0;

      const doneList = document.getElementById("done-list");
      doneList.replaceChildren(...done.map(renderTask));
      document.getElementById("done-card").hidden = done.length === 0;
    }

    window.siteMe()
      .then((d) => {
        return fetch("/api/tasks");
      })
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((d) => renderTasks(d.tasks || []))
      .catch(() => (window.location.href = "/"));
  </script>
  <script src="/nav.js" defer></script>
  <script src="/notifications.js" defer></script>
</body>
</html>
