<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Test Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      background: linear-gradient(135deg, #ff90b0 0%, #f6f6f6 100%);
      padding: 1rem;
    }
    .site-header {
      font-family: "Sour Gummy", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 480px;
      padding: 2.5rem;
      text-align: center;
    }
    h1 { font-size: 1.5rem; color: #333; margin-bottom: 0.5rem; }
    h2 { font-size: 1.1rem; color: #333; margin-bottom: 1rem; }
    p { color: #777; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 0.5rem 0.75rem; font-size: 0.95rem; }
    th { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr + tr td { border-top: 1px solid #eee; }
    td { color: #333; }
    td.rank { color: #999; width: 2.5rem; }
    button {
      padding: 0.6rem 1.5rem;
      background: #ff90b0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button + button { margin-left: 0.5rem; }
  </style>
</head>
<body>
  <h1 class="site-header">⊹₊ ˚‧︵‿₊୨ Dashboard ୧₊‿︵‧ ˚ ₊⊹</h1>
  <main class="card">
    <h1 id="welcome">Welcome!</h1>
    <p>Your account is set up. This is a placeholder page — the real site goes here.</p>
    <button id="admin" type="button" hidden>Accounts</button>
    <button id="chess" type="button">Play Chess</button>
    <button id="logout" type="button">Log out</button>
  </main>
  <section class="card">
    <h2>Leaderboard</h2>
    <table>
      <thead>
        <tr><th></th><th>Username</th><th>Points</th></tr>
      </thead>
      <tbody id="board"></tbody>
    </table>
  </section>
  <script>
    fetch("/api/me")
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((d) => {
        document.getElementById("welcome").textContent = "Welcome, " + d.username + "!";
        if (d.username.toLowerCase() === "hermione") {
          document.getElementById("admin").hidden = false;
        }
      })
      .catch(() => (window.location.href = "/"));

    fetch("/api/leaderboard")
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((d) => {
        const board = document.getElementById("board");
        d.users.forEach((u, i) => {
          const tr = document.createElement("tr");
          const rank = document.createElement("td");
          rank.className = "rank";
          rank.textContent = i + 1;
          const name = document.createElement("td");
          name.textContent = u.username;
          const points = document.createElement("td");
          points.textContent = u.points;
          tr.append(rank, name, points);
          board.append(tr);
        });
      })
      .catch(() => {});

    document.getElementById("admin").addEventListener("click", () => {
      window.location.href = "/admin";
    });
    document.getElementById("chess").addEventListener("click", () => {
      window.location.href = "/chess";
    });
    document.getElementById("logout").addEventListener("click", async () => {
      await fetch("/api/logout", { method: "POST" });
      window.location.href = "/";
    });
  </script>
</body>
</html>
