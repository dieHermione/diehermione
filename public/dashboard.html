<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/site.css" />
  <script src="/me.js"></script>
  <style>
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 20px 0;
    }
    .bow { display: inline-block; }
    .bow.flip { transform: scaleX(-1); }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 480px;
      padding: 2.5rem;
      text-align: center;
      color: var(--text-color);
    }
    .checkin-notice {
      background: rgba(251, 195, 211, 0.12);
      border: 1px solid var(--button-bg);
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      color: var(--text-color);
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .dashboard-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .dashboard-actions button {
      margin: 0;
    }
    .mini-detail[hidden] { display: none; }
    /* hermione's edit affordances: invisible until you hover the text */
    .editable { position: relative; display: inline-block; }
    .editable .pencil {
      position: absolute;
      top: 50%;
      right: -1.9rem;
      transform: translateY(-50%);
      width: 1.45rem;
      height: 1.45rem;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 0.72rem;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .editable:hover .pencil, .editable .pencil:focus-visible { display: inline-flex; }
    .copy-editor { display: none; margin-bottom: 1rem; text-align: left; }
    .copy-editor.open { display: block; }
    .copy-editor label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--table-header-color);
      margin-bottom: 0.25rem;
    }
    .copy-editor input {
      width: 100%;
      padding: 0.5rem 0.65rem;
      margin-bottom: 0.7rem;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--input-text);
      font-family: inherit;
      font-size: 0.9rem;
    }
    .copy-editor input:focus { outline: none; border-color: var(--button-hover-bg); }
    .copy-editor .row { display: flex; gap: 0.5rem; justify-content: center; }
    .copy-editor .hint { color: var(--muted-color); font-size: 0.72rem; margin: -0.4rem 0 0.7rem; }
    /* +10px under the heading, taken back off the paragraph so the card keeps its height */
    #welcome { margin-bottom: 1.125rem; }
    #dashboard-message { margin-bottom: 0.875rem; }
    .daily-list { display: flex; flex-direction: column; gap: 0.6rem; text-align: left; }
    .daily {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.7rem 0.85rem;
      border: 1px solid var(--table-border);
      border-radius: 10px;
    }
    .daily.done { border-color: var(--button-bg); background: rgba(251, 195, 211, 0.08); }
    .daily .tick {
      flex-shrink: 0;
      width: 1.25rem;
      height: 1.25rem;
      margin-top: 0.1rem;
      border-radius: 50%;
      border: 2px solid var(--button-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--button-text);
    }
    .daily.done .tick { background: var(--button-bg); }
    .daily .body { flex: 1; min-width: 0; }
    .daily .label { font-weight: 700; font-size: 0.92rem; }
    .daily .detail { color: var(--muted-color); font-size: 0.8rem; margin-top: 0.1rem; }
    .daily .reward {
      flex-shrink: 0;
      align-self: center;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      background: var(--button-bg);
      color: var(--button-text);
    }
    .daily .mini-bar {
      height: 5px;
      border-radius: 999px;
      background: var(--table-border);
      overflow: hidden;
      margin-top: 0.45rem;
    }
    .daily .mini-bar span { display: block; height: 100%; background: var(--button-bg); }
    .daily-reset {
      color: var(--muted-color);
      font-size: 0.78rem;
      text-align: center;
      margin: 0.9rem 0 0;
    }
    .dashboard-grid {
      display: grid;
      /* equal 1fr spacers keep the middle column truly centered on the page */
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 1.5rem;
      width: 100%;
    }
    .dashboard-col {
      grid-column: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: min(480px, 90vw);
    }
    .profile-card {
      grid-column: 3;
      justify-self: start;
      width: 300px;
      padding: 2rem 1.5rem;
    }
    .dailies-card {
      grid-column: 1;
      justify-self: end;
      width: 300px;
      padding: 2rem 1.5rem;
    }
    @media (max-width: 1100px) {
      .dashboard-grid { display: flex; flex-direction: column; align-items: center; }
      .dashboard-col { width: min(100%, 480px); }
      .profile-card { width: 100%; max-width: 480px; }
      .dailies-card { width: 100%; max-width: 480px; }
    }
    .profile-card .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 0.85rem;
      box-shadow: 0 6px 20px var(--shadow);
      border: 4px solid var(--button-bg);
      background: linear-gradient(135deg, #FBC3D3, #f7b8c8);
    }
    .profile-card .avatar-fallback {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Cause", sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(135deg, #FBC3D3, #f7b8c8);
      box-shadow: 0 6px 20px var(--shadow);
      border: 4px solid var(--button-bg);
    }
    .profile-card .badge {
      display: inline-block;
      padding: 0.2rem 0.8rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .profile-card .badge.princess {
      background: linear-gradient(135deg, #FBC3D3, #f7b8c8);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(251, 195, 211, 0.5);
    }
    .profile-card .badge.user {
      background: var(--table-border);
      color: var(--muted-color);
    }
    .profile-card .bio {
      color: var(--text-color);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .profile-card .bio.empty { color: var(--muted-color); font-style: italic; }
    .profile-card .mini-details {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
      text-align: left;
    }
    .profile-card .mini-detail {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.2rem 0;
      font-size: 0.85rem;
    }
    .profile-card .mini-detail .label {
      color: var(--table-header-color);
      text-transform: uppercase;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      align-self: center;
    }
    .profile-card .mini-detail .value { font-weight: 600; overflow-wrap: anywhere; text-align: right; }
    .profile-card .joined { color: var(--muted-color); font-size: 0.78rem; margin-bottom: 1rem; }
    h1 { font-family: "Cause", sans-serif; font-size: 1.5rem; color: var(--heading-color); margin-bottom: 0.5rem; }
    h2 { font-family: "Cause", sans-serif; font-size: 1.1rem; color: var(--heading-color); margin-bottom: 1rem; }
    p { color: var(--muted-color); margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 0.5rem 0.75rem; font-size: 0.95rem; }
    th { color: var(--table-header-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr + tr td { border-top: 1px solid var(--table-border); }
    td { color: var(--text-color); }
    td.rank { color: var(--muted-color); width: 2.5rem; }
    td a { color: inherit; text-decoration: underline; text-decoration-color: var(--button-hover-bg); text-underline-offset: 3px; }
    td a:hover { color: var(--button-hover-bg); }
    button {
      padding: 0.6rem 1.5rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--button-hover-bg); }
    button + button { margin-left: 0.5rem; }

    /* greyscale dark mode */
    body[data-theme="dark"] .profile-card .avatar,
    body[data-theme="dark"] .profile-card .avatar-fallback { background: linear-gradient(135deg, #5a5a5a, #7a7a7a); }
    body[data-theme="dark"] .daily.done { background: rgba(255, 255, 255, 0.06); }
    body[data-theme="dark"] .checkin-notice { background: rgba(255, 255, 255, 0.06); }
  </style>
</head>
<body class="has-top-nav">
    <div class="dashboard-grid">
    <aside class="card dailies-card" id="dailies-card">
        <h2>Dailies</h2>
        <div class="daily-list" id="daily-list"></div>
        <p class="daily-reset" id="daily-reset"></p>
      </aside>
    <div class="dashboard-col">
      <main class="card">
        <h1><span class="editable" id="welcome-wrap"><span id="welcome">Welcome!</span></span></h1>
        <p><span class="editable" id="message-wrap"><span id="dashboard-message">There is no text here yet.</span></span></p>
        <div class="copy-editor" id="copy-editor"></div>
        <p class="checkin-notice" id="checkin-notice" hidden></p>
        <div class="dashboard-actions">
          <button id="tithe" type="button" hidden>Tithe 5 points</button>
        </div>
      </main>
      <section class="card">
        <h2>Leaderboard</h2>
        <table>
          <thead>
            <tr><th></th><th>Username</th><th>Points</th></tr>
          </thead>
          <tbody id="board"></tbody>
        </table>
      </section>
    </div>
    <aside class="card profile-card" id="profile-card" hidden>
      <div id="pc-avatar"></div>
      <h2 id="pc-username">…</h2>
      <div id="pc-badge"></div>
      <p class="bio" id="pc-bio"></p>
      <div class="mini-details">
        <div class="mini-detail"><span class="label">Pronouns</span><span class="value" id="pc-pronouns">—</span></div>
        <div class="mini-detail"><span class="label">Rank</span><span class="value" id="pc-rank">—</span></div>
        <div class="mini-detail"><span class="label">Points</span><span class="value" id="pc-points">0</span></div>
      </div>
      <p class="joined" id="pc-joined"></p>
      <button id="pc-view" type="button">View profile</button>
    </aside>
  </div>
  <script>


    // /me.js keeps this to one request per page load: a second would swallow
    // the daily check-in result, since the server only reports it once per day
    window.siteMe()
      .then((d) => {
        if (d.checkIn) {
          const notice = document.getElementById("checkin-notice");
          notice.textContent = "Daily check-in: +" + d.checkIn.amount + " points — you now have " + d.checkIn.points + ".";
          notice.hidden = false;
        }
        const isHermione = Boolean(d.isAdmin ?? (d.username && d.username.toLowerCase() === "hermione"));
        document.getElementById("tithe").hidden = isHermione;
        loadCopy(isHermione);
      })
      .catch(() => (window.location.href = "/"));

    fetch("/api/leaderboard")
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((d) => {
        const board = document.getElementById("board");
        d.users.forEach((u, i) => {
          const tr = document.createElement("tr");
          const rank = document.createElement("td");
          rank.className = "rank";
          rank.textContent = i + 1;
          const name = document.createElement("td");
          const link = document.createElement("a");
          link.href = "/profile?user=" + encodeURIComponent(u.username);
          link.textContent = u.username;
          name.append(link);
          const points = document.createElement("td");
          points.textContent = u.points;
          tr.append(rank, name, points);
          board.append(tr);
        });
      })
      .catch(() => {});

    function pcAgeString(createdAt) {
      const days = Math.floor((Date.now() - new Date(createdAt).getTime()) / 86400000);
      if (days < 1) return "brand new";
      if (days < 31) return days + (days === 1 ? " day old" : " days old");
      const months = Math.floor(days / 30.44);
      if (months < 12) return months + (months === 1 ? " month old" : " months old");
      const years = Math.floor(months / 12);
      const rem = months % 12;
      return years + (years === 1 ? " year" : " years") + (rem ? ", " + rem + (rem === 1 ? " month" : " months") : "") + " old";
    }

    async function loadProfileCard() {
      const me = await window.siteMe().catch(() => null);
      if (!me) return;
      const res = await fetch("/api/profile/" + encodeURIComponent(me.username));
      if (!res.ok) return;
      const p = (await res.json()).profile;
      const slot = document.getElementById("pc-avatar");
      if (p.icon) {
        const img = document.createElement("img");
        img.className = "avatar";
        img.src = p.icon;
        img.alt = p.username + "'s profile picture";
        slot.replaceChildren(img);
      } else {
        const div = document.createElement("div");
        div.className = "avatar-fallback";
        div.textContent = (p.username[0] || "?").toUpperCase();
        slot.replaceChildren(div);
      }
      document.getElementById("pc-username").textContent = p.username;
      const badge = document.createElement("span");
      const princess = p.rank === "Princess";
      badge.className = "badge " + (princess ? "princess" : "user");
      badge.textContent = p.rank;
      document.getElementById("pc-badge").replaceChildren(badge);
      window.RankLegend?.attach(badge, () => ({
        rank: p.rank,
        username: p.username,
        canEdit: false,          // your own card; ranks are handed out on profiles
        onChange: () => loadProfileCard(),
      }));
      const bio = document.getElementById("pc-bio");
      bio.textContent = p.bio || "No bio yet.";
      bio.classList.toggle("empty", !p.bio);
      document.getElementById("pc-pronouns").textContent = p.pronouns || "—";
      document.getElementById("pc-rank").textContent = p.rank || "—";
      const pcPoints = document.getElementById("pc-points").closest(".mini-detail");
      if (p.points === null) {
        pcPoints.hidden = true;
      } else {
        pcPoints.hidden = false;
        document.getElementById("pc-points").textContent = p.points;
      }
      document.getElementById("pc-joined").textContent =
        "Joined " + new Date(p.createdAt).toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" }) +
        " · " + pcAgeString(p.createdAt);
      document.getElementById("profile-card").hidden = false;
    }
    loadProfileCard();

    // --- the two lines of dashboard copy, editable in place by hermione ---
    let siteRaw = null;

    async function loadCopy(isHermione) {
      const res = await fetch("/api/site");
      if (!res.ok) return;
      const site = await res.json();
      document.getElementById("welcome").textContent = site.welcome;
      document.getElementById("dashboard-message").textContent = site.message;
      siteRaw = site.raw || null;
      if (isHermione && siteRaw) addPencils();
    }

    function addPencils() {
      [["welcome-wrap", "welcome"], ["message-wrap", "message"]].forEach(([wrapId, which]) => {
        const wrap = document.getElementById(wrapId);
        if (!wrap || wrap.querySelector(".pencil")) return;
        const pencil = document.createElement("button");
        pencil.type = "button";
        pencil.className = "pencil";
        pencil.textContent = "✎";
        pencil.title = "Edit this text";
        pencil.addEventListener("click", () => openCopyEditor(which));
        wrap.append(pencil);
      });
    }

    function openCopyEditor(which) {
      const editor = document.getElementById("copy-editor");
      const adminKey = which === "welcome" ? "welcomeAdmin" : "messageAdmin";
      const userKey = which === "welcome" ? "welcomeUser" : "messageUser";
      editor.replaceChildren();

      const mineLabel = document.createElement("label");
      mineLabel.textContent = "What you see";
      const mine = document.createElement("input");
      mine.type = "text";
      mine.maxLength = 200;
      mine.value = siteRaw[adminKey];

      const theirsLabel = document.createElement("label");
      theirsLabel.textContent = "What everyone else sees";
      const theirs = document.createElement("input");
      theirs.type = "text";
      theirs.maxLength = 200;
      theirs.value = siteRaw[userKey];

      const hint = document.createElement("p");
      hint.className = "hint";
      hint.textContent = "{name} becomes their username.";

      const row = document.createElement("div");
      row.className = "row";
      const save = document.createElement("button");
      save.type = "button";
      save.textContent = "Save";
      const cancel = document.createElement("button");
      cancel.type = "button";
      cancel.textContent = "Cancel";
      cancel.addEventListener("click", () => editor.classList.remove("open"));
      save.addEventListener("click", async () => {
        const res = await fetch("/api/site", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ [adminKey]: mine.value, [userKey]: theirs.value }),
        });
        if (res.ok) {
          siteRaw = (await res.json()).raw;
          editor.classList.remove("open");
          loadCopy(true);
        }
      });
      row.append(save, cancel);

      editor.append(mineLabel, mine, theirsLabel, theirs, hint, row);
      editor.classList.add("open");
    }

    async function loadDailies() {
      const res = await fetch("/api/dailies");
      if (!res.ok) return;
      const data = await res.json();
      const list = document.getElementById("daily-list");
      list.replaceChildren(...data.dailies.map((d) => {
        const row = document.createElement("div");
        row.className = "daily" + (d.done ? " done" : "");

        const tick = document.createElement("div");
        tick.className = "tick";
        tick.textContent = d.done ? "✓" : "";
        row.append(tick);

        const bodyEl = document.createElement("div");
        bodyEl.className = "body";
        const label = document.createElement("div");
        label.className = "label";
        label.textContent = d.label;
        bodyEl.append(label);
        const detail = document.createElement("div");
        detail.className = "detail";
        detail.textContent = d.progress && !d.done
          ? d.detail + " — " + d.progress.current + " of " + d.progress.max + " points today"
          : d.detail;
        bodyEl.append(detail);
        if (d.progress) {
          const bar = document.createElement("div");
          bar.className = "mini-bar";
          const fill = document.createElement("span");
          fill.style.width = Math.min(100, (d.progress.current / d.progress.max) * 100) + "%";
          bar.append(fill);
          bodyEl.append(bar);
        }
        row.append(bodyEl);

        const reward = document.createElement("span");
        reward.className = "reward";
        reward.textContent = d.reward;
        row.append(reward);
        return row;
      }));
      document.getElementById("daily-reset").textContent = "Resets at " + data.resets + ".";
    }
    loadDailies();

    document.getElementById("tithe").addEventListener("click", async () => {
      const res = await fetch("/api/tithe", { method: "POST" });
      const data = await res.json().catch(() => ({}));
      const notice = document.getElementById("checkin-notice");
      notice.textContent = res.ok
        ? "Tithed " + data.amount + " points. You have " + data.points + " left."
        : data.error || "That didn't work.";
      notice.hidden = false;
      if (res.ok) loadProfileCard();
    });

    document.getElementById("pc-view").addEventListener("click", () => {
      window.location.href = "/profile";
    });
  </script>
  <script src="/ranks.js"></script>
  <script src="/nav.js" defer></script>
  <script src="/notifications.js" defer></script>
</body>
</html>
