<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg1: #FBC3D3;
      --bg2: #f6f6f6;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --header-color: #ffffff;
      --heading-color: #FBC3D3;
      --text-color: #333;
      --muted-color: #777;
      --table-border: #eee;
      --table-header-color: #888;
      --button-bg: #FBC3D3;
      --button-text: #ffffff;
      --button-hover-bg: #f7b8c8;
      --shadow: rgba(0, 0, 0, 0.2);
      --input-border: #ddd;
      --input-bg: #fff;
      --input-text: #333;
      --active-color: #667eea;
      --error-bg: #fdecea;
      --error-color: #FBC3D3;
      --toggle-bg: rgba(255, 255, 255, 0.9);
      --toggle-text: #333;
    }
    body[data-theme="dark"] {
      color-scheme: dark;
      --bg1: #14141a;
      --bg2: #22222b;
      --panel-bg: rgba(37, 34, 42, 0.92);
      --header-color: #ffffff;
      --heading-color: #ffffff;
      --text-color: #ffffff;
      --muted-color: #ffffff;
      --table-border: #5a4257;
      --table-header-color: #ffffff;
      --button-bg: #d99baf;
      --button-text: #ffffff;
      --button-hover-bg: #edb6ca;
      --shadow: rgba(0, 0, 0, 0.45);
      --input-border: #FBC3D3;
      --input-bg: #2b2234;
      --input-text: #f8ebf4;
      --active-color: #ffffff;
      --error-bg: rgba(74, 23, 37, 0.35);
      --error-color: #ffffff;
      --toggle-bg: rgba(41, 34, 49, 0.95);
      --toggle-text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Cause", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      padding: 1rem;
      color: var(--text-color);
    }
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 20px 0;
    }
    .bow { display: inline-block; }
    .bow.flip { transform: scaleX(-1); }
    body.has-top-nav {
      justify-content: flex-start;
      padding-top: 1.75rem;
      gap: 1rem;
    }
    .top-nav {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 0.55rem;
      position: relative;
      width: min(100%, 720px);
      padding: 0.65rem 1rem;
      margin: 0 0 0.75rem;
      border-radius: 999px;
      background: var(--panel-bg);
      box-shadow: 0 8px 24px var(--shadow);
      backdrop-filter: blur(8px);
    }
    .top-nav .greeting {
      color: var(--heading-color);
      font-weight: 700;
      font-size: 0.95rem;
      margin-right: 0.25rem;
    }
    .top-nav .nav-links {
      grid-column: 2;
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.45rem;
    }
    .top-nav a,
    .top-nav button,
    .top-nav .dropdown-toggle {
      font-family: inherit;   /* buttons don't inherit the page font on their own */
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      border: none;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .top-nav a:hover,
    .top-nav button:hover,
    .top-nav .dropdown-toggle:hover {
      background: var(--button-hover-bg);
    }
    .top-nav a.active {
      background: var(--button-hover-bg);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
    }
    .top-nav .dropdown[hidden] { display: none; }
    .top-nav a[hidden] { display: none; }
    .top-nav .dropdown {
      position: relative;
      display: inline-flex;
    }
    /* invisible bridge across the gap so hover survives the trip to the menu */
    .top-nav .dropdown::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      height: 0.5rem;
    }
    .top-nav .dropdown-menu {
      position: absolute;
      top: calc(100% + 0.35rem);
      left: 0;
      display: none;
      flex-direction: column;
      gap: 0.35rem;
      padding: 0.45rem;
      background: var(--panel-bg);
      border-radius: 8px;
      box-shadow: 0 8px 24px var(--shadow);
      min-width: 8rem;
    }
    .top-nav .dropdown:hover .dropdown-menu,
    .top-nav .dropdown:focus-within .dropdown-menu {
      display: flex;
    }
    .top-nav .dropdown-menu a {
      width: 100%;
    }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 480px;
      padding: 2.5rem;
      text-align: center;
      color: var(--text-color);
    }
    .checkin-notice {
      background: rgba(251, 195, 211, 0.12);
      border: 1px solid var(--button-bg);
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      color: var(--text-color);
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .dashboard-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .dashboard-actions button {
      margin: 0;
    }
    .daily-list { display: flex; flex-direction: column; gap: 0.6rem; text-align: left; }
    .daily {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.7rem 0.85rem;
      border: 1px solid var(--table-border);
      border-radius: 10px;
    }
    .daily.done { border-color: var(--button-bg); background: rgba(251, 195, 211, 0.08); }
    .daily .tick {
      flex-shrink: 0;
      width: 1.25rem;
      height: 1.25rem;
      margin-top: 0.1rem;
      border-radius: 50%;
      border: 2px solid var(--button-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--button-text);
    }
    .daily.done .tick { background: var(--button-bg); }
    .daily .body { flex: 1; min-width: 0; }
    .daily .label { font-weight: 700; font-size: 0.92rem; }
    .daily .detail { color: var(--muted-color); font-size: 0.8rem; margin-top: 0.1rem; }
    .daily .reward {
      flex-shrink: 0;
      align-self: center;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      background: var(--button-bg);
      color: var(--button-text);
    }
    .daily .mini-bar {
      height: 5px;
      border-radius: 999px;
      background: var(--table-border);
      overflow: hidden;
      margin-top: 0.45rem;
    }
    .daily .mini-bar span { display: block; height: 100%; background: var(--button-bg); }
    .daily-reset {
      color: var(--muted-color);
      font-size: 0.78rem;
      text-align: center;
      margin: 0.9rem 0 0;
    }
    .dashboard-grid {
      display: grid;
      /* equal 1fr spacers keep the middle column truly centered on the page */
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 1.5rem;
      width: 100%;
    }
    .dashboard-col {
      grid-column: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: min(480px, 90vw);
    }
    .profile-card {
      grid-column: 3;
      justify-self: start;
      width: 300px;
      padding: 2rem 1.5rem;
    }
    .dailies-card {
      grid-column: 1;
      justify-self: end;
      width: 300px;
      padding: 2rem 1.5rem;
    }
    @media (max-width: 1100px) {
      .dashboard-grid { display: flex; flex-direction: column; align-items: center; }
      .dashboard-col { width: min(100%, 480px); }
      .profile-card { width: 100%; max-width: 480px; }
      .dailies-card { width: 100%; max-width: 480px; }
    }
    .profile-card .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 0.85rem;
      box-shadow: 0 6px 20px var(--shadow);
      border: 4px solid var(--button-bg);
      background: linear-gradient(135deg, #FBC3D3, #f7b8c8);
    }
    .profile-card .avatar-fallback {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Cause", sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(135deg, #FBC3D3, #f7b8c8);
      box-shadow: 0 6px 20px var(--shadow);
      border: 4px solid var(--button-bg);
    }
    .profile-card .badge {
      display: inline-block;
      padding: 0.2rem 0.8rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .profile-card .badge.princess {
      background: linear-gradient(135deg, #FBC3D3, #f7b8c8);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(251, 195, 211, 0.5);
    }
    .profile-card .badge.user {
      background: var(--table-border);
      color: var(--muted-color);
    }
    .profile-card .bio {
      color: var(--text-color);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .profile-card .bio.empty { color: var(--muted-color); font-style: italic; }
    .profile-card .mini-details {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
      text-align: left;
    }
    .profile-card .mini-detail {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.2rem 0;
      font-size: 0.85rem;
    }
    .profile-card .mini-detail .label {
      color: var(--table-header-color);
      text-transform: uppercase;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      align-self: center;
    }
    .profile-card .mini-detail .value { font-weight: 600; overflow-wrap: anywhere; text-align: right; }
    .profile-card .joined { color: var(--muted-color); font-size: 0.78rem; margin-bottom: 1rem; }
    h1 { font-family: "Cause", sans-serif; font-size: 1.5rem; color: var(--heading-color); margin-bottom: 0.5rem; }
    h2 { font-family: "Cause", sans-serif; font-size: 1.1rem; color: var(--heading-color); margin-bottom: 1rem; }
    p { color: var(--muted-color); margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 0.5rem 0.75rem; font-size: 0.95rem; }
    th { color: var(--table-header-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr + tr td { border-top: 1px solid var(--table-border); }
    td { color: var(--text-color); }
    td.rank { color: var(--muted-color); width: 2.5rem; }
    td a { color: inherit; text-decoration: underline; text-decoration-color: var(--button-hover-bg); text-underline-offset: 3px; }
    td a:hover { color: var(--button-hover-bg); }
    button {
      padding: 0.6rem 1.5rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--button-hover-bg); }
    button + button { margin-left: 0.5rem; }
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: 3rem;
      height: 1.6rem;
      padding: 0;
      border: 1px solid var(--input-border);
      border-radius: 999px;
      background: var(--toggle-bg);
      color: transparent;
      box-shadow: 0 6px 16px var(--shadow);
      cursor: pointer;
      overflow: hidden;
    }
    .theme-toggle .thumb {
      position: absolute;
      top: 0.15rem;
      left: 0.15rem;
      width: 1.15rem;
      height: 1.15rem;
      border-radius: 50%;
      background: var(--button-bg);
      display: block;
      transition: left 0.2s ease, background-color 0.2s ease;
    }
    .theme-toggle.is-dark .thumb {
      left: calc(100% - 1.15rem - 0.15rem);
      background: var(--button-hover-bg);
    }
  </style>
</head>
<body class="has-top-nav">
    <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle dark mode"><span class="thumb"></span></button>
  <nav id="top-nav" class="top-nav" hidden>
    <div class="nav-links">
      <a id="nav-dashboard" href="/dashboard">Dashboard</a>
      <a id="nav-admin" href="/admin" hidden>Admin</a>
      <a id="nav-profile" href="/profile">Profile</a>
      <a id="nav-tasks" href="/tasks">Tasks</a>
      <div class="dropdown" id="games-dropdown">
        <button class="dropdown-toggle" type="button">Games ▾</button>
        <div class="dropdown-menu">
          <a id="nav-snake" href="/snake">Snake</a>
          <a id="nav-writing" href="/writing">Writing</a>
          <a id="nav-wheel" href="/wheel">Wheel</a>
          <a id="nav-deathroll" href="/deathroll">Deathroll</a>
        </div>
      </div>
    </div>
  </nav>
  <div class="dashboard-grid">
    <aside class="card dailies-card" id="dailies-card">
        <h2>Dailies</h2>
        <div class="daily-list" id="daily-list"></div>
        <p class="daily-reset" id="daily-reset"></p>
      </aside>
    <div class="dashboard-col">
      <main class="card">
        <h1 id="welcome">Welcome!</h1>
        <p id="dashboard-message">There is no text here yet.</p>
        <p class="checkin-notice" id="checkin-notice" hidden></p>
        <div class="dashboard-actions">
          <button id="tithe" type="button" hidden>Tithe $5</button>
        </div>
      </main>
      <section class="card">
        <h2>Leaderboard</h2>
        <table>
          <thead>
            <tr><th></th><th>Username</th><th>Points</th></tr>
          </thead>
          <tbody id="board"></tbody>
        </table>
      </section>
    </div>
    <aside class="card profile-card" id="profile-card" hidden>
      <div id="pc-avatar"></div>
      <h2 id="pc-username">…</h2>
      <div id="pc-badge"></div>
      <p class="bio" id="pc-bio"></p>
      <div class="mini-details">
        <div class="mini-detail"><span class="label">Pronouns</span><span class="value" id="pc-pronouns">—</span></div>
        <div class="mini-detail"><span class="label">Rank</span><span class="value" id="pc-rank">—</span></div>
        <div class="mini-detail"><span class="label">Points</span><span class="value" id="pc-points">0</span></div>
        <div class="mini-detail"><span class="label">Dollars</span><span class="value" id="pc-dollars">$0</span></div>
      </div>
      <p class="joined" id="pc-joined"></p>
      <button id="pc-view" type="button">View profile</button>
    </aside>
  </div>
  <script>
    const body = document.body;
    const toggle = document.getElementById("theme-toggle");
    const storedTheme = localStorage.getItem("site-theme");
    const systemDark = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
    // no explicit choice yet? follow whatever the browser/OS is set to
    const savedTheme = storedTheme || (systemDark && systemDark.matches ? "dark" : "light");
    const topNav = document.getElementById("top-nav");
    const navDashboard = document.getElementById("nav-dashboard");
    const navAdmin = document.getElementById("nav-admin");
    const navChess = document.getElementById("nav-chess");
    const navSnake = document.getElementById("nav-snake");
    const adminDropdown = document.getElementById("nav-admin");

    function applyTheme(theme, persist) {
      body.dataset.theme = theme;
      if (toggle) {
        toggle.classList.toggle("is-dark", theme === "dark");
        toggle.setAttribute("aria-pressed", String(theme === "dark"));
      }
      if (persist) localStorage.setItem("site-theme", theme);
    }

    applyTheme(savedTheme);
    systemDark?.addEventListener?.("change", (e) => {
      if (!localStorage.getItem("site-theme")) applyTheme(e.matches ? "dark" : "light");
    });
    toggle?.addEventListener("click", () => {
      const nextTheme = body.dataset.theme === "dark" ? "light" : "dark";
      applyTheme(nextTheme, true);
    });

    function setActiveNav(path) {
      const links = [navDashboard, navAdmin, navChess, navSnake];
      links.forEach((link) => link?.classList.toggle("active", link?.getAttribute("href") === path));
    }

    // one /api/me call for the whole page: a second would swallow the daily
    // check-in result, since the server only reports it once per day
    function initTopNav(data) {
      if (!topNav) return;
      const username = data.username || "there";
      const isAdmin = Boolean(data.isAdmin ?? (username && username.toLowerCase() === "hermione"));
      topNav.hidden = false;
      if (adminDropdown) {
        adminDropdown.hidden = !isAdmin;
      }
      setActiveNav(window.location.pathname);
    }

    fetch("/api/me")
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((d) => {
        initTopNav(d);
        if (d.checkIn) {
          const notice = document.getElementById("checkin-notice");
          notice.textContent = "Daily check-in: +$" + d.checkIn.amount + " — you now have $" + d.checkIn.dollars + ".";
          notice.hidden = false;
        }
        const isHermione = Boolean(d.isAdmin ?? (d.username && d.username.toLowerCase() === "hermione"));
        const greeting = isHermione ? "Welcome, Princess!" : "Welcome, " + d.username + "!";
        document.getElementById("welcome").textContent = greeting;
        document.getElementById("dashboard-message").textContent = isHermione
          ? "mirror mirror on the wall."
          : "There is no text here yet.";
        document.getElementById("tithe").hidden = isHermione;
      })
      .catch(() => (window.location.href = "/"));

    fetch("/api/leaderboard")
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((d) => {
        const board = document.getElementById("board");
        d.users.forEach((u, i) => {
          const tr = document.createElement("tr");
          const rank = document.createElement("td");
          rank.className = "rank";
          rank.textContent = i + 1;
          const name = document.createElement("td");
          const link = document.createElement("a");
          link.href = "/profile?user=" + encodeURIComponent(u.username);
          link.textContent = u.username;
          name.append(link);
          const points = document.createElement("td");
          points.textContent = u.points;
          tr.append(rank, name, points);
          board.append(tr);
        });
      })
      .catch(() => {});

    function pcAgeString(createdAt) {
      const days = Math.floor((Date.now() - new Date(createdAt).getTime()) / 86400000);
      if (days < 1) return "brand new";
      if (days < 31) return days + (days === 1 ? " day old" : " days old");
      const months = Math.floor(days / 30.44);
      if (months < 12) return months + (months === 1 ? " month old" : " months old");
      const years = Math.floor(months / 12);
      const rem = months % 12;
      return years + (years === 1 ? " year" : " years") + (rem ? ", " + rem + (rem === 1 ? " month" : " months") : "") + " old";
    }

    async function loadProfileCard() {
      const meRes = await fetch("/api/me");
      if (!meRes.ok) return;
      const me = await meRes.json();
      const res = await fetch("/api/profile/" + encodeURIComponent(me.username));
      if (!res.ok) return;
      const p = (await res.json()).profile;
      const slot = document.getElementById("pc-avatar");
      if (p.icon) {
        const img = document.createElement("img");
        img.className = "avatar";
        img.src = p.icon;
        img.alt = p.username + "'s profile picture";
        slot.replaceChildren(img);
      } else {
        const div = document.createElement("div");
        div.className = "avatar-fallback";
        div.textContent = (p.username[0] || "?").toUpperCase();
        slot.replaceChildren(div);
      }
      document.getElementById("pc-username").textContent = p.username;
      const badge = document.createElement("span");
      const princess = p.rank === "Princess";
      badge.className = "badge " + (princess ? "princess" : "user");
      badge.textContent = p.rank;
      document.getElementById("pc-badge").replaceChildren(badge);
      const bio = document.getElementById("pc-bio");
      bio.textContent = p.bio || "No bio yet.";
      bio.classList.toggle("empty", !p.bio);
      document.getElementById("pc-pronouns").textContent = p.pronouns || "—";
      document.getElementById("pc-rank").textContent = p.rank || "—";
      document.getElementById("pc-points").textContent = p.points;
      document.getElementById("pc-dollars").textContent = "$" + p.dollars;
      document.getElementById("pc-joined").textContent =
        "Joined " + new Date(p.createdAt).toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" }) +
        " · " + pcAgeString(p.createdAt);
      document.getElementById("profile-card").hidden = false;
    }
    loadProfileCard();

    async function loadDailies() {
      const res = await fetch("/api/dailies");
      if (!res.ok) return;
      const data = await res.json();
      const list = document.getElementById("daily-list");
      list.replaceChildren(...data.dailies.map((d) => {
        const row = document.createElement("div");
        row.className = "daily" + (d.done ? " done" : "");

        const tick = document.createElement("div");
        tick.className = "tick";
        tick.textContent = d.done ? "✓" : "";
        row.append(tick);

        const bodyEl = document.createElement("div");
        bodyEl.className = "body";
        const label = document.createElement("div");
        label.className = "label";
        label.textContent = d.label;
        bodyEl.append(label);
        const detail = document.createElement("div");
        detail.className = "detail";
        detail.textContent = d.progress && !d.done
          ? d.detail + " — $" + d.progress.current + " of $" + d.progress.max + " today"
          : d.detail;
        bodyEl.append(detail);
        if (d.progress) {
          const bar = document.createElement("div");
          bar.className = "mini-bar";
          const fill = document.createElement("span");
          fill.style.width = Math.min(100, (d.progress.current / d.progress.max) * 100) + "%";
          bar.append(fill);
          bodyEl.append(bar);
        }
        row.append(bodyEl);

        const reward = document.createElement("span");
        reward.className = "reward";
        reward.textContent = d.reward;
        row.append(reward);
        return row;
      }));
      document.getElementById("daily-reset").textContent = "Resets at " + data.resets + ".";
    }
    loadDailies();

    document.getElementById("tithe").addEventListener("click", async () => {
      const res = await fetch("/api/tithe", { method: "POST" });
      const data = await res.json().catch(() => ({}));
      const notice = document.getElementById("checkin-notice");
      notice.textContent = res.ok
        ? "Tithed $" + data.amount + " to Hermione. You have $" + data.dollars + " left."
        : data.error || "That didn't work.";
      notice.hidden = false;
      if (res.ok) loadProfileCard();
    });

    document.getElementById("pc-view").addEventListener("click", () => {
      window.location.href = "/profile";
    });
  </script>
  <script src="/notifications.js" defer></script>
</body>
</html>
