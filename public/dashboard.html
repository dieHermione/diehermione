<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Test Site</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 480px;
      padding: 2.5rem;
      text-align: center;
    }
    .check { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; color: #333; margin-bottom: 0.5rem; }
    p { color: #777; margin-bottom: 1.5rem; }
    button {
      padding: 0.6rem 1.5rem;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #5a6fd6; }
  </style>
</head>
<body>
  <main class="card">
    <div class="check">✅</div>
    <h1 id="welcome">Welcome!</h1>
    <p>Your account is set up. This is a placeholder page — the real site goes here.</p>
    <button id="logout" type="button">Log out</button>
  </main>
  <script>
    fetch("/api/me")
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((d) => {
        document.getElementById("welcome").textContent = "Welcome, " + d.username + "!";
      })
      .catch(() => (window.location.href = "/"));

    document.getElementById("logout").addEventListener("click", async () => {
      await fetch("/api/logout", { method: "POST" });
      window.location.href = "/";
    });
  </script>
</body>
</html>
