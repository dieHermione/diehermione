<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in - angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&family=Noto+Sans+Bengali&family=Noto+Sans+Saurashtra&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/site.css" />
  <style>
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 0.75rem;
      padding: 0;
    }
    /* U+A8D1 (Saurashtra) and U+09CE (Bengali) have no font on Windows, so the
       bows rendered as tofu. Ship the Noto faces that cover them. */
    .bow {
      display: inline-block;
      font-family: "Noto Sans Saurashtra", "Noto Sans Bengali", "Cause", sans-serif;
    }
    .bow.flip { transform: scaleX(-1); }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 380px;
      padding: 2rem;
      color: var(--text-color);
    }
    h1 { font-family: "Cause", sans-serif; font-size: 1.4rem; margin-bottom: 1.25rem; text-align: center; color: var(--heading-color); }
    .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid var(--table-border); }
    .tabs button {
      flex: 1;
      background: none;
      border: none;
      padding: 0.6rem;
      font-size: 1rem;
      cursor: pointer;
      color: var(--heading-color);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .tabs button.active { color: var(--heading-color); border-bottom-color: var(--heading-color); font-weight: 600; }
    label { display: block; font-size: 0.85rem; color: var(--heading-color); margin-bottom: 0.3rem; }
    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--input-bg);
      color: var(--input-text);
    }
    input:focus { outline: none; border-color: var(--active-color); }
    select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--input-bg);
      color: var(--input-text);
      font-family: inherit;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: var(--active-color); }
    .role-toggle { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .role-option {
      flex: 1;
      padding: 0.6rem;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--input-text);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .role-option:hover { border-color: var(--button-hover-bg); }
    .role-option { position: relative; }
    .role-option::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 0.55rem);
      left: 50%;
      transform: translateX(-50%);
      width: 12.5rem;
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.97);
      color: #FBC3D3;
      box-shadow: 0 8px 24px var(--shadow);
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1.35;
      text-align: left;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 30;
    }
    .role-option:hover::after, .role-option:focus-visible::after {
      opacity: 1;
      visibility: visible;
    }
    body[data-theme="dark"] .role-option::after { color: #6f6f6f; }
    .role-option.selected {
      background: var(--button-bg);
      color: var(--button-text);
      border-color: var(--button-bg);
    }
    .submit {
      width: 100%;
      padding: 0.7rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .submit:hover { background: var(--button-hover-bg); }
    body[data-theme="dark"] .submit { background: #3a3a3a; }
    body[data-theme="dark"] .submit:hover { background: #4d4d4d; }
    .error {
      display: none;
      background: var(--error-bg);
      color: var(--error-color);
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .hint { font-size: 0.8rem; color: var(--heading-color); margin-top: -0.5rem; margin-bottom: 1rem; }
    textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.75rem;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;   /* textareas fall back to a monospace UI font */
      background: var(--input-bg);
      color: var(--input-text);
      resize: vertical;
      min-height: 4.5rem;
    }
    textarea:focus { outline: none; border-color: var(--active-color); }
    .pending[hidden] { display: none; }
    .pending { text-align: center; }
    .pending h2 {
      font-family: "Cause", sans-serif;
      font-size: 1.25rem;
      color: var(--heading-color);
      margin-bottom: 0.6rem;
    }
    .pending p {
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--text-color);
      margin-bottom: 1.25rem;
    }
    #register-fields[hidden], #form[hidden], .tabs[hidden] { display: none; }
  </style>
</head>
<body>
  <h1 class="site-header"><span class="bow flip">꣑ৎ</span> angeldom.me <span class="bow">꣑ৎ</span></h1>
  <main class="card">
    <div class="tabs">
      <button id="tab-login" class="active" type="button">Log in</button>
      <button id="tab-register" type="button">Register</button>
    </div>
    <div class="error" id="error"></div>
    <form id="form">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required minlength="3" maxlength="30" />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required minlength="8" />
      <p class="hint" id="hint" hidden>At least 8 characters.</p>
      <div id="register-fields" hidden>
        <label for="pronouns">Pronouns</label>
        <select id="pronouns">
          <option value="">Choose…</option>
          <option value="She/Her">She/Her</option>
          <option value="He/Him">He/Him</option>
          <option value="They/Them">They/Them</option>
        </select>
        <label>Rank</label>
        <div class="role-toggle">
          <button type="button" class="role-option" data-role="Visitor" data-tip="Just passing through. Browse the site and play the games, without signing up for anything more.">Visitor</button>
          <button type="button" class="role-option" data-role="Citizen" data-tip="Here to stay. Citizens take on tasks set by Hermione and earn points for them.">Citizen</button>
        </div>
        <label for="intro">Who are you?</label>
        <textarea id="intro" maxlength="500" rows="3" placeholder="Tell Hermione a little about yourself. She reads these before approving accounts."></textarea>
        <p class="hint">This site is invite only, so Hermione approves each account by hand.</p>
      </div>
      <button class="submit" id="submit" type="submit">Log in</button>
    </form>
    <div id="pending" class="pending" hidden>
      <h2>Thank you.</h2>
      <p>Your account has been created, but you can't sign in yet. Hermione approves each one by hand. Come back and log in once she has.</p>
      <button class="submit" type="button" onclick="window.location.reload()">Back to sign in</button>
    </div>
  </main>
  <script>

    let mode = "login";
    const tabLogin = document.getElementById("tab-login");
    const tabRegister = document.getElementById("tab-register");
    const errorBox = document.getElementById("error");
    const hint = document.getElementById("hint");

    function setMode(next) {
      mode = next;
      const login = mode === "login";
      tabLogin.classList.toggle("active", login);
      tabRegister.classList.toggle("active", !login);
      document.getElementById("submit").textContent = login ? "Log in" : "Register";
      document.getElementById("password").autocomplete = login ? "current-password" : "new-password";
      hint.hidden = login;
      document.getElementById("register-fields").hidden = login;
      errorBox.style.display = "none";
    }

    let selectedRole = "";
    document.querySelectorAll(".role-option").forEach((btn) => {
      btn.addEventListener("click", () => {
        selectedRole = btn.dataset.role;
        document.querySelectorAll(".role-option").forEach((b) => {
          b.classList.toggle("selected", b === btn);
        });
      });
    });
    tabLogin.addEventListener("click", () => setMode("login"));
    tabRegister.addEventListener("click", () => setMode("register"));

    // Registration ends here rather than on the dashboard: the account exists
    // but can't sign in until hermione approves it.
    function showPending() {
      document.getElementById("form").hidden = true;
      document.querySelector(".tabs").hidden = true;
      document.getElementById("pending").hidden = false;
    }

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      const payload = {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
      };
      if (mode === "register") {
        payload.pronouns = document.getElementById("pronouns").value;
        payload.rank = selectedRole;
        payload.intro = document.getElementById("intro").value.trim();
      }
      const body = JSON.stringify(payload);
      const res = await fetch("/api/" + mode, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body,
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.pending) {
        // registering no longer signs you in, the account waits for approval
        showPending();
      } else if (res.ok) {
        window.location.href = "/dashboard";
      } else {
        errorBox.textContent = data.error || "Something went wrong.";
        errorBox.style.display = "block";
      }
    });
  </script>
  <script src="/nav.js" defer></script>
</body>
</html>
