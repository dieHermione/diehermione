<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Test Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg1: #ff90b0;
      --bg2: #f6f6f6;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --header-color: #ffffff;
      --heading-color: #FBC3D3;
      --text-color: #333;
      --muted-color: #777;
      --table-border: #eee;
      --button-bg: #FBC3D3;
      --button-text: #ffffff;
      --button-hover-bg: #f7b8c8;
      --shadow: rgba(0, 0, 0, 0.2);
      --input-border: #ddd;
      --input-bg: #fff;
      --input-text: #333;
      --active-color: #667eea;
      --error-bg: #fdecea;
      --error-color: #FBC3D3;
      --toggle-bg: rgba(255, 255, 255, 0.9);
      --toggle-text: #333;
    }
    body[data-theme="dark"] {
      color-scheme: dark;
      --bg1: #140d16;
      --bg2: #231628;
      --panel-bg: rgba(37, 34, 42, 0.92);
      --header-color: #ffffff;
      --heading-color: #ffffff;
      --text-color: #ffffff;
      --muted-color: #ffffff;
      --table-border: #5a4257;
      --button-bg: #d99baf;
      --button-text: #ffffff;
      --button-hover-bg: #edb6ca;
      --shadow: rgba(0, 0, 0, 0.45);
      --input-border: #6e5a72;
      --input-bg: #2b2234;
      --input-text: #f8ebf4;
      --active-color: #ffffff;
      --error-bg: rgba(74, 23, 37, 0.35);
      --error-color: #ffffff;
      --toggle-bg: rgba(41, 34, 49, 0.95);
      --toggle-text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Cause", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      padding: 1rem;
      color: var(--text-color);
    }
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 380px;
      padding: 2rem;
      color: var(--text-color);
    }
    h1 { font-family: "Cause", sans-serif; font-size: 1.4rem; margin-bottom: 1.25rem; text-align: center; color: var(--heading-color); }
    .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid var(--table-border); }
    .tabs button {
      flex: 1;
      background: none;
      border: none;
      padding: 0.6rem;
      font-size: 1rem;
      cursor: pointer;
      color: var(--heading-color);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .tabs button.active { color: var(--active-color); border-bottom-color: var(--active-color); font-weight: 600; }
    label { display: block; font-size: 0.85rem; color: var(--heading-color); margin-bottom: 0.3rem; }
    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--input-bg);
      color: var(--input-text);
    }
    input:focus { outline: none; border-color: var(--active-color); }
    .submit {
      width: 100%;
      padding: 0.7rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .submit:hover { background: var(--button-hover-bg); }
    .error {
      display: none;
      background: var(--error-bg);
      color: var(--error-color);
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .hint { font-size: 0.8rem; color: var(--heading-color); margin-top: -0.5rem; margin-bottom: 1rem; }
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: 3rem;
      height: 1.7rem;
      padding: 0.2rem;
      border: 1px solid var(--input-border);
      border-radius: 999px;
      background: var(--toggle-bg);
      color: transparent;
      box-shadow: 0 6px 16px var(--shadow);
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      cursor: pointer;
    }
    .theme-toggle .thumb {
      width: 1.1rem;
      height: 1.1rem;
      border-radius: 50%;
      background: var(--button-bg);
      display: block;
      transition: transform 0.2s ease;
      transform: translateX(0);
    }
    .theme-toggle.is-dark {
      justify-content: flex-end;
    }
    .theme-toggle.is-dark .thumb {
      transform: translateX(1.15rem);
      background: var(--button-hover-bg);
    }
  </style>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle dark mode"><span class="thumb"></span></button>
  <h1 class="site-header">˚₊‧꒰ა Hermione ໒꒱ ‧₊˚</h1>
  <main class="card">
    <div class="tabs">
      <button id="tab-login" class="active" type="button">Log in</button>
      <button id="tab-register" type="button">Register</button>
    </div>
    <div class="error" id="error"></div>
    <form id="form">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required minlength="3" maxlength="30" />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required minlength="8" />
      <p class="hint" id="hint" hidden>At least 8 characters.</p>
      <button class="submit" id="submit" type="submit">Log in</button>
    </form>
  </main>
  <script>
    const body = document.body;
    const toggle = document.getElementById("theme-toggle");
    const savedTheme = localStorage.getItem("site-theme") || "light";

    function applyTheme(theme) {
      body.dataset.theme = theme;
      if (toggle) {
        toggle.classList.toggle("is-dark", theme === "dark");
        toggle.setAttribute("aria-pressed", String(theme === "dark"));
      }
      localStorage.setItem("site-theme", theme);
    }

    applyTheme(savedTheme);
    toggle?.addEventListener("click", () => {
      const nextTheme = body.dataset.theme === "dark" ? "light" : "dark";
      applyTheme(nextTheme);
    });

    let mode = "login";
    const tabLogin = document.getElementById("tab-login");
    const tabRegister = document.getElementById("tab-register");
    const errorBox = document.getElementById("error");
    const hint = document.getElementById("hint");

    function setMode(next) {
      mode = next;
      const login = mode === "login";
      tabLogin.classList.toggle("active", login);
      tabRegister.classList.toggle("active", !login);
      document.getElementById("submit").textContent = login ? "Log in" : "Register";
      document.getElementById("password").autocomplete = login ? "current-password" : "new-password";
      hint.hidden = login;
      errorBox.style.display = "none";
    }
    tabLogin.addEventListener("click", () => setMode("login"));
    tabRegister.addEventListener("click", () => setMode("register"));

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      const body = JSON.stringify({
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
      });
      const res = await fetch("/api/" + mode, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body,
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        window.location.href = "/dashboard";
      } else {
        errorBox.textContent = data.error || "Something went wrong.";
        errorBox.style.display = "block";
      }
    });
  </script>
</body>
</html>
