<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — angeldom.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cause:wght@400..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg1: #ff90b0;
      --bg2: #f6f6f6;
      --panel-bg: rgba(255, 255, 255, 0.95);
      --header-color: #ffffff;
      --heading-color: #FBC3D3;
      --text-color: #333;
      --muted-color: #777;
      --table-border: #eee;
      --button-bg: #FBC3D3;
      --button-text: #ffffff;
      --button-hover-bg: #f7b8c8;
      --shadow: rgba(0, 0, 0, 0.2);
      --input-border: #ddd;
      --input-bg: #fff;
      --input-text: #333;
      --active-color: #ff90b0;
      --error-bg: #fdecea;
      --error-color: #FBC3D3;
      --toggle-bg: rgba(255, 255, 255, 0.9);
      --toggle-text: #333;
    }
    body[data-theme="dark"] {
      color-scheme: dark;
      --bg1: #14141a;
      --bg2: #22222b;
      --panel-bg: rgba(37, 34, 42, 0.92);
      --header-color: #ffffff;
      --heading-color: #ffffff;
      --text-color: #ffffff;
      --muted-color: #ffffff;
      --table-border: #FBC3D3;
      --button-bg: #4a4a4a;
      --button-text: #ffffff;
      --button-hover-bg: #5f5f5f;
      --shadow: rgba(0, 0, 0, 0.45);
      --input-border: #FBC3D3;
      --input-bg: #d9d9d9;
      --input-text: #333333;
      --active-color: #ffffff;
      --error-bg: rgba(74, 23, 37, 0.35);
      --error-color: #ffffff;
      --toggle-bg: rgba(41, 34, 49, 0.95);
      --toggle-text: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Cause", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      padding: 1rem;
      color: var(--text-color);
    }
    .site-header {
      font-family: "Cause", sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--header-color);
      text-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 1.25rem;
      padding: 20px 0;
    }
    .bow { display: inline-block; }
    .bow.flip { transform: scaleX(-1); }
    .card {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 10px 40px var(--shadow);
      width: 100%;
      max-width: 380px;
      padding: 2rem;
      color: var(--text-color);
    }
    h1 { font-family: "Cause", sans-serif; font-size: 1.4rem; margin-bottom: 1.25rem; text-align: center; color: var(--heading-color); }
    .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid var(--table-border); }
    .tabs button {
      flex: 1;
      background: none;
      border: none;
      padding: 0.6rem;
      font-size: 1rem;
      cursor: pointer;
      color: var(--heading-color);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .tabs button.active { color: var(--heading-color); border-bottom-color: var(--heading-color); font-weight: 600; }
    label { display: block; font-size: 0.85rem; color: var(--heading-color); margin-bottom: 0.3rem; }
    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--input-bg);
      color: var(--input-text);
    }
    input:focus { outline: none; border-color: var(--active-color); }
    select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--input-bg);
      color: var(--input-text);
      font-family: inherit;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: var(--active-color); }
    .role-toggle { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .role-option {
      flex: 1;
      padding: 0.6rem;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--input-text);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .role-option:hover { border-color: var(--button-hover-bg); }
    .role-option { position: relative; }
    .role-option::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 0.55rem);
      left: 50%;
      transform: translateX(-50%);
      width: 12.5rem;
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.97);
      color: #FBC3D3;
      box-shadow: 0 8px 24px var(--shadow);
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1.35;
      text-align: left;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 30;
    }
    .role-option:hover::after, .role-option:focus-visible::after {
      opacity: 1;
      visibility: visible;
    }
    body[data-theme="dark"] .role-option::after { color: #6f6f6f; }
    .role-option.selected {
      background: var(--button-bg);
      color: var(--button-text);
      border-color: var(--button-bg);
    }
    .submit {
      width: 100%;
      padding: 0.7rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .submit:hover { background: var(--button-hover-bg); }
    body[data-theme="dark"] .submit { background: #3a3a3a; }
    body[data-theme="dark"] .submit:hover { background: #4d4d4d; }
    .error {
      display: none;
      background: var(--error-bg);
      color: var(--error-color);
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .hint { font-size: 0.8rem; color: var(--heading-color); margin-top: -0.5rem; margin-bottom: 1rem; }
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: 3rem;
      height: 1.6rem;
      padding: 0;
      border: 1px solid var(--input-border);
      border-radius: 999px;
      background: var(--toggle-bg);
      color: transparent;
      box-shadow: 0 6px 16px var(--shadow);
      cursor: pointer;
      overflow: hidden;
      appearance: none;
      -webkit-appearance: none;
    }
    .theme-toggle:hover,
    .theme-toggle:focus-visible {
      background: var(--toggle-bg);
      border-color: var(--input-border);
      outline: none;
      box-shadow: 0 6px 16px var(--shadow);
    }
    .theme-toggle .thumb {
      position: absolute;
      top: 0.15rem;
      left: 0.15rem;
      width: 1.15rem;
      height: 1.15rem;
      border-radius: 50%;
      background: var(--button-bg);
      display: block;
      transition: left 0.2s ease, background-color 0.2s ease;
    }
    .theme-toggle:hover .thumb,
    .theme-toggle:focus-visible .thumb {
      background: var(--button-bg);
    }
    .theme-toggle.is-dark .thumb {
      left: calc(100% - 1.15rem - 0.15rem);
      background: var(--button-hover-bg);
    }
    .theme-toggle.is-dark:hover .thumb,
    .theme-toggle.is-dark:focus-visible .thumb {
      background: var(--button-hover-bg);
    }
  </style>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle dark mode"><span class="thumb"></span></button>
  <h1 class="site-header"><span class="bow flip">꣑ৎ</span> angeldom.me <span class="bow">꣑ৎ</span></h1>
  <main class="card">
    <div class="tabs">
      <button id="tab-login" class="active" type="button">Log in</button>
      <button id="tab-register" type="button">Register</button>
    </div>
    <div class="error" id="error"></div>
    <form id="form">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required minlength="3" maxlength="30" />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required minlength="8" />
      <p class="hint" id="hint" hidden>At least 8 characters.</p>
      <div id="register-fields" hidden>
        <label for="pronouns">Pronouns</label>
        <select id="pronouns">
          <option value="">Choose…</option>
          <option value="She/Her">She/Her</option>
          <option value="He/Him">He/Him</option>
          <option value="They/Them">They/Them</option>
        </select>
        <label>Rank</label>
        <div class="role-toggle">
          <button type="button" class="role-option" data-role="Visitor" data-tip="Just passing through. Browse the site and play the games, without signing up for anything more.">Visitor</button>
          <button type="button" class="role-option" data-role="Citizen" data-tip="Here to stay. Citizens take on tasks set by Hermione and earn points and dollars for them.">Citizen</button>
        </div>
      </div>
      <button class="submit" id="submit" type="submit">Log in</button>
    </form>
  </main>
  <script>
    const body = document.body;
    const toggle = document.getElementById("theme-toggle");
    const storedTheme = localStorage.getItem("site-theme");
    const systemDark = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
    // no explicit choice yet? follow whatever the browser/OS is set to
    const savedTheme = storedTheme || (systemDark && systemDark.matches ? "dark" : "light");

    function applyTheme(theme, persist) {
      body.dataset.theme = theme;
      if (toggle) {
        toggle.classList.toggle("is-dark", theme === "dark");
        toggle.setAttribute("aria-pressed", String(theme === "dark"));
      }
      if (persist) localStorage.setItem("site-theme", theme);
    }

    applyTheme(savedTheme);
    systemDark?.addEventListener?.("change", (e) => {
      if (!localStorage.getItem("site-theme")) applyTheme(e.matches ? "dark" : "light");
    });
    toggle?.addEventListener("click", () => {
      const nextTheme = body.dataset.theme === "dark" ? "light" : "dark";
      applyTheme(nextTheme, true);
    });

    let mode = "login";
    const tabLogin = document.getElementById("tab-login");
    const tabRegister = document.getElementById("tab-register");
    const errorBox = document.getElementById("error");
    const hint = document.getElementById("hint");

    function setMode(next) {
      mode = next;
      const login = mode === "login";
      tabLogin.classList.toggle("active", login);
      tabRegister.classList.toggle("active", !login);
      document.getElementById("submit").textContent = login ? "Log in" : "Register";
      document.getElementById("password").autocomplete = login ? "current-password" : "new-password";
      hint.hidden = login;
      document.getElementById("register-fields").hidden = login;
      errorBox.style.display = "none";
    }

    let selectedRole = "";
    document.querySelectorAll(".role-option").forEach((btn) => {
      btn.addEventListener("click", () => {
        selectedRole = btn.dataset.role;
        document.querySelectorAll(".role-option").forEach((b) => {
          b.classList.toggle("selected", b === btn);
        });
      });
    });
    tabLogin.addEventListener("click", () => setMode("login"));
    tabRegister.addEventListener("click", () => setMode("register"));

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      const payload = {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
      };
      if (mode === "register") {
        payload.pronouns = document.getElementById("pronouns").value;
        payload.rank = selectedRole;
      }
      const body = JSON.stringify(payload);
      const res = await fetch("/api/" + mode, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body,
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        window.location.href = "/dashboard";
      } else {
        errorBox.textContent = data.error || "Something went wrong.";
        errorBox.style.display = "block";
      }
    });
  </script>
</body>
</html>
